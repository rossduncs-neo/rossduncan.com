   works:[{title:'Ethics',year:'1677',note:'His masterwork — written in geometric form — published posthumously'},{title:'Theological-Political Treatise',year:'1670',note:'A landmark in biblical criticism and the defence of free speech'}],
   quote:'"I have made a ceaseless effort not to ridicule, not to bewail, not to scorn human actions, but to understand them."',
   question:'Spinoza says God and Nature are the same thing — there is no transcendent God, only the infinite natural world. Does this position count as atheism, as a form of religion, or as something else entirely?',
   questionContext:'Einstein said he believed in Spinoza\'s God. Many scientists describe something like Spinozistic awe at the order and beauty of the universe. Is this religion? Does the distinction matter?',
   influenced:['hegel','nietzsche'],influencedBy:['descartes']},

  {id:'descartes',name:'René Descartes',dates:'1596–1650',era:'earlymodern',eraLabel:'Early Modern',school:'Rationalism',timelinePos:52,
   hook:'What if you could doubt absolutely everything?',
   hookContext:'Descartes spent the winter of 1619–20 in a heated room near Ulm, thinking. He had studied with the Jesuits, taken a degree in law, served in the army, and found everything he had been taught unsatisfying. He resolved to demolish everything he believed and rebuild from a foundation so certain it could not be doubted. What he discovered that winter changed the course of philosophy.',
   crisisTitle:'The Method of Radical Doubt',crisisText:'Descartes\' method: find one thing that cannot possibly be doubted, and build from there. He doubted the senses, the external world, mathematics. He arrived at one bedrock certainty: <strong>cogito ergo sum — I think, therefore I am.</strong> Even the most radical doubt cannot undermine the existence of the doubter. This is the foundation of modern philosophy.',
   conflict:'The conflict is with the entire inherited tradition. Descartes was not arguing with Aristotle and the Scholastics — he was demolishing them and starting over. His method — systematic doubt, mathematical clarity, rebuilding from certain foundations — is the founding gesture of modernity: autonomous individual reason as the ultimate arbiter of truth.',
   ideas:[{t:'Cogito Ergo Sum',d:'"I think, therefore I am." Even the most radical doubt cannot undermine the existence of the doubter. This is the one unshakeable foundation.'},{t:'Mind-Body Dualism',d:'Mind and body are fundamentally distinct substances. How they interact is the "mind-body problem" — which has never been satisfactorily solved.'},{t:'Methodological Doubt',d:'Reject everything that can possibly be doubted until you find what cannot be doubted. Certainty through systematic scepticism.'},{t:'The Cartesian Grid',d:'Space is geometric; matter is pure extension. Nature can be fully described mathematically — the conceptual foundation of modern physics.'}],
   payoffTitle:'The Father Who Created the Problem',payoffText:'Descartes\' mind-body dualism created the central problem of modern philosophy: how does the mind relate to the physical brain? He never solved it satisfactorily. <strong>Three hundred and fifty years later, the "hard problem of consciousness" is still the mind-body problem in Cartesian dress. He gave us the question. We\'re still answering it.</strong>',
   works:[{title:'Meditations on First Philosophy',year:'1641',note:'Six meditations rebuilding knowledge from the ground up'},{title:'Discourse on Method',year:'1637',note:'His manifesto — accessible and essential'}],
   quote:'"I think, therefore I am."',
   question:'Descartes starts from the certainty of the thinking self. But is the self that thinks really as self-evident as he claims? Who — or what — is the "I" doing the thinking?',
   questionContext:'Hume later argued you can never find a self when you look inward — only a bundle of thoughts and sensations. Buddhist philosophy says the same thing. Is Descartes\' cogito a foundation or an illusion?',
   influenced:['spinoza','leibniz','kant'],influencedBy:['aquinas']},

  {id:'rousseau',name:'Jean-Jacques Rousseau',dates:'1712–1778',era:'earlymodern',eraLabel:'Early Modern',school:'Social Contract',timelinePos:62,
   hook:'Man is born free, and everywhere he is in chains.',
   hookContext:'The most contradictory figure of the Enlightenment. A Genevan watchmaker\'s son who became a famous composer, novelist, and philosopher. He abandoned five children to a foundling hospital while writing treatises on education. He quarrelled with virtually every intellectual of his age. Yet his ideas — on natural goodness, democracy, childhood, and the corrupting power of society — helped ignite the French Revolution and transformed Western culture.',
   crisisTitle:'Society as Corruption',crisisText:'Hobbes: humans are naturally selfish; society restrains them. Locke: humans are naturally rational; society organises them. Rousseau: humans are naturally good; society corrupts them. <strong>The inequality, vanity, and competition that society produces are not natural — they are social inventions that deform human nature.</strong> The "noble savage" is not a fantasy but a philosophical thought experiment: what would human beings be like before civilisation got to them?',
   conflict:'The conflict is with the entire Enlightenment project of rational progress. Voltaire and the philosophes believed that reason, science, and civilisation make us better. Rousseau believed the opposite: our arts, sciences, and social institutions have made us worse. They have produced comparison, envy, vanity, and the corruption of the simple, natural satisfactions that once made us happy.',
   ideas:[{t:'Natural Goodness',d:'Humans are naturally good; it is society — with its inequality, vanity, competition — that corrupts. A direct inversion of Hobbes.'},{t:'General Will',d:'Political legitimacy rests on the "general will" — the collective interest of the people as a whole, which may differ from the mere sum of individual preferences.'},{t:'Noble Savage',d:'Not a claim about real indigenous people but a thought experiment: what does human nature look like before social conditioning? His answer: better than we are now.'},{t:'Natural Education',d:'His novel Emile proposed that children should be educated according to their natural development, not forced into adult roles — transforming educational theory.'}],
   payoffTitle:'The Revolution\'s Prophet',payoffText:'Robespierre carried a copy of the Social Contract during the Terror. The Declaration of the Rights of Man echoes Rousseau throughout. He helped give the French Revolution its theoretical basis — and bears some responsibility for its consequences. <strong>"Man is born free, and everywhere he is in chains" — eight words that changed history. The question of whether the chains are necessary, or whether they can be struck off, has never been settled.</strong>',
   works:[{title:'The Social Contract',year:'1762',note:'The basis of democratic legitimacy — and inspiration for the French Revolution'},{title:'Emile, or On Education',year:'1762',note:'A philosophical novel on natural education — transformed pedagogy'},{title:'Confessions',year:'1782',note:'His frank autobiography — a landmark in Western self-writing'}],
   quote:'"Man is born free, and everywhere he is in chains."',
   question:'Rousseau says society corrupts our natural goodness. But if we are naturally good, why did we build the corrupting society in the first place? Is the "natural" human Rousseau imagines a fantasy?',
   questionContext:'This is the deepest challenge to Rousseau\'s position. His defenders say inequality is the culprit, not socialisation per se. His critics say he romanticises a condition that never existed.',
   influenced:['kant','hegel','marx','wollstonecraft'],influencedBy:['locke','hobbes']},

  {id:'hume',name:'David Hume',dates:'1711–1776',era:'earlymodern',eraLabel:'Early Modern',school:'Empiricism',timelinePos:63,
   hook:'What if cause and effect is a story we tell ourselves?',
   hookContext:'The greatest Scottish sceptic. Hume took Locke\'s empiricism to its radical conclusion: if all knowledge comes from experience, then much of what we take for granted — causation, the self, induction — is actually just habit and custom. He was denied an academic post at Edinburgh for supposed atheism. His calm, cheerful death impressed even his enemies. Kant said Hume woke him from his "dogmatic slumber."',
   crisisTitle:'The Unravelling of Reason',crisisText:'We see a billiard ball strike another; we see the second ball move. We do not see causation. We never perceive necessity — only regularity. <strong>Causation is not observed; it is inferred. And induction — the inference from past regularities to future ones — cannot be rationally justified.</strong> The problem of induction is still unsolved. Science rests on it anyway.',
   conflict:'The conflict is with rationalist philosophy — the claim that reason alone can reveal necessary truths. Hume\'s response: reason can only tell us about relations between ideas; for matters of fact, we depend on experience. And experience never justifies the certainty we assume. The foundations of knowledge are much shakier than anyone had admitted.',
   ideas:[{t:'Problem of Induction',d:'We cannot rationally justify our belief that the future will resemble the past. All science rests on inductive inference that cannot be logically grounded. Still unsolved.'},{t:'Is-Ought Problem',d:'You cannot logically derive how things ought to be from how they are. The gap between fact and value is unbridgeable by logic alone.'},{t:'Bundle Theory of Self',d:'When he looks inward, Hume never finds a "self" — only a bundle of perceptions. Personal identity is a useful fiction, not a metaphysical reality.'},{t:'Causation as Custom',d:'We never perceive causation — only constant conjunction. The "necessary connection" is added by the mind, not found in nature.'}],
   payoffTitle:'Waking Kant from His Slumber',payoffText:'Hume published his Dialogues Concerning Natural Religion — a devastating critique of arguments for God\'s existence — posthumously. His calm, cheerful death impressed even his enemies. <strong>He told Kant, via his writings, that all previous philosophy had been "dogmatic slumber." Kant spent twelve years working out his response. The result was the Critique of Pure Reason — possibly the most important book in modern philosophy.</strong>',
   works:[{title:'A Treatise of Human Nature',year:'1739',note:'His greatest work — "fell dead-born from the press" initially'},{title:'An Enquiry Concerning Human Understanding',year:'1748',note:'A cleaner restatement — more accessible'},{title:'Dialogues Concerning Natural Religion',year:'1779',note:'His posthumous critique of theistic arguments — devastating'}],
   quote:'"Reason is, and ought only to be, the slave of the passions."',
   question:'If causation is just a habit of mind — not a feature of reality — does science describe the world or just describe our expectations about it? And does it matter which?',
   questionContext:'Karl Popper\'s solution was falsificationism — science doesn\'t prove theories true, it just fails to prove them false. Was that enough? Or is Hume\'s problem still a problem?',
   influenced:['kant','mill'],influencedBy:['locke']},

  // ── MODERN ──────────────────────────────────────────────
  {id:'kant',name:'Immanuel Kant',dates:'1724–1804',era:'modern',eraLabel:'Modern',school:'German Idealism',timelinePos:70,
   hook:'What if the mind doesn\'t receive reality — it creates it?',
   hookContext:'Königsberg, Prussia. Kant has never left a radius of 100 miles from his hometown. Neighbours set their clocks by his afternoon walk. He is 57 years old. He publishes a book that will be called the most important work of philosophy since the ancient Greeks. It takes twelve years to write. Nobody can understand it at first. It changes everything.',
   crisisTitle:'Hume Pulls the Floor Away',crisisText:'Kant was sleeping "dogmatically" — assuming that reason could reveal the nature of reality. Then he read Hume. Hume showed that causation cannot be derived from experience. <strong>If Hume is right, then Newton\'s entire framework — and the Enlightenment project of rational knowledge of nature — is threatened.</strong> Kant spent twelve years working out his response.',
   conflict:'Both empiricists and rationalists were right and wrong. The mind brings certain structures — space, time, causation — to experience. These are not in the world; they are contributed by us. But without experience, these structures have nothing to work on. Knowledge requires both.',
   ideas:[{t:'Categorical Imperative',d:'Act only according to a maxim you could will to become universal law. Morality is rational, unconditional, and utterly independent of consequences.'},{t:'Transcendental Idealism',d:'Space, time, and causation are forms the mind imposes on experience. We can never know the "thing-in-itself" — only things as they appear to us.'},{t:'Copernican Revolution',d:'Just as Copernicus moved the earth from the centre, Kant moved the knowing mind to the centre. Objects conform to the mind\'s structures.'},{t:'Autonomy',d:'Moral worth comes from acting from duty — from your own rational self-legislation. To be moral is to be self-governing. This is what human dignity consists in.'}],
   payoffTitle:'The Architecture of Everything',payoffText:'Kant\'s three Critiques attempted to give a complete account of knowledge, morality, and beauty. <strong>Almost everything that comes after in philosophy — Hegel, Marx, Nietzsche, phenomenology, analytic philosophy — is either building on Kant or arguing with him. He didn\'t solve the problems. He defined what the problems were. That might be more important.</strong>',
   works:[{title:'Critique of Pure Reason',year:'1781',note:'One of the most important — and difficult — books in philosophy'},{title:'Groundwork of the Metaphysics of Morals',year:'1785',note:'The clearest statement of his ethics'},{title:'Critique of Judgement',year:'1790',note:'On beauty, the sublime, and purpose in nature'}],
   quote:'"Two things fill me with awe: the starry skies above me and the moral law within me."',
   question:'Kant says morality must be completely independent of consequences. But is this liveable? Can you make real moral decisions without ever considering what will happen?',
   questionContext:'The classic case: is it wrong to lie to a murderer about where your friend is hiding? Kant says yes. Does that answer feel right to you?',
   influenced:['hegel','schopenhauer','nietzsche'],influencedBy:['hume','descartes','rousseau']},

  {id:'hegel',name:'G.W.F. Hegel',dates:'1770–1831',era:'modern',eraLabel:'Modern',school:'German Idealism',timelinePos:73,
   hook:'What if history has a direction — and we are inside it?',
   hookContext:'Hegel completed his Phenomenology of Spirit in 1806 on the eve of the Battle of Jena, famously glimpsing Napoleon riding through the city and calling him "the world-soul on horseback." He saw in Napoleon the embodiment of his idea that history is Spirit becoming conscious of itself — freedom progressively realising itself in the world. Whether or not this was right, it is one of the most ambitious ideas anyone has ever had.',
   crisisTitle:'The Contradiction at the Heart of Things',crisisText:'Hegel\'s method is dialectical. Every position generates its own contradiction — thesis produces antithesis — and their conflict resolves in a higher synthesis which then generates a new contradiction. This is not a logical trick: <strong>Hegel claims this is how reality itself works.</strong> History moves forward through contradiction and its resolution. Ideas, institutions, and whole civilisations are stages in Spirit\'s journey toward self-knowledge.',
   conflict:'The conflict is with every static philosophy — every system that presents reality as a finished, coherent whole. For Hegel, reality is inherently dynamic, contradictory, and in process. The owl of Minerva spreads its wings only with the falling of dusk: philosophy always comes too late, comprehending a world only as it passes away.',
   ideas:[{t:'Dialectics',d:'Thesis generates antithesis; their conflict resolves in synthesis — which then generates a new antithesis. This is how thought and history move.'},{t:'Absolute Spirit',d:'The universe is Spirit (Geist) progressively coming to know itself through history. Art, religion, and philosophy are the three stages of Spirit\'s self-knowledge.'},{t:'Master-Slave Dialectic',d:'Self-consciousness requires recognition from another. The struggle for recognition generates the master-slave relationship — hugely influential on Marx and existentialism.'},{t:'The Owl of Minerva',d:'"The owl of Minerva spreads its wings only with the falling of dusk." Philosophy always comprehends a world only as it passes away.'}],
   payoffTitle:'The Philosopher of History',payoffText:'Hegel\'s influence is paradoxical — he is the most systematically ambitious philosopher since Aristotle, and almost nothing of his system is directly accepted today. But his method, his historical consciousness, his master-slave dialectic, and his sense that ideas have consequences — that thought and reality are deeply connected — permeates everything that came after. <strong>Marx stood him "on his head." Kierkegaard attacked him with bitter wit. Nietzsche tried to escape him. None fully succeeded.</strong>',
   works:[{title:'Phenomenology of Spirit',year:'1807',note:'His first great work — tracing consciousness\'s journey to absolute knowing'},{title:'Philosophy of Right',year:'1820',note:'His political philosophy — on family, civil society, and the state'},{title:'Lectures on the Philosophy of History',year:'1837',note:'His account of history as the development of freedom — published posthumously'}],
   quote:'"The owl of Minerva spreads its wings only with the falling of dusk."',
   question:'Hegel argues history has a direction — toward the progressive realisation of freedom. Looking at the 20th century — world wars, genocide, totalitarianism — does this claim hold up? Or does history have no direction at all?',
   questionContext:'Fukuyama famously argued after 1989 that liberal democracy represents the "end of history" in Hegel\'s sense. The subsequent decades have made that claim look premature. What does the evidence suggest?',
   influenced:['marx','kierkegaard','nietzsche','sartre'],influencedBy:['kant','spinoza','rousseau']},

  {id:'schopenhauer',name:'Arthur Schopenhauer',dates:'1788–1860',era:'modern',eraLabel:'Modern',school:'Voluntarism',timelinePos:75,
   hook:'Beneath reason and consciousness lies a blind, insatiable Will.',
   hookContext:'Schopenhauer was brilliant, cantankerous, and convinced of his own genius. He scheduled his lectures at Berlin at the same time as Hegel\'s and was humiliated when no one came. He waited thirty years for recognition, spending his days in Frankfurt with his poodles, eating alone at restaurants, reading the newspapers. When fame finally came in his sixties, he was vindicated — but also deeply, constitutionally dissatisfied. He understood why before anyone else did.',
   crisisTitle:'The Will That Cannot Be Satisfied',crisisText:'Kant had argued we cannot know the "thing-in-itself" — reality beyond our experience. Schopenhauer disagreed: we have direct access to the thing-in-itself through our own bodies. And what we find there is not reason, not Spirit, not goodwill — but Will: a blind, purposeless, insatiable striving. <strong>The entire universe is Will — constantly desiring, never satisfied.</strong> Every organism is a local manifestation of cosmic striving with no end.',
   conflict:'The conflict is with Hegel\'s optimism — the idea that history is Spirit progressing toward self-realisation and freedom. For Schopenhauer, this is fantasy. There is no cosmic purpose, no historical progress toward the good. There is only the Will, endlessly striving, briefly satisfied, immediately replaced by new desire. Life is suffering punctuated by boredom.',
   ideas:[{t:'The Will',d:'Beneath everything — including reason and consciousness — lies a blind, insatiable Will. It is the thing-in-itself that Kant said was unknowable.'},{t:'Pessimism',d:'Life is suffering. Desire is never finally satisfied; its satisfaction leads only to boredom before the next desire arises. The honest response is pessimism.'},{t:'Art as Liberation',d:'In aesthetic contemplation — especially music — we momentarily escape the tyranny of the Will. Art is the only genuine, if temporary, redemption.'},{t:'Compassion',d:'The only genuine moral motivation is compassion — the recognition that others suffer as we do. All genuine virtue flows from this.'}],
   payoffTitle:'The Pessimist Who Was Right',payoffText:'Schopenhauer\'s influence is almost entirely subterranean — he rarely gets the credit for ideas that flowed through him. Nietzsche was his devoted reader before breaking violently with him. Wagner read him obsessively and claimed The World as Will and Representation shaped the Ring cycle. Freud acknowledged a debt. <strong>The unconscious drive beneath rational consciousness that Freud made famous — Schopenhauer had it first, called it Will, and worked out its implications with terrifying clarity.</strong>',
   works:[{title:'The World as Will and Representation',year:'1818',note:'His complete philosophical system — waited forty years for its reception'},{title:'Essays and Aphorisms',year:'1851',note:'Witty, accessible, enormously readable — his most popular work'}],
   quote:'"Talent hits a target no one else can hit; genius hits a target no one else can see."',
   question:'Schopenhauer argues life is fundamentally suffering — the Will is never satisfied, only temporarily quieted. Is this pessimism a counsel of despair, or is it a more honest account of human experience than cheerful optimism?',
   questionContext:'Buddhism, which Schopenhauer read carefully, makes a similar claim: existence is suffering (dukkha), rooted in craving. The proposed solutions differ. Which resonates more with your experience?',
   influenced:['nietzsche','wittgenstein'],influencedBy:['kant']},

  {id:'marx',name:'Karl Marx',dates:'1818–1883',era:'modern',eraLabel:'Modern',school:'Marxism',timelinePos:78,
   hook:'What if ideas are just the disguise that power wears?',
   hookContext:'Marx spent his adult life in poverty in London, sustained by Friedrich Engels. He worked in the British Museum reading room for decades. He buried two of his children while writing Capital. He was exiled from three countries. He never ran a state or commanded an army. And yet by the end of the 20th century, a third of the world\'s population lived under governments claiming to govern in his name.',
   crisisTitle:'The Material Basis of Everything',crisisText:'Hegel argued history is driven by the development of Spirit — ideas, consciousness, self-knowledge. Marx turned Hegel "on his head." <strong>History is driven not by ideas but by material conditions — by how people organise the production of what they need to live.</strong> The economic base shapes everything else: law, politics, culture, religion, philosophy itself. The ruling ideas of any age are the ideas of the ruling class.',
   conflict:'The conflict is with every philosophy that treats ideas as primary and independent. For Marx, even philosophy is an expression of class interests. This creates the uncomfortable question he never fully answered: if all ideas are ideologically conditioned, how does his own critique of ideology escape that condition?',
   ideas:[{t:'Historical Materialism',d:'History is driven by material conditions of production — the economic base shapes the legal, political, and ideological superstructure.'},{t:'Class Struggle',d:'"The history of all hitherto existing society is the history of class struggles." The conflict between bourgeoisie and proletariat drives capitalist history.'},{t:'Alienation',d:'Under capitalism, workers are alienated from the product of their labour, from the act of production, from other workers, and from their own human nature.'},{t:'Ideology',d:'The ruling ideas are the ideas of the ruling class — how economic interests shape culture and philosophy while appearing to be universal truths.'}],
   payoffTitle:'The Most Consequential Failure',payoffText:'Every state that attempted to implement Marxism produced outcomes Marx would have found appalling — authoritarian, repressive, often murderous. His theory predicted revolution in the most advanced capitalist countries; it happened in the most backward. <strong>And yet his analysis of capitalism — alienated labour, tendency toward monopoly, the commodification of everything — has proved strikingly prescient about 21st century conditions.</strong>',
   works:[{title:'The Communist Manifesto',year:'1848',note:'The most influential political pamphlet ever written'},{title:'Capital, Vol. I',year:'1867',note:'His monumental critique of the capitalist mode of production'},{title:'Economic and Philosophic Manuscripts',year:'1844',note:'His early humanistic writings on alienation'}],
   quote:'"Philosophers have only interpreted the world. The point is to change it."',
   question:'Marx says your ideas, values, and beliefs are shaped by your class position and material interests. Does that apply to your own beliefs right now? And if so, what should you do about it?',
   questionContext:'This is perhaps the most uncomfortable philosophical question you can ask yourself. Which of your political or moral beliefs might be self-interested rather than genuinely principled?',
   influenced:['sartre','foucault'],influencedBy:['hegel','rousseau']},

  {id:'kierkegaard',name:'Søren Kierkegaard',dates:'1813–1855',era:'modern',eraLabel:'Modern',school:'Existentialism',timelinePos:76,
   hook:'What if becoming yourself is the hardest thing you will ever do?',
   hookContext:'Kierkegaard was born in Copenhagen into a wealthy family haunted by melancholy and what his father believed was a divine curse. He broke off his engagement to Regine Olsen — an event that haunted him for life — and devoted himself entirely to writing, publishing prolifically under a bewildering array of pseudonyms. He died at 42, possibly from the strain of a virulent attack on the Danish church he had launched the year before.',
   crisisTitle:'The Attack on the System',crisisText:'Hegel had constructed a vast philosophical system that claimed to comprehend all of reality — history, nature, thought — within a single dialectical movement. Kierkegaard\'s response was bitter and personal: <strong>you cannot put a living human being inside a system.</strong> The existing individual — with their anxiety, their choices, their suffering, their relationship to God — cannot be captured in a logical category. Existence always exceeds the concept.',
   conflict:'The conflict is with abstract, systematic philosophy — and with the comfortable mediocrity of Danish bourgeois Christianity. Kierkegaard wanted to reintroduce difficulty into both. Real Christianity is not cultural conformism — it is a terrifying, individual confrontation with the absolute. Real philosophy is not system-building — it is the passionate, subjective engagement of an existing individual with the questions that matter.',
   ideas:[{t:'Leap of Faith',d:'Reason cannot reach God. The movement to faith requires a "leap" — a passionate, subjective commitment that transcends rational justification.'},{t:'Three Stages',d:'Three stages of existence: the aesthetic (pleasure-seeking), the ethical (duty-bound), the religious (relating to God beyond ethics). Most people never leave the first.'},{t:'Subjectivity is Truth',d:'"Subjectivity is truth" — objective, detached knowledge misses what matters most. Existential truth is always personally appropriated.'},{t:'Anxiety and Despair',d:'Anxiety is the "dizziness of freedom" — the vertigo of infinite possibility. Despair is the failure to become oneself. These are the conditions of the human situation.'}],
   payoffTitle:'The Father of Existentialism',payoffText:'Kierkegaard was almost entirely unknown outside Denmark in his lifetime. After his death, his work was translated into German — and immediately devoured by Heidegger, Sartre, and the entire existentialist tradition. <strong>He had invented existentialism fifty years before anyone called it that. The individual, anxiety, authenticity, the leap, the stages — all the key concepts were already there, waiting to be discovered.</strong>',
   works:[{title:'Either/Or',year:'1843',note:'His great work on aesthetic vs ethical existence — under a pseudonym'},{title:'Fear and Trembling',year:'1843',note:'On faith, Abraham, and the teleological suspension of the ethical'},{title:'The Sickness Unto Death',year:'1849',note:'His analysis of despair as the failure of selfhood'}],
   quote:'"The most common form of despair is not being who you are."',
   question:'Kierkegaard says the leap of faith cannot be rationally justified — it is a passionate, subjective commitment. But is a belief that cannot be rationally justified a belief worth having? Or is that precisely the point?',
   questionContext:'This is the core tension between faith and reason. Kierkegaard would say that demanding rational justification for faith completely misunderstands what faith is. Do you agree?',
   influenced:['nietzsche','heidegger','sartre','camus'],influencedBy:['hegel']},

  {id:'nietzsche',name:'Friedrich Nietzsche',dates:'1844–1900',era:'modern',eraLabel:'Modern',school:'Existentialism',timelinePos:82,
   hook:'God is dead. Now what?',
   hookContext:'1882. A madman runs into the marketplace crying "God is dead! We have killed him!" The crowd laughs. Nietzsche is not announcing atheism — he is announcing a catastrophe. The death of God means the collapse of the entire framework of meaning, morality, and value that Western civilisation has been built on for two thousand years. Most people haven\'t noticed yet. That is the most terrifying part.',
   crisisTitle:'The Abyss of Nihilism',crisisText:'Science had killed God. But God had been doing a lot of work — grounding morality, providing purpose, underwriting the value of truth. If there is no God, why is anything good? <strong>Most of Nietzsche\'s contemporaries responded in two ways: they kept the Christian morality without the metaphysics (secular humanism), or they fell into nihilism.</strong> Nietzsche thought both were cowardice. The real response to God\'s death is terrifying: create your own values.',
   conflict:'The conflict is with the entire tradition of Western morality — especially what Nietzsche calls "slave morality": the values of the weak dressed up as universal ethics. Humility, pity, equality — virtues invented by those who lacked power. His most controversial claim: our moral framework is a historical accident rooted in resentment.',
   ideas:[{t:'Will to Power',d:'The fundamental drive is not self-preservation but self-overcoming — the drive toward growth, creativity, mastery. The will to become more than you are.'},{t:'Eternal Recurrence',d:'What if you had to live your exact life over and over, eternally? Could you say yes to every moment? This is the test of genuine self-affirmation.'},{t:'Übermensch',d:'Not a racial superman. The person who creates their own values in the wake of God\'s death — an artist of existence, not a racial concept.'},{t:'Perspectivism',d:'There is no view from nowhere. Every claim to truth is a perspective — shaped by biology, history, power. This does not mean all perspectives are equal.'}],
   payoffTitle:'The Most Dangerous Philosopher to Misread',payoffText:'In 1889 Nietzsche collapsed in Turin and never recovered his sanity. His sister Elisabeth — a Nazi sympathiser — edited his unpublished notes to serve her politics. <strong>He despised German nationalism and anti-Semitism. His actual target was mediocrity, conformity, and bad faith. He remains the most dangerous philosopher to misread — and the most rewarding to read carefully.</strong>',
   works:[{title:'Thus Spoke Zarathustra',year:'1883–85',note:'His most famous work — a philosophical poem'},{title:'Beyond Good and Evil',year:'1886',note:'His most systematic mature work'},{title:'On the Genealogy of Morality',year:'1887',note:'A historical investigation of how our moral values came to be'}],
   quote:'"That which does not kill us makes us stronger."',
   question:'Nietzsche says we must create our own values — but where do values come from if not from something outside us? How do you distinguish genuine self-creation from mere self-indulgence?',
   questionContext:'In a culture that valorises "authenticity" and "living your truth," Nietzsche\'s challenge: are you actually creating your values, or just consuming someone else\'s and calling them your own?',
   influenced:['heidegger','sartre','foucault'],influencedBy:['schopenhauer','hegel','kant','kierkegaard']},

  // ── CONTEMPORARY ────────────────────────────────────────
  {id:'wittgenstein',name:'Ludwig Wittgenstein',dates:'1889–1951',era:'contemporary',eraLabel:'Contemporary',school:'Analytic',timelinePos:88,
   hook:'What if most philosophical problems are just language going on holiday?',
   hookContext:'Wittgenstein came to Cambridge to study aeronautics. He fell under Russell\'s influence and switched to philosophy. He gave away his vast fortune, worked as a village schoolteacher, a gardener in a monastery, a hospital porter. He published one book in his lifetime — the Tractatus — convinced he had solved all philosophical problems. He then returned to philosophy and spent twenty years undermining almost everything in it.',
   crisisTitle:'The Limits of Language',crisisText:'The Tractatus Wittgenstein: language has a definite structure. Propositions are pictures of possible states of affairs. What can be said clearly, can be said; the rest must be passed over in silence. The Philosophical Investigations Wittgenstein: <strong>wrong.</strong> Language is not a picture of reality. Words mean what they do within practices, forms of life, language games. There is no hidden logical structure beneath ordinary language — only use.',
   conflict:'The conflict is with the entire tradition of philosophy that assumes language transparently represents reality. Most philosophical "problems" arise from misusing language — taking words out of their natural contexts and asking them to do impossible work. Philosophy\'s job is not to solve these problems but to dissolve them.',
   ideas:[{t:'Language Games',d:'Words have meaning only within "language games" — shared practices with their own rules. Meaning is use, not reference to things in the world.'},{t:'Forms of Life',d:'Language games are embedded in forms of life — shared human practices. Philosophy cannot float free of these.'},{t:'Therapeutic Philosophy',d:'"The philosopher treats a question like an illness." Philosophy\'s job is to dissolve confusions — to show the fly the way out of the fly-bottle.'},{t:'The Picture Theory',d:'His early view: propositions picture possible states of affairs. He later abandoned this — but it is a beautiful theory while it lasts.'}],
   payoffTitle:'Two Philosophies, One Man',payoffText:'No philosopher has convincingly rejected their own early work and built something entirely different — and been right both times. <strong>The Tractatus is one of the great works of analytic philosophy. The Investigations is one of the great works of philosophy full stop. He transformed the discipline twice in fifty years. Russell called him "the most perfect example of genius as traditionally conceived."</strong>',
   works:[{title:'Tractatus Logico-Philosophicus',year:'1921',note:'His early masterpiece — the logical limits of language'},{title:'Philosophical Investigations',year:'1953',note:'His late masterpiece — published posthumously, overturns the Tractatus'}],
   quote:'"The limits of my language mean the limits of my world."',
   question:'Wittgenstein says philosophical problems arise from language going "on holiday" — taken out of its natural context. But is that dismissal of philosophy, or the deepest philosophical insight?',
   questionContext:'If the big questions — consciousness, God, meaning — are really just linguistic confusions, should we be relieved or horrified?',
   influenced:['rorty'],influencedBy:['russell','schopenhauer']},

  {id:'heidegger',name:'Martin Heidegger',dates:'1889–1976',era:'contemporary',eraLabel:'Contemporary',school:'Phenomenology',timelinePos:90,
   hook:'What does it actually mean to exist?',
   hookContext:'Not "what exists" — Heidegger thought that was the wrong question, and that Western philosophy had been asking it for two and a half millennia while ignoring the prior question. Not the existence of tables and chairs. But existence itself — the sheer fact that there is something rather than nothing. Being and Time, published in 1927, was an immediate sensation. It was also implicated, seven years later, in one of the darkest chapters of 20th century history.',
   crisisTitle:'The Forgetting of Being',crisisText:'Western philosophy since Plato has focused on beings — on what things are, what they\'re made of. It has forgotten to ask about Being itself — the condition of possibility for any being to exist. <strong>This "forgetting of Being" is not a philosophical oversight; it is connected to the domination of technology, the reduction of everything to resources to be used.</strong> The question of Being is not academic. It is the most urgent question there is.',
   conflict:'The devastating biographical conflict: Heidegger joined the Nazi Party in 1933 and served as rector of Freiburg University. He delivered speeches praising Hitler. His student and former lover Hannah Arendt called him "the secret king of thinking" — and spent decades wrestling with how his philosophy related to his politics. He never adequately addressed his Nazi involvement.',
   ideas:[{t:'Being-in-the-world',d:'Dasein is always already "in" a world — embedded in practices, tools, and others. The Cartesian isolated subject is an abstraction.'},{t:'Dasein',d:'The human kind of being — the being for whom its own existence is a question. We are not just present in the world like rocks; we relate to our own existence.'},{t:'Authenticity',d:'Most of the time we live inauthentically — absorbed in "the They." Authenticity requires owning our ownmost possibilities, including death.'},{t:'Being-toward-death',d:'Death is not an event at the end — it is a possibility that structures your entire existence. Authentic life means living in full awareness of your finitude.'}],
   payoffTitle:'Genius and Catastrophe',payoffText:'Sartre, Foucault, Derrida, and the entire postwar continental tradition are unthinkable without Being and Time. <strong>The question of how to read a great thinker who was also a moral catastrophe has no comfortable answer. Heidegger forces it on you. He is the test case for whether great philosophy can coexist with personal evil.</strong>',
   works:[{title:'Being and Time',year:'1927',note:'His masterwork — one of the most influential books of the century'},{title:'The Question Concerning Technology',year:'1954',note:'On how technology reshapes human existence'}],
   quote:'"Making itself intelligible is suicide for philosophy."',
   question:'Heidegger was a great philosopher and a Nazi. Does it matter? Can you separate the philosophy from the philosopher — or does what he did tell us something about what he thought?',
   questionContext:'This question applies beyond Heidegger: Rousseau abandoned his children, Jefferson owned slaves, Wittgenstein was often cruel. Does character matter for philosophy?',
   influenced:['sartre','foucault','derrida'],influencedBy:['nietzsche','kierkegaard']},

  {id:'sartre',name:'Jean-Paul Sartre',dates:'1905–1980',era:'contemporary',eraLabel:'Contemporary',school:'Existentialism',timelinePos:92,
   hook:'You are condemned to be free. There is no escape.',
   hookContext:'Paris, 1945. World War Two has ended. The Nazi occupation has proved that ordinary people chose to collaborate or chose to resist — and that both were choices. Sartre\'s philosophy is the reckoning with this fact. No one could claim they had no choice. Everyone was responsible.',
   crisisTitle:'The Weight of Total Responsibility',crisisText:'There is no human nature, no God, no determinism to excuse you. You were not born with a fixed essence. <strong>"Existence precedes essence"</strong> — you exist first, then define yourself through choices. This sounds liberating. It is also terrifying. You cannot blame your upbringing, your culture, your biology. Every collaborator chose to collaborate. Every resistant chose to resist.',
   conflict:'The conflict is with every system — religious, psychological, political — that offers to relieve you of your freedom. Sartre calls this "bad faith": pretending you are determined by your role, your past, your nature. The waiter who is too perfectly a waiter is in bad faith. He is fleeing the fact that he chose this job and could leave it.',
   ideas:[{t:'Existence Precedes Essence',d:'For humans — unlike hammers — there is no blueprint. We exist first, then create our own essence through choices. No human nature to fall back on.'},{t:'Radical Freedom',d:'"Condemned to be free." Even in chains, even under occupation, we choose how to respond. Freedom is not a gift — it is an inescapable burden.'},{t:'Bad Faith',d:'Fleeing freedom by treating ourselves as determined — by role, past, nature. Self-deception that is always available and always tempting.'},{t:'Being-for-Others',d:'"Hell is other people" — because the presence of others transforms us into objects defined by their gaze.'}],
   payoffTitle:'The Philosopher Who Refused the Prize',payoffText:'Sartre refused the Nobel Prize for Literature in 1964 — he had always declined official honours, not wanting to be institutionalised. He was catastrophically wrong about Stalinism, defending it long after the evidence was clear. <strong>But he took the idea of engagement seriously: if you are free and responsible for your freedom, neutrality is itself a choice. You cannot opt out.</strong>',
   works:[{title:'Being and Nothingness',year:'1943',note:'His philosophical masterwork — massive, dense, transformative'},{title:'Existentialism is a Humanism',year:'1945',note:'His accessible public lecture — the best introduction'},{title:'Nausea',year:'1938',note:'His novel — existence experienced from the inside'}],
   quote:'"Existence precedes essence."',
   question:'Sartre says you are "condemned to be free" — your choices define you with no excuses. But does this ignore real constraints of poverty, trauma, or oppression? Or is acknowledging those constraints itself a form of bad faith?',
   questionContext:'Marx says structure determines consciousness; Sartre says consciousness is radically free. Both feel true. Can they both be right — and if so, how do you live between them?',
   influenced:['beauvoir','foucault','camus'],influencedBy:['hegel','nietzsche','heidegger','kierkegaard']},

  {id:'camus',name:'Albert Camus',dates:'1913–1960',era:'contemporary',eraLabel:'Contemporary',school:'Absurdism',timelinePos:93,
   hook:'There is only one truly serious philosophical problem, and that is suicide.',
   hookContext:'That is the opening sentence of The Myth of Sisyphus. Camus means it seriously. If life has no inherent meaning — if the universe is utterly indifferent to human longing for significance — then why continue? Camus was born in Algeria in poverty, nearly died of tuberculosis at 17, won the Nobel Prize at 44, and was killed in a car accident at 46. The unfinished manuscript of what might have been his greatest novel was found in the wreckage.',
   crisisTitle:'The Confrontation with Absurdity',crisisText:'The absurd arises from the confrontation between human need for meaning and the universe\'s complete silence. <strong>Neither side can be eliminated.</strong> You cannot abolish your hunger for meaning; the universe will not provide it. The absurd is the gap between what we need and what exists.',
   conflict:'The conflict is with two escape routes Camus refuses. First: suicide — the physical escape. Second: the philosophical "leap" — escape into religious or ideological faith. Both betray the honest confrontation with absurdity. The only authentic response is revolt: defiant, lucid, passionate engagement with life in full knowledge of its meaninglessness.',
   ideas:[{t:'The Absurd',d:'The confrontation between human need for meaning and the universe\'s silence. Neither can be eliminated. The absurd is the condition we must inhabit honestly.'},{t:'Revolt',d:'The response to absurdity is not despair or faith but revolt — refusing both suicide and the leap. Living fully in the face of meaninglessness.'},{t:'Myth of Sisyphus',d:'Condemned to roll his boulder up for eternity. The moment of watching it roll down, choosing to go back, is the moment of freedom. "One must imagine Sisyphus happy."'},{t:'Solidarity',d:'His later work moved toward solidarity — we face the absurd together. Compassion and resistance are the appropriate responses.'}],
   payoffTitle:'The Mediterranean Clarity',payoffText:'Camus quarrelled publicly with Sartre — their break was one of the great intellectual ruptures of the 20th century — over whether revolutionary ends justify violent means. Camus said no. <strong>His refusal of ideological justifications for violence — his insistence on clarity, limits, and the value of individual human life — made him seem naive in 1952. In the century of revolutionary terror, it looks like wisdom.</strong>',
   works:[{title:'The Myth of Sisyphus',year:'1942',note:'His philosophical essay on the absurd'},{title:'The Stranger',year:'1942',note:'His most famous novel — Meursault\'s radical indifference'},{title:'The Rebel',year:'1951',note:'On revolt, revolution, and limits — caused his break with Sartre'}],
   quote:'"One must imagine Sisyphus happy."',
   question:'Camus says the only honest response to a meaningless universe is revolt — defiant engagement. But if you respond to meaninglessness with passionate engagement, haven\'t you just created meaning? Is absurdism self-undermining?',
   questionContext:'If living the absurd requires passionate engagement with life, is that not itself a form of meaning-making? Can you coherently embrace meaninglessness as a life philosophy?',
   influenced:[],influencedBy:['nietzsche','kierkegaard','sartre']},

  {id:'beauvoir',name:'Simone de Beauvoir',dates:'1908–1986',era:'contemporary',eraLabel:'Contemporary',school:'Feminism',timelinePos:94,
   hook:'One is not born, but becomes, a woman.',
   hookContext:'De Beauvoir came second in the agrégation — France\'s most competitive philosophy examination — behind Sartre, who always maintained she was the better philosopher. She was twenty-one. In 1949, she published The Second Sex. It was immediately condemned, banned, and put on the Vatican\'s Index. It is one of the founding documents of modern feminism.',
   crisisTitle:'The Problem of the Other',crisisText:'Hegel argued self-consciousness requires recognition from another — we define ourselves against what we are not. De Beauvoir asked: <strong>what about those historically defined as the Other — defined not by themselves but by another\'s consciousness?</strong> Women have not been subjects who define themselves. They have been objects defined by men. This is not biology — it is history, culture, power.',
   conflict:'The conflict is with both sexist society and with Sartre\'s existentialism, which she extends and corrects. Pure existential freedom ignores the situation — the material, historical, bodily circumstances in which freedom is exercised. Women\'s situation has been one of systematic oppression, and philosophy that ignores this is philosophy in bad faith.',
   ideas:[{t:'Situated Freedom',d:'Freedom is always exercised in a situation — economic, historical, bodily. The existentialist emphasis on radical freedom must be balanced against the structures that constrain it.'},{t:'Becoming Woman',d:'"One is not born, but becomes, a woman." Gender is not a biological given but a historical and social construction.'},{t:'Ethics of Ambiguity',d:'We are ambiguous beings — both free and factical. Ethics must begin from this ambiguity, not pretend it away.'},{t:'The Other',d:'Women have been defined as man\'s "Other." Liberation requires refusing this definition and claiming one\'s own subjectivity.'}],
   payoffTitle:'The Philosopher Who Made History Possible',payoffText:'Without The Second Sex there is no second-wave feminism as it actually happened. De Beauvoir gave the movement its intellectual architecture. <strong>She also wrote four volumes of autobiography that are among the finest prose of the 20th century — and lived a life that was itself a philosophical experiment in freedom, solidarity, and the refusal of bourgeois convention.</strong>',
   works:[{title:'The Second Sex',year:'1949',note:'Her feminist masterwork — still the starting point for feminist philosophy'},{title:'The Ethics of Ambiguity',year:'1947',note:'Her most sustained philosophical work'},{title:'Memoirs of a Dutiful Daughter',year:'1958',note:'First volume of autobiography — extraordinary self-portrait'}],
   quote:'"One is not born, but becomes, a woman."',
   question:'De Beauvoir argues gender is a social construction, not a biological given. But if gender is constructed, what exactly is being constructed? Is there a pre-gendered self that gets shaped — or does the shaping go all the way down?',
   questionContext:'This question has intensified in contemporary debates about gender identity. De Beauvoir\'s framework is more complicated and useful here than either side of that debate usually acknowledges.',
   influenced:['butler'],influencedBy:['sartre','hegel','wollstonecraft']},

  {id:'foucault',name:'Michel Foucault',dates:'1926–1984',era:'contemporary',eraLabel:'Contemporary',school:'Post-structuralism',timelinePos:96,
   hook:'What if the truth itself is a weapon?',
   hookContext:'We think of knowledge as neutral — the more we know, the freer we are. Foucault\'s life work is a sustained assault on this assumption. Knowledge is produced by institutions — hospitals, prisons, schools, psychiatry — that have interests. Those interests shape what counts as knowledge, who counts as sane, what counts as normal. The truth is not waiting to be discovered. It is manufactured.',
   crisisTitle:'The Asylum and the Prison',crisisText:'Why did we start locking up the mad? Before the 18th century, madness was part of the social fabric. Then asylums — thousands confined, classified, treated. The official answer: because we understood mental illness better. <strong>Foucault\'s answer: because a new social order needed a boundary between the normal and the abnormal.</strong> The asylum wasn\'t built to cure — it was built to define. What you call "treatment" is what power calls "control."',
   conflict:'The conflict is with the Enlightenment\'s story about itself — knowledge increases, institutions become more humane, freedom expands. Foucault\'s counter-story: the expansion of knowledge is the expansion of surveillance and control. Modern power doesn\'t primarily operate through chains — it operates through the clinic, the school, the census. It gets inside you.',
   ideas:[{t:'Power/Knowledge',d:'Power and knowledge are inseparable — every claim to knowledge is also an exercise of power. Truth is produced by power, not opposed to it.'},{t:'Genealogy',d:'Instead of asking "what is the truth of X?", ask "how did X come to be accepted as truth?" Madness, sexuality, the prison — all were invented, not discovered.'},{t:'Discourse',d:'A system of statements that determines what can be said, thought, and known in a given domain. Stepping outside your era\'s discourse is almost impossible.'},{t:'Biopolitics',d:'Modern power governs through the management of populations — their health, sexuality, birth rates. The body is a site of political control.'}],
   payoffTitle:'The Activist Philosopher',payoffText:'Foucault didn\'t just write about prisons — he organised with prisoners. He died of AIDS in 1984 — one of the first prominent intellectuals to do so. <strong>His work became foundational for every activist who believes that power operates not through spectacular violence but through the quiet normalisation of what counts as sane, healthy, and human. Social media, surveillance capitalism, the DSM — Foucault predicted the architecture of the present.</strong>',
   works:[{title:'Madness and Civilization',year:'1961',note:'The history of madness as the history of power'},{title:'Discipline and Punish',year:'1975',note:'The prison, the panopticon, and the society of surveillance'},{title:'The History of Sexuality, Vol. 1',year:'1976',note:'How sexuality became a domain of power/knowledge'}],
   quote:'"Knowledge is not for knowing: knowledge is for cutting."',
   question:'If all knowledge is shaped by power, does that apply to Foucault\'s own knowledge? Is his critique just another power move — and if so, does that undermine everything he says?',
   questionContext:'This is the charge of "performative contradiction." Is the alternative better: pretending some knowledge floats free of its historical and institutional context?',
   influenced:['butler'],influencedBy:['nietzsche','marx','heidegger','sartre']}
];

function loadVisited(){
  try{const v=localStorage.getItem('philosophia_visited');return v?new Set(JSON.parse(v)):new Set(['cover']);}
  catch{return new Set(['cover']);}
}
function saveVisited(){
  try{localStorage.setItem('philosophia_visited',JSON.stringify([...visited]));}catch{}
}
function loadBestScores(){
  try{const s=localStorage.getItem('philosophia_scores');return s?JSON.parse(s):{};}
  catch{return {};}
}
function saveBestScore(scope,score,total){
  const scores=loadBestScores();
  const pct=Math.round((score/total)*100);
  if(!scores[scope]||pct>scores[scope].pct){scores[scope]={pct,score,total,date:new Date().toLocaleDateString()};}
  try{localStorage.setItem('philosophia_scores',JSON.stringify(scores));}catch{}
}

const visited=loadVisited();

function resetProgress(){
  if(!confirm('Reset all progress? This will clear visited pages and quiz scores.'))return;
  try{localStorage.removeItem('philosophia_visited');localStorage.removeItem('philosophia_scores');}catch{}
  visited.clear();visited.add('cover');
  showPage('cover');
}

// ═══════════════════════════════════════════════════════════
// FORCE-DIRECTED MAP ENGINE
// ═══════════════════════════════════════════════════════════
function buildMap(canvasEl, filterEra='all'){
  const W=canvasEl.offsetWidth||900;
  const H=canvasEl.offsetHeight||520;
  canvasEl.width=W; canvasEl.height=H;
  const ctx=canvasEl.getContext('2d');

  const visNodes=filterEra==='all'?[...PHIL]:PHIL.filter(p=>p.era===filterEra);
  const visIds=new Set(visNodes.map(p=>p.id));
  const visLinks=LINKS.filter(([a,b])=>visIds.has(a)&&visIds.has(b));

  const inDeg={};
  visNodes.forEach(p=>inDeg[p.id]=0);
  visLinks.forEach(([a,b])=>inDeg[b]=(inDeg[b]||0)+1);

  // Initial positions: spread across canvas by era timeline position
  const eraOrder=['ancient','medieval','earlymodern','modern','contemporary'];
  const positions={};
  const eraGroups={};
  visNodes.forEach(p=>{if(!eraGroups[p.era])eraGroups[p.era]=[];eraGroups[p.era].push(p);});
  const visEras=eraOrder.filter(e=>eraGroups[e]);
  const laneW=W/(visEras.length||1);
  visEras.forEach((eraId,ei)=>{
    const group=eraGroups[eraId]||[];
    const cx=laneW*ei+laneW/2;
    group.forEach((p,pi)=>{
      const rows=group.length;
      const spacing=Math.min((H-120)/(rows+1),72);
      const startY=(H-spacing*(rows-1))/2;
      positions[p.id]={
        x:cx+(Math.sin(pi*2.3+ei)*laneW*0.22),
        y:startY+pi*spacing+(Math.cos(pi*1.7)*20),
        vx:(Math.random()-.5)*2,
        vy:(Math.random()-.5)*2
      };
    });
  });

  // Force simulation
  let simRunning=true;
  let alpha=1;
  function simulate(){
    if(!simRunning||alpha<0.005)return;
    alpha*=0.97;
    // Repulsion between all nodes
    visNodes.forEach(n=>{
      const p=positions[n.id];if(!p)return;
      visNodes.forEach(m=>{
        if(m===n)return;
        const q=positions[m.id];if(!q)return;
        const dx=p.x-q.x,dy=p.y-q.y;
        const dist=Math.sqrt(dx*dx+dy*dy)+0.1;
        const minDist=90+(inDeg[n.id]||0)*3+(inDeg[m.id]||0)*3;
        if(dist<minDist){
          const f=alpha*18000/(dist*dist);
          p.vx+=dx/dist*f; p.vy+=dy/dist*f;
        } else {
          const f=alpha*5000/(dist*dist);
          p.vx+=dx/dist*f; p.vy+=dy/dist*f;
        }
      });
    });
    // Attraction along links
    visLinks.forEach(([sid,tid])=>{
      const s=positions[sid],t=positions[tid];if(!s||!t)return;
      const dx=t.x-s.x,dy=t.y-s.y;
      const d=Math.sqrt(dx*dx+dy*dy)+.01;
      const ideal=170;
      const f=(d-ideal)*0.012*alpha;
      const fx=dx/d*f,fy=dy/d*f;
      s.vx+=fx; s.vy+=fy; t.vx-=fx; t.vy-=fy;
    });
    // Gravity to centre - weaker to allow spreading
    visNodes.forEach(n=>{
      const p=positions[n.id];if(!p)return;
      p.vx+=(W/2-p.x)*0.002*alpha;
      p.vy+=(H/2-p.y)*0.002*alpha;
    });
    // Era lane constraint — pull each node toward its era's column centre
    visNodes.forEach(n=>{
      const p=positions[n.id];if(!p)return;
      const ei=visEras.indexOf(n.era);
      if(ei<0)return;
      const targetX=laneW*ei+laneW/2;
      p.vx+=(targetX-p.x)*0.06*alpha;
    });
    // Apply with damping, clamp to canvas
    visNodes.forEach(n=>{
      const p=positions[n.id];if(!p)return;
      p.vx*=0.72; p.vy*=0.72;
      p.x+=p.vx; p.y+=p.vy;
      const r=9+(inDeg[n.id]||0)*2.5+16;
      p.x=Math.max(r,Math.min(W-r,p.x));
      p.y=Math.max(r,Math.min(H-r,p.y));
    });
  }

  let hoveredNode=null,selectedNode=null;
  let dragging=false,dragStart={x:0,y:0},camStart={x:0,y:0};
  let cam={x:0,y:0,scale:1};

  function toWorld(sx,sy){return{x:(sx-W/2)/cam.scale-cam.x+W/2,y:(sy-H/2)/cam.scale-cam.y+H/2};}

  function canvasXY(e){
    const rect=canvasEl.getBoundingClientRect();
    const scaleX=canvasEl.width/rect.width;
    const scaleY=canvasEl.height/rect.height;
    return{x:(e.clientX-rect.left)*scaleX,y:(e.clientY-rect.top)*scaleY};
  }

  function nodeAt(sx,sy){
    const w=toWorld(sx,sy);
    for(let i=visNodes.length-1;i>=0;i--){
      const n=visNodes[i];const p=positions[n.id];if(!p)continue;
      const r=9+(inDeg[n.id]||0)*2.5+4;
      if((w.x-p.x)**2+(w.y-p.y)**2<r*r)return n;
    }return null;
  }

  function hexRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(W/2,H/2);ctx.scale(cam.scale,cam.scale);ctx.translate(-W/2+cam.x,-H/2+cam.y);

    // Era labels
    if(filterEra==='all'){
      const eraColours={ancient:'rgba(200,169,110,0.8)',medieval:'rgba(93,181,163,0.8)',earlymodern:'rgba(107,95,148,0.8)',modern:'rgba(181,69,58,0.8)',contemporary:'rgba(154,150,144,0.65)'};
      visEras.forEach((eraId,ei)=>{
        const col=eraColours[eraId]||'rgba(154,150,144,0.6)';
        const colFaint=col.replace('0.8','0.12').replace('0.65','0.1');
        const colBorder=col.replace('0.8','0.35').replace('0.65','0.25');
        const label=(ERAS.find(e=>e.id===eraId)?.label||'').toUpperCase();
        const cx=laneW*ei+laneW/2;
        // Divider line
        if(ei>0){
          ctx.save();
          ctx.beginPath();ctx.moveTo(laneW*ei,28);ctx.lineTo(laneW*ei,H);
          ctx.strokeStyle=col.replace('0.8','0.2').replace('0.65','0.2');
          ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.stroke();
          ctx.setLineDash([]);ctx.restore();
        }
        // Measure and draw pill
        ctx.font=`500 9px 'DM Mono',monospace`;
        const tw=ctx.measureText(label).width;
        const ph=16,pw=tw+18,px=cx-pw/2,py=8,rad=3;
        // Pill background
        ctx.beginPath();
        ctx.moveTo(px+rad,py);ctx.lineTo(px+pw-rad,py);
        ctx.arcTo(px+pw,py,px+pw,py+rad,rad);
        ctx.lineTo(px+pw,py+ph-rad);
        ctx.arcTo(px+pw,py+ph,px+pw-rad,py+ph,rad);
        ctx.lineTo(px+rad,py+ph);
        ctx.arcTo(px,py+ph,px,py+ph-rad,rad);
        ctx.lineTo(px,py+rad);
        ctx.arcTo(px,py,px+rad,py,rad);
        ctx.closePath();
        ctx.fillStyle=colFaint;ctx.fill();
        ctx.strokeStyle=colBorder;ctx.lineWidth=0.75/cam.scale;ctx.stroke();
        // Label text
        ctx.fillStyle=col;ctx.textAlign='center';
        ctx.fillText(label,cx,py+ph-4);
        // Period dates below pill
        const era=ERAS.find(e=>e.id===eraId);
        if(era){
          const pfs=Math.max(7,7.5/cam.scale);
          ctx.font=`300 ${pfs}px 'DM Mono',monospace`;
          ctx.fillStyle=col.replace('0.8','0.45').replace('0.65','0.35');
          ctx.fillText(era.period,cx,py+ph+pfs+3);
        }
      });
    }

    // Links
    visLinks.forEach(([sid,tid])=>{
      const sp=positions[sid],tp=positions[tid];if(!sp||!tp)return;
      const hi=selectedNode&&(selectedNode.id===sid||selectedNode.id===tid);
      const dim=selectedNode&&!hi;
      const mx=(sp.x+tp.x)/2-(tp.y-sp.y)*0.07;
      const my=(sp.y+tp.y)/2+(tp.x-sp.x)*0.07;
      ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.quadraticCurveTo(mx,my,tp.x,tp.y);
      ctx.strokeStyle=dim?'rgba(107,95,148,0.03)':hi?'rgba(107,95,148,0.75)':'rgba(107,95,148,0.18)';
      ctx.lineWidth=(hi?1.8:0.8)/cam.scale;ctx.stroke();
      if(!dim){
        const dx=tp.x-mx,dy=tp.y-my,ang=Math.atan2(dy,dx);
        const r=(9+(inDeg[tid]||0)*2.5)+2;
        const ax=tp.x-Math.cos(ang)*r,ay=tp.y-Math.sin(ang)*r;
        ctx.save();ctx.translate(ax,ay);ctx.rotate(ang);
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-6/cam.scale,-3/cam.scale);ctx.lineTo(-6/cam.scale,3/cam.scale);ctx.closePath();
        ctx.fillStyle=hi?'rgba(107,95,148,0.75)':'rgba(107,95,148,0.22)';ctx.fill();ctx.restore();
      }
    });

    // Nodes
    visNodes.forEach(n=>{
      const p=positions[n.id];if(!p)return;
      const isSel=selectedNode&&selectedNode.id===n.id;
      const isConn=selectedNode&&visLinks.some(([a,b])=>(a===selectedNode.id&&b===n.id)||(b===selectedNode.id&&a===n.id));
      const isDim=selectedNode&&!isSel&&!isConn;
      const isHov=hoveredNode&&hoveredNode.id===n.id&&!isSel;
      const col=ERA_COLORS[n.era]||'#9a9690';
      const rgb=hexRgb(col);
      const r=9+(inDeg[n.id]||0)*2.5;
      const isVisited=visited.has('phil-'+n.id);

      if(isSel||isHov){
        const g=ctx.createRadialGradient(p.x,p.y,r,p.x,p.y,r+14);
        g.addColorStop(0,'rgba(107,95,148,0.22)');g.addColorStop(1,'rgba(107,95,148,0)');
        ctx.beginPath();ctx.arc(p.x,p.y,r+14,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      }

      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle=isDim?`rgba(${rgb.r},${rgb.g},${rgb.b},0.14)`:`rgba(${rgb.r},${rgb.g},${rgb.b},${isSel?1:isVisited?0.9:0.7})`;
      ctx.fill();
      ctx.strokeStyle=isSel?'rgba(107,95,148,0.95)':isVisited?`rgba(${rgb.r},${rgb.g},${rgb.b},0.9)`:`rgba(${rgb.r},${rgb.g},${rgb.b},0.35)`;
      ctx.lineWidth=(isSel?2.5:isVisited?2:1)/cam.scale;ctx.stroke();

      // Visited dot
      if(isVisited&&!isSel){
        ctx.beginPath();ctx.arc(p.x+r-2,p.y-r+2,3/cam.scale,0,Math.PI*2);
        ctx.fillStyle='rgba(200,169,110,0.9)';ctx.fill();
      }

      if(!isDim){
        const fs=Math.max(8,9/cam.scale);
        ctx.textAlign='center';
        // Name
        ctx.font=`${isSel?600:isVisited?400:300} ${fs}px 'Outfit',sans-serif`;
        ctx.fillStyle=isSel?'#18160f':'rgba(90,86,80,0.9)';
        ctx.fillText(n.name,p.x,p.y+r+fs+3);
        // Dates
        const dfs=Math.max(7,7.5/cam.scale);
        ctx.font=`300 ${dfs}px 'DM Mono',monospace`;
        ctx.fillStyle=isSel?'rgba(24,22,15,0.5)':'rgba(154,150,144,0.6)';
        const shortDate=n.dates.replace('c.','').split('–')[0].trim();
        ctx.fillText(shortDate,p.x,p.y+r+fs+dfs+5);
      }
    });

    ctx.restore();
    simulate();
    requestAnimationFrame(render);
  }

  render();

  canvasEl.addEventListener('mousedown',e=>{
    const{x,y}=canvasXY(e);
    const n=nodeAt(x,y);
    if(n){selectedNode=n;showPage('phil-'+n.id);}
    else{dragging=true;dragStart={x:e.clientX,y:e.clientY};camStart={x:cam.x,y:cam.y};selectedNode=null;}
  });
  canvasEl.addEventListener('mousemove',e=>{
    const{x,y}=canvasXY(e);
    if(dragging){cam.x=camStart.x+(e.clientX-dragStart.x)/cam.scale;cam.y=camStart.y+(e.clientY-dragStart.y)/cam.scale;}
    else{hoveredNode=nodeAt(x,y);canvasEl.style.cursor=hoveredNode?'pointer':'grab';}
  });
  canvasEl.addEventListener('mouseup',()=>dragging=false);
  canvasEl.addEventListener('mouseleave',()=>{dragging=false;hoveredNode=null;});
  canvasEl.addEventListener('wheel',e=>{e.preventDefault();cam.scale=Math.max(0.3,Math.min(4,cam.scale*(e.deltaY>0?0.92:1.09)));},{passive:false});

  // Stop simulation after settling
  setTimeout(()=>simRunning=false,12000);
  // Return restart function
  return ()=>{simRunning=true;alpha=0.5;setTimeout(()=>simRunning=false,5000);};
}

// ═══════════════════════════════════════════════════════════
// QUIZ DATA — minimum 3 per philosopher
// ═══════════════════════════════════════════════════════════
const QS=[
  // HERACLITUS
  {type:'mc',q:'Heraclitus is famous for saying "you cannot step into the same river twice." What does this illustrate?',opts:['The danger of water','The fundamental nature of change in reality','The unreliability of the senses','The importance of memory'],correct:1,phil:'heraclitus',feedback:'"Panta rei" — everything flows. Heraclitus argued change is not incidental to reality, it IS reality. The river example shows identity persisting through constant transformation.'},
  {type:'tf',q:'Heraclitus was known as "the Obscure One" because he wrote in deliberately difficult riddles.',correct:true,phil:'heraclitus',feedback:'Correct — Heraclitus wrote in aphorisms that required interpretation. He deposited his work in the temple of Artemis, suggesting he considered it too difficult for ordinary minds.'},
  {type:'tf',q:'Heraclitus believed that fire was the fundamental substance of all reality.',correct:true,phil:'heraclitus',feedback:'Correct — Heraclitus proposed fire as the arche (fundamental principle) because of its constant change and transformation. This fits his view that flux is fundamental.'},

  // CONFUCIUS
  {type:'mc',q:'What is "Ren" in Confucian philosophy?',opts:['Ritual propriety','Humaneness and benevolence — the supreme virtue','Scholarly achievement','Loyalty to the ruler'],correct:1,phil:'confucius',feedback:'Ren — humaneness — is Confucius\'s central virtue. "Do not impose on others what you yourself do not want" is his formulation of the Golden Rule. Ren is both the goal and the method.'},
  {type:'tf',q:'Confucius was a great political success and reformed Chinese government during his lifetime.',correct:false,phil:'confucius',feedback:'Confucius considered himself a failure — he spent 13 years wandering between states trying to persuade rulers and was mostly ignored. He died believing his mission had failed. He was spectacularly wrong.'},
  {type:'mc',q:'Confucius\'s concept of "rectification of names" means:',opts:['Changing your name when you change your role','Words must match reality — rulers must actually rule','Writing with correct characters','Formal education in classical texts'],correct:1,phil:'confucius',feedback:'"If names are not correct, speech will not accord with truth." For Confucius, language must match social reality. A ruler who does not rule should not be called a ruler.'},

  // LAOZI
  {type:'mc',q:'What does "Wu Wei" mean in Daoist philosophy?',opts:['Absolute inaction and withdrawal from society','Effortless action aligned with the nature of things','Strict moral discipline','Military strategy through deception'],correct:1,phil:'laozi',feedback:'Wu wei is not passivity — it\'s action that flows with rather than against the grain of things. Water is the Daoist image: soft, yielding, yet it carves canyons.'},
  {type:'tf',q:'The Tao Te Ching is the most translated book in history after the Bible.',correct:true,phil:'laozi',feedback:'Correct — remarkable for a text whose opening line declares that the Tao which can be spoken is not the eternal Tao. The book that says it cannot be captured has been captured in thousands of translations.'},
  {type:'mc',q:'Laozi\'s concept of "Pu" (the uncarved block) represents:',opts:['The state of perfect knowledge','The natural state before social conditioning shapes us','The ideal ruler','The emptiness of the Tao'],correct:1,phil:'laozi',feedback:'Pu — the uncarved block — represents the natural, unforced state before civilisation and desire impose their shapes. Return to simplicity; find sufficiency in what is.'},

  // SOCRATES
  {type:'tf',q:'Socrates wrote extensively — his ideas survive in dozens of books he authored.',correct:false,phil:'socrates',feedback:'Socrates wrote nothing. Everything we know of him comes through others — primarily Plato\'s dialogues. The most influential philosopher in Western history left not a single word of his own.'},
  {type:'mc',q:'What was Socrates charged with that led to his execution?',opts:['Theft and fraud','Corrupting the youth and impiety toward the gods','Treason against Athens','Teaching foreign philosophy'],correct:1,phil:'socrates',feedback:'Socrates was charged with corrupting the youth and impiety — but the real charge was making people think. He was exposing the ignorance of those in power, which threatened the social order.'},
  {type:'mc',q:'The Socratic method is best described as:',opts:['Memorising and reciting philosophical texts','Systematic questioning to expose hidden assumptions and pursue truth','Writing philosophical treatises','Learning through physical labour'],correct:1,phil:'socrates',feedback:'The Socratic method uses relentless questioning — not to win arguments, but to expose hidden assumptions, reveal contradictions, and pursue genuine understanding.'},

  // PLATO
  {type:'mc',q:'Plato\'s "Allegory of the Cave" is meant to illustrate:',opts:['The importance of democracy','The difference between appearance and reality','Why philosophy is dangerous','The nature of the afterlife'],correct:1,phil:'plato',feedback:'The cave represents the world of appearances; the sunlight outside represents the Forms — true reality. The philosopher\'s task is to escape the cave and return to help others.'},
  {type:'tf',q:'Plato was a student of Socrates and the teacher of Aristotle.',correct:true,phil:'plato',feedback:'Correct — this chain is one of the most consequential in intellectual history: Socrates → Plato → Aristotle → Alexander the Great.'},
  {type:'mc',q:'According to Plato\'s Theory of Forms, physical objects are:',opts:['The highest form of reality','Perfect expressions of divine creation','Imperfect copies of eternal, abstract Forms','Illusions with no reality at all'],correct:2,phil:'plato',feedback:'Physical things are imperfect copies of eternal Forms. The Form of Beauty, Justice, Goodness — these are more real than anything you can touch. True knowledge is knowledge of the Forms.'},

  // ARISTOTLE
  {type:'mc',q:'What is "Eudaimonia" in Aristotle\'s ethics?',opts:['Pleasure and comfort','Obedience to divine law','Human flourishing — living and doing well','Freedom from all desire'],correct:2,phil:'aristotle',feedback:'Eudaimonia is often translated as "happiness" but means flourishing — the full, active exercise of what makes us distinctively human, over a complete life.'},
  {type:'tf',q:'Aristotle agreed with Plato that the Forms are a separate realm of eternal reality.',correct:false,phil:'aristotle',feedback:'Aristotle rejected Plato\'s Theory of Forms as absurd. His critique: you haven\'t explained reality by doubling it. He looked outward at the world as it actually is, not upward at abstract Forms.'},
  {type:'mc',q:'Aristotle\'s "Golden Mean" means:',opts:['Having the same amount of everything','Virtue lies between the extremes of excess and deficiency','Following the most popular moral rules','Balancing reason and emotion equally'],correct:1,phil:'aristotle',feedback:'Courage is the mean between cowardice and recklessness. Generosity between miserliness and prodigality. Ethics requires judgement to find the right point — not rules.'},

  // SENECA
  {type:'mc',q:'Seneca\'s "On the Shortness of Life" argues that:',opts:['Life is too short to pursue philosophy','We are not given a short life — we make it short by wasting time','Death should be welcomed as liberation','The young should study and the old should rest'],correct:1,phil:'seneca',feedback:'"It is not that we have so little time, but that we waste so much of it." Seneca argues the problem is not the length of life but how we squander it — on busyness, distraction, and other people\'s agendas.'},
  {type:'tf',q:'Seneca died peacefully of old age after a long retirement from public life.',correct:false,phil:'seneca',feedback:'Seneca was ordered to commit suicide by Emperor Nero in 65 AD. He did so with characteristic Stoic composure, reassuring his distressed friends. His death was his most Stoic performance.'},
  {type:'mc',q:'Seneca\'s concept of "voluntary hardship" means:',opts:['Always choosing the harder option','Periodically practising poverty and discomfort to reduce fear of misfortune','Rejecting all material possessions permanently','Suffering as a spiritual discipline'],correct:1,phil:'seneca',feedback:'Seneca recommended periodic fasting, sleeping rough, wearing simple clothes — not as permanent asceticism, but as inoculation. What you\'ve practised enduring, you will not fear.'},

  // MARCUS AURELIUS
  {type:'tf',q:'The Meditations of Marcus Aurelius were written as a private journal, never intended for publication.',correct:true,phil:'marcus',feedback:'Correct — the Meditations are Marcus\'s private notes to himself, written in military camps. He was reminding himself daily of Stoic principles he struggled to live up to. He never intended anyone else to read them.'},
  {type:'mc',q:'Marcus Aurelius\'s "inner citadel" refers to:',opts:['The physical security of Rome','The rational mind that cannot be violated without our consent','The emperor\'s private chambers','The core of Stoic doctrine'],correct:1,phil:'marcus',feedback:'The inner citadel is the Stoic concept of the inviolable rational mind. No matter what external forces assail us, we retain the ability to choose our response. This is our ultimate freedom.'},
  {type:'mc',q:'The Stoic concept "memento mori" practised by Marcus Aurelius means:',opts:['Remember to be grateful','Remember that you will die — to sharpen your sense of what matters now','Remember the past clearly','Remember your duties'],correct:1,phil:'marcus',feedback:'"Memento mori" — remember death. Awareness of our mortality is not morbid for Marcus but clarifying: if you know you will die, you know what actually matters and stop wasting time on what doesn\'t.'},

  // IBN SINA
  {type:'mc',q:'Ibn Sina\'s "Flying Man" thought experiment anticipates which famous philosophical argument?',opts:['Kant\'s Categorical Imperative','Hume\'s problem of induction','Descartes\' Cogito ergo sum','Plato\'s Theory of Forms'],correct:2,phil:'avicenna',feedback:'Six hundred years before Descartes, Ibn Sina argued that a person with no sensory experience whatsoever would still know they exist as a thinking being — self-awareness is independent of the body.'},
  {type:'tf',q:'Ibn Sina\'s Canon of Medicine was used in European universities until the 17th century.',correct:true,phil:'avicenna',feedback:'Correct — the Canon of Medicine was the standard medical text in both Islamic and European universities for five centuries, a testament to the extraordinary reach of Islamic scholarship.'},
  {type:'mc',q:'Ibn Sina\'s concept of a "Necessary Being" is:',opts:['A being that exists everywhere simultaneously','Something that cannot not exist — his proof for God\'s existence','A being with perfect knowledge','A being outside of time'],correct:1,phil:'avicenna',feedback:'Contingent things might not exist. But there must ultimately be something that cannot not exist — a Necessary Being. This is Ibn Sina\'s cosmological argument for God\'s existence.'},

  // AQUINAS
  {type:'mc',q:'Aquinas\'s "Five Ways" are:',opts:['Five moral virtues derived from natural law','Five arguments for God\'s existence from natural reason','Five stages of spiritual enlightenment','Five principles of good governance'],correct:1,phil:'aquinas',feedback:'The Five Ways are arguments for God\'s existence from: motion, causation, contingency, degrees of perfection, and design. They remain the most rigorous classical theistic arguments.'},
  {type:'tf',q:'Aquinas believed that reason and faith are fundamentally incompatible.',correct:false,phil:'aquinas',feedback:'The opposite — Aquinas spent his life demonstrating their compatibility. His great project was synthesising Aristotelian philosophy with Christian theology, showing that apparent contradictions arise from errors in philosophy or theology, not from genuine conflict.'},
  {type:'mc',q:'Aquinas\'s "natural law" theory holds that:',opts:['Nature is red in tooth and claw','Moral law is grounded in human nature and accessible through reason alone','Laws of nature govern morality without God','Physical laws determine moral behaviour'],correct:1,phil:'aquinas',feedback:'Natural law is accessible through reason, not just revelation — which is why it can be the basis of both Catholic social teaching and secular jurisprudence.'},

  // WOLLSTONECRAFT
  {type:'mc',q:'Mary Wollstonecraft\'s main argument in A Vindication of the Rights of Woman is:',opts:['Women are naturally superior to men in moral virtue','Women\'s apparent inferiority is produced by inferior education, not inferior nature','Women should be educated separately from men','Emotional intelligence is more important than reason'],correct:1,phil:'wollstonecraft',feedback:'Wollstonecraft argued precisely that women are rational beings who have been systematically prevented from developing their rationality by an education designed to produce compliance rather than reason.'},
  {type:'tf',q:'Wollstonecraft agreed with Rousseau\'s views on women\'s education as expressed in Emile.',correct:false,phil:'wollstonecraft',feedback:'Wollstonecraft was scathingly critical of Rousseau\'s views on women\'s education — specifically his argument that women should be educated to please men. Her Vindication is partly a direct rebuttal of Emile.'},
  {type:'mc',q:'Wollstonecraft argued that the "cult of sensibility" was:',opts:['A positive development for women\'s self-expression','Dangerous — it cultivated weaknesses used to justify women\'s subordination','Irrelevant to the question of women\'s rights','A male conspiracy against women'],correct:1,phil:'wollstonecraft',feedback:'The Romantic celebration of feminine feeling and sensibility cultivated the very traits — emotional volatility, irrationality, dependence — that were then used to argue women were unfit for public life.'},

  // HOBBES
