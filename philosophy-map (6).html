function renderQuizPlaying(){
  const q=quizState.questions[quizState.current];
  const total=quizState.questions.length;
  const pct=Math.round((quizState.current/total)*100);
  const answered=quizState.answers[quizState.current]!==undefined;
  let qHTML='';
  if(q.type==='mc'||q.type==='portrait'||q.type==='oddone')qHTML=renderMC(q,answered);
  else if(q.type==='tf'||q.type==='agree')qHTML=renderAgree(q,answered);
  else if(q.type==='match')qHTML=renderMatch(q,answered);
  else if(q.type==='quote')qHTML=renderQuote(q,answered);
  else if(q.type==='first')qHTML=renderMC(q,answered);
  else if(q.type==='chrono')qHTML=renderChrono(q,answered);
  return`<div class="page active">
    <div class="quiz-hero" style="padding-bottom:32px;">
      <div class="quiz-hero-tag">Question ${quizState.current+1} of ${total}</div>
      <h2>The <strong>Quiz</strong></h2>
    </div>
    <div class="quiz-body">
      <div class="quiz-progress-row">
        <div class="qp-bar"><div class="qp-fill" style="width:${pct}%"></div></div>
        <div class="qp-label">${quizState.score}/${total} correct</div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:24px;">
        ${quizState.questions.map((_,i)=>`<div style="width:28px;height:4px;border-radius:2px;background:${i<quizState.current?'var(--teal)':i===quizState.current?'var(--violet)':'var(--rule)'}"></div>`).join('')}
      </div>
      ${qHTML}
      ${answered?`
      <div class="quiz-feedback show ${quizState.answers[quizState.current]===true||quizState.answers[quizState.current]===q.correct?'correct-fb':'incorrect-fb'}">
        <div class="fb-label">${quizState.answers[quizState.current]===true||quizState.answers[quizState.current]===q.correct?'✓ Correct':'✗ Not quite'}</div>
        <div class="fb-text">${q.feedback}</div>
      </div>
      <button class="quiz-next-btn" onclick="nextQuestion()" style="margin-top:8px;${quizState.current<total-1?'':'background:var(--gold);color:var(--ink);'}">${quizState.current<total-1?'Next question →':'See your results →'}</button>`:''}
    </div>
  </div>`;
}

function renderMC(q,answered){
  const ua=quizState.answers[quizState.current];
  const hasPortrait=q.portrait&&PORTRAITS[q.portrait];
  return`<div>
    <div class="qq-type">${q.type==='portrait'?'👤 Who is this philosopher?':q.type==='oddone'?'Odd one out — which doesn\'t belong?':'Multiple Choice'}</div>
    ${hasPortrait?`<div style="margin-bottom:20px;">
      <img src="${PORTRAITS[q.portrait]}" style="width:140px;height:140px;object-fit:cover;border-radius:8px;border:2px solid var(--rule);filter:grayscale(20%);display:block;" onerror="this.style.display='none'">
    </div>`:''}
    <div class="qq-text">${q.q}</div>
    <div class="quiz-options">
      ${q.opts.map((opt,i)=>{
        let cls='';
        if(answered){if(i===q.correct)cls='reveal-correct';else if(i===ua&&ua!==q.correct)cls='incorrect';}
        return`<div class="quiz-opt ${cls}" onclick="${answered?'':'answerMC('+i+')'}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span class="opt-text">${opt}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderAgree(q,answered){
  const isTF=q.type==='tf';
  const ua=quizState.answers[quizState.current];
  const tCls=answered?(q.correct===true?'reveal-correct':(ua===true&&q.correct!==true?'incorrect':'')):'';
  const fCls=answered?(q.correct===false?'reveal-correct':(ua===false&&q.correct!==false?'incorrect':'')):'';
  return`<div>
    <div class="qq-type">${isTF?'True or False':'Agree or Disagree'}</div>
    <div class="qq-text">${q.q}</div>
    <div class="quiz-tf-row">
      <button class="quiz-tf-btn ${tCls}" onclick="${answered?'':'answerTF(true)'}">
        ${isTF?'True':'Agree ✓'}
      </button>
      <button class="quiz-tf-btn ${fCls}" onclick="${answered?'':'answerTF(false)'}">
        ${isTF?'False':'Disagree ✗'}
      </button>
    </div>
  </div>`;
}

function renderTF(q,answered){
  const ua=quizState.answers[quizState.current];
  const tCls=answered?(q.correct===true?'reveal-correct':(ua===true&&q.correct!==true?'incorrect':'')):'';
  const fCls=answered?(q.correct===false?'reveal-correct':(ua===false&&q.correct!==false?'incorrect':'')):'';
  return`<div>
    <div class="qq-type">True or False</div>
    <div class="qq-text">${q.q}</div>
    <div class="quiz-tf-row">
      <button class="quiz-tf-btn ${tCls}" onclick="${answered?'':'answerTF(true)'}">True</button>
      <button class="quiz-tf-btn ${fCls}" onclick="${answered?'':'answerTF(false)'}">False</button>
    </div>
  </div>`;
}

function renderQuote(q,answered){
  const ua=quizState.answers[quizState.current];
  return`<div>
    <div class="qq-type">Who said this?</div>
    <div style="margin:0 0 24px;padding:24px 28px;border-left:3px solid var(--gold);background:var(--gold-light);border-radius:0 var(--radius) var(--radius) 0;">
      <div style="font-size:20px;font-weight:300;font-style:italic;color:var(--ink);line-height:1.5;">${q.q}</div>
    </div>
    <div class="quiz-options">
      ${q.opts.map((opt,i)=>{
        let cls='';
        if(answered){if(i===q.correct)cls='reveal-correct';else if(i===ua&&ua!==q.correct)cls='incorrect';}
        return`<div class="quiz-opt ${cls}" onclick="${answered?'':'answerMC('+i+')'}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span class="opt-text">${opt}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderChrono(q,answered){
  // Initialise order from quizState
  if(!quizState.chronoOrder){quizState.chronoOrder=[...q.items];}
  const order=quizState.chronoOrder;
  const correctOrder=q.correct.map(i=>q.items[i]);
  const isCorrect=answered&&order.every((item,i)=>item===correctOrder[i]);
  return`<div>
    <div class="qq-type">Put in order — drag or use arrows</div>
    <div class="qq-text">${q.q}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      ${order.map((item,i)=>{
        const pos=correctOrder.indexOf(item);
        const itemCorrect=answered&&pos===i;
        const itemWrong=answered&&pos!==i;
        return`<div style="display:flex;align-items:center;gap:10px;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--stone);width:16px;flex-shrink:0;">${i+1}</div>
          <div style="flex:1;padding:12px 16px;border:1px solid ${itemCorrect?'var(--teal)':itemWrong?'var(--red)':'var(--rule)'};border-radius:var(--radius);background:${itemCorrect?'var(--teal-light)':itemWrong?'var(--red-light)':'var(--warm-white)'};font-size:14px;font-weight:300;color:var(--ink);">${item}</div>
          ${!answered?`<div style="display:flex;flex-direction:column;gap:3px;">
            <button onclick="chronoMove(${i},-1)" style="background:none;border:1px solid var(--rule);border-radius:2px;padding:2px 7px;cursor:pointer;font-size:10px;color:var(--stone);" ${i===0?'disabled':''}>↑</button>
            <button onclick="chronoMove(${i},1)" style="background:none;border:1px solid var(--rule);border-radius:2px;padding:2px 7px;cursor:pointer;font-size:10px;color:var(--stone);" ${i===order.length-1?'disabled':''}>↓</button>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
    ${!answered?`<button class="quiz-next-btn" style="background:var(--violet);" onclick="submitChrono()">✓ Lock in my order</button>`:''}
  </div>`;
}

function renderMatch(q,answered){
  const lefts=q.pairs.map(p=>p.left);
  if(!quizState.matchShuffle){
    quizState.matchShuffle=[...q.pairs.map(p=>p.right)].sort(()=>Math.random()-.5);
  }
  const shuffled=quizState.matchShuffle;
  return`<div>
    <div class="qq-type">Match the pairs</div>
    <div class="qq-text">${q.q}</div>
    <div style="margin-bottom:10px;font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);">
      ${quizState.matchSelected?'→ Now select a match on the right':'Select a name on the left to start'}
    </div>
    <div class="match-grid">
      <div>
        <div class="match-col-label">Left</div>
        ${lefts.map((l,i)=>{
          const matched=quizState.matchAnswers[l];
          const isCorrect=matched===q.pairs[i].right;
          const cls=answered?(isCorrect?'matched-correct':'matched-incorrect'):(quizState.matchSelected===l?'selected-left':'');
          return`<div class="match-item ${cls}" onclick="${answered?'':'selectMatchLeft(\''+l.replace(/'/g,"\\'")+'\')'}">${l}</div>`;
        }).join('')}
      </div>
      <div>
        <div class="match-col-label">Right</div>
        ${shuffled.map(r=>{
          const isUsed=Object.values(quizState.matchAnswers).includes(r);
          const correctLeft=q.pairs.find(p=>p.right===r)?.left;
          const userLeft=Object.keys(quizState.matchAnswers).find(k=>quizState.matchAnswers[k]===r);
          const isCorrect=answered&&userLeft===correctLeft;
          const cls=answered?(isCorrect?'matched-correct':'matched-incorrect'):(isUsed?'used':'');
          return`<div class="match-item ${cls}" onclick="${answered||isUsed?'':'selectMatchRight(\''+r.replace(/'/g,"\\'")+'\')'}">${r}</div>`;
        }).join('')}
      </div>
    </div>
    ${(()=>{
      const allDone=!answered&&Object.keys(quizState.matchAnswers).length>=q.pairs.length;
      return allDone?`<button class="quiz-next-btn" style="margin-top:16px;background:var(--violet);" onclick="submitMatch()">✓ Check my answers</button>`:'';
    })()}
  </div>`;
}

window.chronoMove=function(idx,dir){
  if(!quizState.chronoOrder)return;
  const arr=quizState.chronoOrder;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  renderMain();
};
window.submitChrono=function(){
  const q=quizState.questions[quizState.current];
  const correctOrder=q.correct.map(i=>q.items[i]);
  const allCorrect=quizState.chronoOrder.every((item,i)=>item===correctOrder[i]);
  quizState.answers[quizState.current]=allCorrect;
  if(allCorrect)quizState.score++;
  renderMain();
};

window.answerMC=function(i){
  const q=quizState.questions[quizState.current];
  quizState.answers[quizState.current]=i;
  if(i===q.correct)quizState.score++;
  renderMain();
};
window.answerTF=function(val){
  const q=quizState.questions[quizState.current];
  quizState.answers[quizState.current]=val;
  if(val===q.correct)quizState.score++;
  renderMain();
};
window.selectMatchLeft=function(left){quizState.matchSelected=left;renderMain();};
window.selectMatchRight=function(right){
  if(quizState.matchSelected){
    quizState.matchAnswers[quizState.matchSelected]=right;
    quizState.matchSelected=null;
    // Re-render to show updated state and potentially Check answers button
    renderMain();
  } else {
    // No left selected — do nothing
  }
};
window.submitMatch=function(){
  const q=quizState.questions[quizState.current];
  let allCorrect=true;
  q.pairs.forEach(p=>{if(quizState.matchAnswers[p.left]!==p.right)allCorrect=false;});
  quizState.answers[quizState.current]=allCorrect;
  if(allCorrect)quizState.score++;
  renderMain();
};
window.nextQuestion=function(){
  if(quizState.current<quizState.questions.length-1){
    quizState.current++;quizState.matchShuffle=null;quizState.chronoOrder=null;renderMain();
  } else {
    saveBestScore(quizState.scope,quizState.score,quizState.questions.length);
    quizState.mode='results';renderMain();updateProgress();
  }
};

function renderQuizResults(){
  const total=quizState.questions.length;
  const pct=Math.round((quizState.score/total)*100);
  const isGrand=quizState.scope==='all'&&total>=8;

  // Personality-driven verdict
  const verdict=pct>=90?{
    grade:'S',label:'Philosopher',
    msg:'You didn\'t just learn these ideas. You understand them. The connections, the contradictions, the centuries of argument — they\'re alive for you. Socrates would have enjoyed your company. Nietzsche might have tolerated you.',
    colour:'var(--gold)'
  }:pct>=70?{
    grade:'A',label:'Scholar',
    msg:'Strong foundations. You know the canon and you\'ve thought about it. A few ideas slipped through — which is fitting. Philosophy resists complete mastery. That\'s the point.',
    colour:'var(--teal)'
  }:pct>=50?{
    grade:'B',label:'Student',
    msg:'You\'re on your way. The ideas you missed are exactly the ones worth returning to. Hume said the wisest response to hard questions is to sit with them. You have good questions to sit with.',
    colour:'var(--violet-mid)'
  }:pct>=30?{
    grade:'C',label:'Curious Mind',
    msg:'Philosophy is hard. It\'s supposed to be. The fact that you tried means something — Socrates would call that the beginning of wisdom. Go back to the map. Pick one philosopher who surprised you.',
    colour:'var(--stone)'
  }:{
    grade:'?',label:'Beginner',
    msg:'"I know that I know nothing." — Socrates. You\'re in excellent company. Everyone starts here. The map is waiting.',
    colour:'rgba(255,255,255,0.3)'
  };

  // Find most missed topic
  const missed=quizState.questions.filter((_,i)=>{const a=quizState.answers[i];return a!==true&&a!==quizState.questions[i].correct;});
  const missedPhils=[...new Set(missed.map(q=>q.phil))].slice(0,3).map(id=>philMap[id]?.name||id).filter(Boolean);

  // Ironic connection if they got Kant right but missed Hume (or vice versa)
  const gotKant=quizState.questions.findIndex(q=>q.phil==='kant')>-1&&quizState.answers[quizState.questions.findIndex(q=>q.phil==='kant')]===quizState.questions.find(q=>q.phil==='kant')?.correct;
  const missedHume=missed.some(q=>q.phil==='hume');
  const ironicNote=gotKant&&missedHume?'Interesting: you got Kant right but missed Hume. Kant said Hume woke him from his "dogmatic slumber." Perhaps you need waking too.':
    missed.some(q=>q.phil==='nietzsche')&&quizState.questions.some(q=>q.phil==='schopenhauer')?'You missed Nietzsche — but Nietzsche himself was a devoted reader of Schopenhauer before breaking violently with him. Worth revisiting both.':'';

  // Share text
  const shareText=`I scored ${quizState.score}/${total} on the Philosophia quiz — ${verdict.label} level. 2,500 years of philosophy, ${pct}% conquered. Can you beat me?`;
  quizState.shareText=shareText;

  return`<div class="page active">
    <div class="quiz-hero" style="padding-bottom:28px;">
      <div class="quiz-hero-tag">${isGrand?'Grand Test Results':'Quiz Results'}</div>
      <h2>You scored <strong>${quizState.score} / ${total}</strong></h2>
    </div>
    <div class="quiz-body" style="max-width:none;padding:36px 72px 56px;">
      <div style="display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:start;margin-bottom:40px;">

        <!-- Grade badge -->
        <div style="text-align:center;background:var(--ink);padding:28px 32px;border-radius:var(--radius);border:2px solid ${verdict.colour};min-width:120px;">
          <div style="font-size:64px;font-weight:700;color:${verdict.colour};line-height:1;">${verdict.grade}</div>
          <div style="font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:${verdict.colour};margin-top:8px;opacity:0.8;">${verdict.label}</div>
          <div style="font-size:28px;font-weight:700;color:${verdict.colour};margin-top:12px;">${pct}%</div>
        </div>

        <!-- Verdict text -->
        <div>
          <div style="font-size:17px;font-weight:300;color:var(--text-soft);line-height:1.8;margin-bottom:16px;">${verdict.msg}</div>
          ${ironicNote?`<div style="font-size:13px;font-weight:300;color:var(--violet);font-style:italic;padding:12px 16px;border-left:2px solid var(--violet);background:var(--violet-light);border-radius:0 var(--radius) var(--radius) 0;">${ironicNote}</div>`:''}
          ${missedPhils.length?`<div style="margin-top:16px;font-size:13px;font-weight:300;color:var(--stone);">Revisit: ${missedPhils.map(n=>{const pid=PHIL.find(p=>p.name===n)?.id||'';return`<button onclick="showPage('phil-${pid}')" style="font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--rule);border-radius:2px;background:var(--paper);color:var(--violet);cursor:pointer;margin:0 4px 4px 0;">${n}</button>`;}).join('')}</div>`:''}
        </div>
      </div>

      <!-- Share bar -->
      <div style="background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="font-size:13px;font-weight:300;color:var(--text-soft);font-style:italic;">"${shareText}"</div>
        <button onclick="shareResult()" class="quiz-next-btn" style="background:var(--violet);padding:10px 20px;font-size:12px;">Share result ↗</button>
      </div>

      <div class="divider"><div class="divider-line"></div><div class="divider-label">Question by question</div><div class="divider-line"></div></div>

      <div class="quiz-review" style="margin-bottom:28px;">
        ${quizState.questions.map((q,i)=>{
          const a=quizState.answers[i];
          const correct=a===true||a===q.correct;
          const typeLabel={mc:'MC',tf:'T/F',match:'Match',portrait:'Portrait',quote:'Quote',first:'First',oddone:'Odd one',agree:'Agree?',chrono:'Order'}[q.type]||q.type;
          const phil=philMap[q.phil];
          return`<div class="review-item" style="cursor:${phil?'pointer':'default'}" onclick="${phil?'showPage(\'phil-'+phil.id+'\')':''}">
            <div class="ri-icon" style="color:${correct?'var(--teal)':'var(--red)'};">${correct?'✓':'✗'}</div>
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
                <span style="font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--stone);flex-shrink:0;">${typeLabel}</span>
                <div class="ri-q">${q.q.replace(/<[^>]+>/g,'').substring(0,90)}${q.q.length>90?'…':''}</div>
              </div>
              <div class="ri-a">${correct?
                `<span class="correct-answer">Correct</span>`:
                `<span class="wrong-answer">Incorrect</span> — ${q.feedback.split('.')[0]}.`
              }</div>
            </div>
            ${phil?`<div style="font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);flex-shrink:0;">→ ${phil.name.split(' ').slice(-1)[0]}</div>`:''}
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="quiz-next-btn" onclick="quizState.mode='select';quizState.chronoOrder=null;renderMain()">← Back to quiz</button>
        <button class="quiz-next-btn" style="background:var(--violet);" onclick="quizState.chronoOrder=null;startQuiz(quizState.scope)">Try again</button>
        <button class="quiz-next-btn" style="background:var(--ink-mid);" onclick="showPage('map')">◉ Back to map</button>
      </div>
    </div>
  </div>`;
}

window.shareResult=function(){
  const text=quizState.shareText||'Check out Philosophia — a philosophy learning tool!';
  if(navigator.share){navigator.share({title:'Philosophia Quiz',text});}
  else{navigator.clipboard.writeText(text).then(()=>alert('Result copied! Paste anywhere to share.'));}
};

window.resetProgress=resetProgress;

// ── INIT ──────────────────────────────────────────────────
renderSidebar();
renderMobileNav();
renderMain();
updateProgress();
updateTimeline();
</script>
</body>
</html>
