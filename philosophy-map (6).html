  {type:'mc',q:'Hobbes\' "state of nature" describes human life without government as:',opts:['Peaceful and cooperative','A golden age of natural freedom','A war of all against all, where life is "solitary, poor, nasty, brutish, and short"','Governed by natural reason and justice'],correct:2,phil:'hobbes',feedback:'In the state of nature, rational self-interest in conditions of scarcity produces perpetual conflict. This is not because humans are evil, but because uncertainty and competition are the natural condition without authority.'},
  {type:'tf',q:'Hobbes argued that citizens always have the right to revolt against unjust rulers.',correct:false,phil:'hobbes',feedback:'The opposite — Hobbes argued for nearly absolute sovereignty. Any government, however imperfect, is better than the state of nature. The right to revolt would simply recreate the chaos that made the Leviathan necessary.'},
  {type:'mc',q:'The "Leviathan" in Hobbes\'s philosophy refers to:',opts:['A sea monster symbolising chaos','The sovereign power — the state created by social contract','Natural human appetites','The danger of religious authority'],correct:1,phil:'hobbes',feedback:'The Leviathan is the commonwealth — the sovereign power created when individuals rationally give up some freedom in exchange for security. The name comes from the biblical monster, suggesting both its power and its necessity.'},

  // LOCKE
  {type:'mc',q:'Locke\'s "tabula rasa" means:',opts:['A clean conscience','The mind at birth is a blank slate — all knowledge comes from experience','A fresh start after death','An empty political contract'],correct:1,phil:'locke',feedback:'Tabula rasa — "blank slate" — is Locke\'s empiricist claim that we are born without innate ideas. All knowledge comes from experience, through sensation and reflection on our own mental operations.'},
  {type:'tf',q:'John Locke directly influenced the American Declaration of Independence.',correct:true,phil:'locke',feedback:'Correct — the Declaration\'s "life, liberty, and the pursuit of happiness" directly echoes Locke\'s "life, liberty, and property." Thomas Jefferson called Locke one of the three greatest men who ever lived.'},
  {type:'mc',q:'According to Locke, when can citizens legitimately revolt against their government?',opts:['When they disagree with any law','When the government systematically violates their natural rights','When a better ruler is available','At any time, since consent can be withdrawn'],correct:1,phil:'locke',feedback:'Locke argued that government is legitimate only with the consent of the governed, and only so long as it protects natural rights. Systematic violation of life, liberty, or property justifies revolution.'},

  // SPINOZA
  {type:'mc',q:'Spinoza\'s "Deus sive Natura" means:',opts:['God created nature from nothing','God and Nature are the same infinite substance — there is only one thing','Nature is the only god we need','God is found in natural beauty'],correct:1,phil:'spinoza',feedback:'"God or Nature" — two names for the same single infinite substance. Everything that exists is a mode or expression of this substance. There is no transcendent God separate from the world.'},
  {type:'tf',q:'Spinoza was celebrated and respected by his Jewish community throughout his life.',correct:false,phil:'spinoza',feedback:'Spinoza was excommunicated from his Jewish community at 23 with one of the harshest bans ever recorded. He spent the rest of his life in quiet poverty, grinding lenses. Recognition came only after his death.'},
  {type:'mc',q:'What does Spinoza mean by "sub specie aeternitatis"?',opts:['Seeing things as if they will last forever','Seeing things from the perspective of eternity — the whole of reality','Ignoring temporal concerns entirely','The immortality of the soul'],correct:1,phil:'spinoza',feedback:'To see things "under the aspect of eternity" is to see them from the perspective of the whole — not from a partial, individual viewpoint. This is the highest form of understanding and the source of Spinoza\'s "blessedness."'},

  // DESCARTES
  {type:'mc',q:'Descartes\' "Cogito ergo sum" means:',opts:['I doubt, therefore I question','I think, therefore I am','I exist, therefore I matter','The mind creates reality'],correct:1,phil:'descartes',feedback:'Even if an evil demon is deceiving Descartes about everything, the very act of doubting proves a doubter exists. The thinking self is the one unshakeable foundation from which he rebuilds all knowledge.'},
  {type:'tf',q:'Descartes argued that mind and body are the same kind of substance.',correct:false,phil:'descartes',feedback:'The opposite — Descartes\' mind-body dualism argues that mind (res cogitans) and body (res extensa) are fundamentally different substances. This created the "mind-body problem" that philosophy has wrestled with ever since.'},
  {type:'mc',q:'Descartes\' method of "radical doubt" involves:',opts:['Doubting everything you dislike','Rejecting everything that can possibly be doubted to find what cannot be doubted','Doubting until you reach paralysis','Only accepting what can be proved mathematically'],correct:1,phil:'descartes',feedback:'The method is to doubt systematically — even the senses, the external world, mathematics — until you find something that cannot possibly be doubted. The Cogito is what survives this process.'},

  // ROUSSEAU
  {type:'mc',q:'Rousseau\'s "general will" refers to:',opts:['The will of the majority of voters','The king\'s will as expression of the nation','The collective interest of the people as a whole, distinct from individual preferences','The will of the most rational citizens'],correct:2,phil:'rousseau',feedback:'The general will is not just majority opinion — it is what is genuinely in the common interest. Rousseau argues that legitimate political authority must express the general will, not merely aggregate individual preferences.'},
  {type:'tf',q:'Rousseau believed that civilisation and progress make human beings better and happier.',correct:false,phil:'rousseau',feedback:'The opposite — Rousseau argued that civilisation corrupts natural human goodness. Our arts, sciences, and social institutions have produced comparison, envy, vanity, and artificial needs that make us worse off than our natural state.'},
  {type:'mc',q:'Rousseau\'s famous opening line "Man is born free, and everywhere he is in chains" is from:',opts:['Emile','The Confessions','The Social Contract','Discourse on Inequality'],correct:2,phil:'rousseau',feedback:'This is the opening of The Social Contract (1762) — one of the most famous first lines in philosophy, and one of the most direct expressions of Rousseau\'s diagnosis of the human condition.'},

  // HUME
  {type:'mc',q:'Hume\'s "problem of induction" says:',opts:['We cannot trust our senses','We cannot rationally justify our belief that the future will resemble the past','Science is impossible without God','Our emotions distort our reasoning'],correct:1,phil:'hume',feedback:'All science rests on inductive inference — from past observations to future predictions. Hume showed this cannot be logically justified. It is habit and custom, not reason. The problem is still unsolved.'},
  {type:'tf',q:'Hume argued that the "self" is a single, unified, continuous entity that persists through time.',correct:false,phil:'hume',feedback:'The opposite — Hume\'s "bundle theory" argues that when he introspects, he never finds a unified self. He finds only a bundle of perceptions — thoughts, feelings, sensations. Personal identity is a useful fiction.'},
  {type:'mc',q:'Hume\'s "is-ought problem" means:',opts:['Scientists should not make moral judgments','You cannot logically derive how things ought to be from how they are','Is and ought are the same in practice','Ethics cannot be studied systematically'],correct:1,phil:'hume',feedback:'The is-ought gap is one of Hume\'s most important contributions. Facts alone cannot generate values — the move from descriptive to prescriptive requires an additional premise that cannot itself be purely factual.'},

  // KANT
  {type:'mc',q:'Kant\'s Categorical Imperative says you should act according to:',opts:['Whatever produces the best outcome','A principle you could will to become universal law','Your natural instincts and feelings','The teachings of tradition'],correct:1,phil:'kant',feedback:'"Act only according to that maxim whereby you can at the same time will that it should become universal law." Morality is rational, unconditional, and has nothing to do with consequences.'},
  {type:'tf',q:'Kant spent most of his life travelling Europe to gather experiences that informed his philosophy.',correct:false,phil:'kant',feedback:'Kant famously never left a radius of about 100 miles from his hometown of Königsberg his entire life. Neighbours set their clocks by his afternoon walks. His philosophy was entirely an armchair enterprise.'},
  {type:'mc',q:'Kant\'s "transcendental idealism" means:',opts:['Reality is entirely in the mind','Space, time, and causation are forms the mind imposes on experience — not features of reality-in-itself','The physical world is an illusion','We cannot know anything at all'],correct:1,phil:'kant',feedback:'Kant\'s Copernican revolution: the mind does not conform to objects — objects conform to the mind\'s structures. Space, time, and causation are contributed by us, not found in things-in-themselves.'},

  // HEGEL
  {type:'mc',q:'Hegel\'s dialectical method involves:',opts:['Arguing for the strongest possible position','Thesis generates antithesis; their conflict resolves in synthesis — which then generates a new antithesis','Proving everything through logic alone','The gradual accumulation of knowledge'],correct:1,phil:'hegel',feedback:'Hegel\'s dialectic is not just a logical method — he claims this is how reality itself works. History moves forward through contradiction and its resolution.'},
  {type:'tf',q:'Hegel argued that history progresses toward the realisation of freedom.',correct:true,phil:'hegel',feedback:'Correct — Hegel\'s philosophy of history argues that Spirit progressively comes to know itself through history. The development of political institutions represents the gradual realisation of freedom in the world.'},
  {type:'mc',q:'Hegel\'s "master-slave dialectic" explores:',opts:['The economics of slavery','How self-consciousness requires recognition from another — and how the struggle for recognition generates power relations','The psychological damage of slavery','Why masters are ultimately inferior to slaves'],correct:1,phil:'hegel',feedback:'The master-slave dialectic shows that self-consciousness cannot exist in isolation — we need others to recognise us. The power relationship this creates becomes unstable: the slave develops self-consciousness through work while the master becomes dependent.'},

  // SCHOPENHAUER
  {type:'mc',q:'Schopenhauer\'s "Will" is:',opts:['The human faculty of rational choice','A blind, purposeless, insatiable striving that underlies all of reality','God\'s plan for the universe','The force of natural selection'],correct:1,phil:'schopenhauer',feedback:'The Will is the thing-in-itself that Kant said was unknowable. Schopenhauer argued we access it directly through our own bodies — and what we find is not reason or purpose but blind, insatiable drive.'},
  {type:'tf',q:'Schopenhauer was an immediate success — his World as Will and Representation was acclaimed on publication.',correct:false,phil:'schopenhauer',feedback:'Schopenhauer waited over thirty years for recognition. His masterwork was largely ignored when published in 1818. Fame came only in his sixties — deeply satisfying, but not enough to cure the pessimism his philosophy predicted.'},
  {type:'mc',q:'For Schopenhauer, art (especially music) provides:',opts:['Eternal truth about the nature of reality','A temporary escape from the tyranny of the Will — the only genuine redemption','Political liberation','Rational knowledge of the Forms'],correct:1,phil:'schopenhauer',feedback:'In aesthetic contemplation, we momentarily stop desiring — we are lifted out of the Will\'s grip. Music especially, as the direct expression of the Will itself, provides temporary liberation from its tyranny.'},

  // MARX
  {type:'mc',q:'Marx\'s concept of "alienation" refers to:',opts:['Religious estrangement from God','Workers being disconnected from their labour, its product, other workers, and their own human nature','The isolation of the modern individual','The gap between rich and poor'],correct:1,phil:'marx',feedback:'Under capitalism, workers are alienated from what they produce (it belongs to the owner), from the act of production (it becomes mechanical rather than fulfilling), from other workers, and from their own humanity.'},
  {type:'tf',q:'Marx predicted that communist revolution would first occur in the most advanced industrialised nations.',correct:true,phil:'marx',feedback:'Correct — and this is one of his most notable failed predictions. Revolution actually occurred in Russia and China, among the least industrialised major nations. This fundamental failure of prediction has never been satisfactorily explained.'},
  {type:'mc',q:'Marx\'s "historical materialism" argues that:',opts:['Material possessions are all that matter','History is driven by material conditions of production — the economic base shapes everything else','Human biology determines history','Natural resources determine national character'],correct:1,phil:'marx',feedback:'The economic base — how people organise the production of what they need — shapes the legal, political, and ideological superstructure. Ideas don\'t drive history; material conditions drive ideas.'},

  // KIERKEGAARD
  {type:'mc',q:'Kierkegaard\'s "leap of faith" means:',opts:['Blind religious belief without any reflection','A passionate, subjective commitment to God that transcends rational justification','Believing what is most convenient','A gradual approach to faith through reason'],correct:1,phil:'kierkegaard',feedback:'The leap of faith cannot be rationally justified — it is a passionate, subjective commitment that transcends the rational. Kierkegaard argues this is precisely what faith is: demanding rational justification completely misunderstands it.'},
  {type:'tf',q:'Kierkegaard was well-known and respected as a philosopher throughout Scandinavia during his lifetime.',correct:false,phil:'kierkegaard',feedback:'Kierkegaard was almost entirely unknown outside Denmark in his lifetime. After his death, his work was translated into German — and immediately devoured by Heidegger, Sartre, and the entire existentialist tradition.'},
  {type:'mc',q:'Kierkegaard\'s "three stages of existence" are:',opts:['Birth, life, death','Ignorance, knowledge, wisdom','The aesthetic, the ethical, and the religious','Pleasure, duty, and transcendence'],correct:2,phil:'kierkegaard',feedback:'The aesthetic stage: pleasure-seeking and immediate experience. The ethical stage: commitment to duty and universal moral law. The religious stage: relating to God beyond the ethical — requiring a "leap."'},

  // NIETZSCHE
  {type:'mc',q:'When Nietzsche declared "God is dead," he was:',opts:['Announcing his atheism for the first time','Announcing a cultural catastrophe — the collapse of the moral framework Western civilisation was built on','Celebrating the Enlightenment','Making a logical argument against God\'s existence'],correct:1,phil:'nietzsche',feedback:'Nietzsche\'s declaration was not about atheism — it was about catastrophe. God had been doing enormous work: grounding morality, providing purpose, underwriting the value of truth. His death leaves all of that without foundation.'},
  {type:'tf',q:'Nietzsche\'s Übermensch was intended as a celebration of German nationalism and racial superiority.',correct:false,phil:'nietzsche',feedback:'This is the most common — and most dangerous — misreading of Nietzsche. He despised German nationalism and anti-Semitism. The Übermensch is someone who creates their own values — an artist of existence, not a racial concept.'},
  {type:'mc',q:'Nietzsche\'s "eternal recurrence" thought experiment asks:',opts:['Whether we can survive death','What if you had to live your exact life over and over eternally — could you say yes to every moment?','Whether time moves in cycles','How to achieve immortality'],correct:1,phil:'nietzsche',feedback:'Eternal recurrence is the ultimate test of genuine self-affirmation. If you would say yes to living your life again in every detail, you have truly made your life your own. If you would shrink from it, something is wrong.'},

  // WITTGENSTEIN
  {type:'mc',q:'Wittgenstein\'s "language games" means:',opts:['Philosophy is merely wordplay','Words have meaning only within shared practices and forms of life — meaning is use','Language is a perfect mirror of reality','Philosophical problems can be solved with better definitions'],correct:1,phil:'wittgenstein',feedback:'In his late work, Wittgenstein argued there is no hidden essence to meaning. Words work within shared human practices — "language games" — and outside those contexts, they generate pseudoproblems.'},
  {type:'tf',q:'Wittgenstein believed he had solved all philosophical problems in his first book, the Tractatus.',correct:true,phil:'wittgenstein',feedback:'Correct — and then he returned to philosophy and spent twenty years undermining most of what he had said. No philosopher has convincingly rejected their own early work and built something entirely different on the ruins — and been right both times.'},
  {type:'mc',q:'The Tractatus Wittgenstein argued:',opts:['Language games determine meaning','Propositions are pictures of possible states of affairs — language and world share a logical form','Philosophy must become more like science','There are no true philosophical problems'],correct:1,phil:'wittgenstein',feedback:'The picture theory of language: meaningful propositions show the logical structure of possible states of affairs. What cannot be thus pictured — ethics, aesthetics, the meaning of life — "must be passed over in silence."'},

  // HEIDEGGER
  {type:'mc',q:'Heidegger\'s "Dasein" refers to:',opts:['The German word for consciousness','The present moment of existence','The human kind of being — the being for whom its own existence is a question','The authentic self'],correct:2,phil:'heidegger',feedback:'Dasein literally means "being-there." Humans are distinctive because we are the beings who ask about being — we relate to our own existence as a question, not just a fact.'},
  {type:'tf',q:'Heidegger joined the Nazi party in 1933 and later gave a full and satisfying account of his involvement.',correct:false,phil:'heidegger',feedback:'Heidegger did join the Nazi party in 1933 and served as rector. He never gave an adequate account of his involvement or adequately recanted. This remains one of the most troubling episodes in 20th century philosophy.'},
  {type:'mc',q:'Heidegger\'s "being-toward-death" means:',opts:['We should think about death constantly','Death is not an event at the end but a possibility that structures your entire existence','We should accept death calmly','Mortality makes life meaningless'],correct:1,phil:'heidegger',feedback:'Authentic existence requires owning our finitude — acknowledging that we will die not as a distant event but as a constant possibility. This awareness transforms how we live now.'},

  // SARTRE
  {type:'mc',q:'Sartre\'s phrase "existence precedes essence" means:',opts:['Life is meaningless','We exist first, then define ourselves through choices — there is no pre-given human nature','God determines our nature before birth','Society shapes who we are'],correct:1,phil:'sartre',feedback:'Unlike hammers — designed before they\'re made — humans have no pre-given nature or purpose. We exist first, and we create our own essence through every choice we make.'},
  {type:'tf',q:'Sartre accepted the Nobel Prize for Literature in 1964.',correct:false,phil:'sartre',feedback:'Sartre famously refused the Nobel Prize — he had always declined official honours, not wanting to be turned into an institution. A perfect expression of his existentialist commitment to freedom from bad faith.'},
  {type:'mc',q:'Sartre\'s concept of "bad faith" means:',opts:['Religious hypocrisy','Lying to others for personal gain','Fleeing our freedom by pretending we are determined by role, nature, or circumstance','Holding contradictory beliefs simultaneously'],correct:2,phil:'sartre',feedback:'Bad faith is the attempt to escape radical freedom — pretending you had no choice, that your role defines you, that your past determines your present. It is self-deception that is always available and always tempting.'},

  // CAMUS
  {type:'mc',q:'Camus\'s philosophical "revolt" in response to the absurd means:',opts:['Political revolution','Suicide as the ultimate act of defiance','Defiant, lucid, passionate engagement with life in full knowledge of its meaninglessness','Retreating into religious faith'],correct:2,phil:'camus',feedback:'Camus rejects both suicide (physical escape) and the philosophical "leap" to religion or ideology. The authentic response is revolt: continuing to live fully and defiantly despite — and in full awareness of — meaninglessness.'},
  {type:'tf',q:'Camus and Sartre remained close friends and philosophical allies throughout their lives.',correct:false,phil:'camus',feedback:'Their public break in the early 1950s — over whether revolutionary ends justify violent means — was one of the great intellectual ruptures of the 20th century. Camus said no; Sartre thought the question was more complicated. They never reconciled.'},
  {type:'mc',q:'In Camus\'s Myth of Sisyphus, Sisyphus represents:',opts:['The futility of all human effort','The human condition — and the possibility of finding freedom within it through revolt','The punishment of pride','Ancient Greek notions of fate'],correct:1,phil:'camus',feedback:'"One must imagine Sisyphus happy." Condemned to roll his boulder up for eternity, Sisyphus at the moment of watching it roll down — choosing to descend and push again — demonstrates the defiant freedom that is the authentic human response to absurdity.'},

  // BEAUVOIR
  {type:'mc',q:'De Beauvoir\'s most famous line — "One is not born, but becomes, a woman" — argues that:',opts:['Womanhood is a biological fact','Gender is a social and historical construction, not a natural given','Women are superior to men','Philosophy should focus on women\'s experience'],correct:1,phil:'beauvoir',feedback:'De Beauvoir argued that "woman" is not a biological destiny but a role constructed by history, culture, and power. This became the founding insight of modern feminist philosophy.'},
  {type:'tf',q:'De Beauvoir fully agreed with Sartre\'s existentialism without any modifications or critiques.',correct:false,phil:'beauvoir',feedback:'De Beauvoir extended and corrected Sartre\'s existentialism — insisting that freedom is always "situated." Pure existential freedom ignores the material, historical, and bodily circumstances that constrain women\'s freedom in ways that demand political transformation.'},
  {type:'mc',q:'De Beauvoir\'s concept of "situated freedom" means:',opts:['Freedom is only possible in certain places','Freedom is always exercised in a situation — economic, historical, bodily — that enables and constrains it','True freedom requires leaving society','Women are freer than men in domestic situations'],correct:1,phil:'beauvoir',feedback:'Against Sartre\'s radical freedom that applies equally to all, de Beauvoir insists freedom is always situated. Women\'s situation has been one of systematic constraint — which means their freedom is genuinely different from men\'s.'},

  // FOUCAULT
  {type:'mc',q:'Foucault\'s "Power/Knowledge" means:',opts:['Knowledge is power over others','Power and knowledge are inseparable — every claim to knowledge is also an exercise of power','Education is the key to political freedom','Scientific knowledge is always neutral'],correct:1,phil:'foucault',feedback:'For Foucault, knowledge is not opposed to power — it constitutes power. Every system of knowledge defines what\'s real, who\'s sane, what\'s criminal. "Knowledge is not for knowing: knowledge is for cutting."'},
  {type:'tf',q:'Foucault\'s genealogical method asks "what is the true essence of X?" for topics like madness and sexuality.',correct:false,phil:'foucault',feedback:'The opposite — genealogy, following Nietzsche, asks not "what is the truth of X?" but "how did X come to be accepted as truth?" Madness, sexuality, the prison were all invented at specific historical moments, not discovered.'},
  {type:'mc',q:'Foucault\'s concept of "biopolitics" means:',opts:['Using biology to justify political decisions','Modern power governing populations through management of their health, sexuality, and life processes','Political rights for animals','The biological basis of political authority'],correct:1,phil:'foucault',feedback:'Biopolitics is Foucault\'s concept for modern power\'s shift from punishing individuals to managing populations — their health, birth rates, sexuality, life expectancy. The body becomes a site of political control.'},


  // PORTRAIT questions - guess who from the image
  {type:'portrait',q:'Who is this philosopher?',portrait:'kant',opts:['Hegel','Immanuel Kant','Schopenhauer','Fichte'],correct:1,phil:'kant',feedback:'Immanuel Kant — the most important philosopher since Aristotle. He never left Königsberg. Neighbours set their clocks by his afternoon walk.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'nietzsche',opts:['Marx','Schopenhauer','Friedrich Nietzsche','Wagner'],correct:2,phil:'nietzsche',feedback:'Friedrich Nietzsche — the moustache is the giveaway. "God is dead" was not atheism. It was a cultural catastrophe he was warning about.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'marx',opts:['Engels','Charles Darwin','Karl Marx','Bakunin'],correct:2,phil:'marx',feedback:'Karl Marx — the beard is unmistakable. He spent decades in the British Museum reading room. He never ran a state or commanded an army. A third of the world eventually lived under governments claiming his name.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'descartes',opts:['René Descartes','Spinoza','Leibniz','Pascal'],correct:0,phil:'descartes',feedback:'René Descartes — the father of modern philosophy. He spent that winter in a heated room near Ulm thinking. He emerged with cogito ergo sum.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'hume',opts:['Locke','Adam Smith','Francis Bacon','David Hume'],correct:3,phil:'hume',feedback:'David Hume — the cheerful sceptic who demolished causation, the self, and natural theology. Kant said he woke him from his dogmatic slumber.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'sartre',opts:['Camus','Jean-Paul Sartre','Merleau-Ponty','de Beauvoir'],correct:1,phil:'sartre',feedback:'Jean-Paul Sartre — the philosopher who refused the Nobel Prize. He turned it down because he did not want to be turned into an institution. A perfect act of existentialist freedom.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'wollstonecraft',opts:['Mary Wollstonecraft','Jane Austen','George Eliot','Harriet Taylor'],correct:0,phil:'wollstonecraft',feedback:'Mary Wollstonecraft — the founder of feminist philosophy. She died at 38 giving birth to Mary Shelley. Her ideas took 150 years to be fully accepted.'},
  {type:'portrait',q:'Who is this philosopher?',portrait:'rousseau',opts:['Voltaire','Diderot','Jean-Jacques Rousseau','Montesquieu'],correct:2,phil:'rousseau',feedback:'Jean-Jacques Rousseau — "Man is born free, and everywhere he is in chains." Eight words that helped ignite a revolution. He abandoned five children while writing a treatise on education.'},

  // MATCH QUESTIONS
  {type:'match',q:'Match each philosopher to their most famous concept:',pairs:[{left:'Socrates',right:'The Examined Life'},{left:'Kant',right:'Categorical Imperative'},{left:'Nietzsche',right:'Will to Power'},{left:'Sartre',right:'Bad Faith'}],phil:'socrates',feedback:'Each concept defines its philosopher\'s central contribution: Socrates\'s daily self-scrutiny, Kant\'s rational moral law, Nietzsche\'s drive of self-overcoming, and Sartre\'s concept of fleeing freedom.'},
  {type:'match',q:'Match each philosopher to their era:',pairs:[{left:'Heraclitus',right:'Ancient'},{left:'Aquinas',right:'Medieval'},{left:'Descartes',right:'Early Modern'},{left:'Foucault',right:'Contemporary'}],phil:'heraclitus',feedback:'2,500 years of philosophy: Heraclitus at the origin questioning permanence, Aquinas synthesising faith and reason, Descartes demolishing and rebuilding, Foucault questioning whether knowledge itself is power.'},
  {type:'match',q:'Match each key idea to the philosopher who developed it:',pairs:[{left:'Cogito ergo sum',right:'Descartes'},{left:'Allegory of the Cave',right:'Plato'},{left:'Historical Materialism',right:'Marx'},{left:'Being-in-the-world',right:'Heidegger'}],phil:'descartes',feedback:'These four ideas span 2,400 years — Plato\'s timeless Forms, Descartes\'s certain foundation, Marx\'s material history, Heidegger\'s embedded existence. Each represents a fundamental reorientation of what philosophy is trying to do.'},
  {type:'match',q:'Match each philosopher to their tradition:',pairs:[{left:'Laozi',right:'Daoism'},{left:'Wittgenstein',right:'Analytic Philosophy'},{left:'de Beauvoir',right:'Feminism'},{left:'Schopenhauer',right:'Voluntarism'}],phil:'laozi',feedback:'Four distinct traditions: Daoism\'s embrace of natural flow, Analytic philosophy\'s rigorous logic, Feminism\'s critique of gendered oppression, Voluntarism\'s focus on blind Will beneath reason.'},
  {type:'match',q:'Match each philosopher to their most famous work:',pairs:[{left:'Plato',right:'The Republic'},{left:'Kant',right:'Critique of Pure Reason'},{left:'Nietzsche',right:'Thus Spoke Zarathustra'},{left:'Sartre',right:'Being and Nothingness'}],phil:'plato',feedback:'These four works span the heart of Western philosophy: Plato\'s vision of justice and the ideal state, Kant\'s account of the limits of knowledge, Nietzsche\'s prophetic poem of revaluation, Sartre\'s phenomenological masterwork on freedom.'},

  // ── QUOTE ATTRIBUTION ──────────────────────────────────────────────────────
  {type:'quote',q:'"The owl of Minerva spreads its wings only with the falling of dusk."',opts:['Kant','Nietzsche','Hegel','Schopenhauer'],correct:2,phil:'hegel',feedback:'Pure Hegel — and one of the most beautiful sentences in philosophy. Philosophy always arrives too late: it can only comprehend a world as it passes away. The owl sees in darkness; wisdom comes after the fact.'},
  {type:'quote',q:'"Hell is other people."',opts:['Camus','Nietzsche','Heidegger','Sartre'],correct:3,phil:'sartre',feedback:'Sartre, from No Exit — but wildly misunderstood. He didn\'t mean people are awful. He meant: our self-image depends on how others see us. We can never escape being an object in someone else\'s consciousness.'},
  {type:'quote',q:'"One cannot step into the same river twice."',opts:['Plato','Heraclitus','Aristotle','Pythagoras'],correct:1,phil:'heraclitus',feedback:'Heraclitus — the philosopher of flux. The river is always changing; so are you. Identity persists through constant transformation. The river is still "the river" — but nothing about it is literally the same.'},
  {type:'quote',q:'"I think therefore I am."',opts:['Spinoza','Leibniz','Descartes','Aquinas'],correct:2,phil:'descartes',feedback:'Descartes\' cogito — the one certainty that survives radical doubt. Even if an evil demon deceives him about everything, the very act of doubting proves a doubter exists. This is the foundation of modern philosophy.'},
  {type:'quote',q:'"The unexamined life is not worth living."',opts:['Aristotle','Plato','Socrates','Epicurus'],correct:2,phil:'socrates',feedback:'Socrates — said at his trial, shortly before drinking hemlock. He could have escaped. He chose not to. The statement wasn\'t rhetorical. He meant it completely, and proved it with his death.'},
  {type:'quote',q:'"Man is born free, and everywhere he is in chains."',opts:['Marx','Hobbes','Locke','Rousseau'],correct:3,phil:'rousseau',feedback:'Rousseau, opening The Social Contract. Eight words that helped ignite a revolution. He wasn\'t saying chains are always wrong — but that their legitimacy must be justified, not assumed.'},
  {type:'quote',q:'"God is dead. God remains dead. And we have killed him."',opts:['Marx','Schopenhauer','Nietzsche','Heidegger'],correct:2,phil:'nietzsche',feedback:'Nietzsche — and note: a madman says it in the marketplace. The crowd laughs. Nietzsche\'s point: most people haven\'t yet understood the catastrophe. The death of God is a cultural earthquake whose tremors haven\'t reached them yet.'},
  {type:'quote',q:'"Whereof one cannot speak, thereof one must be silent."',opts:['Wittgenstein','Heidegger','Russell','Frege'],correct:0,phil:'wittgenstein',feedback:'The final line of the Tractatus. Wittgenstein had just spent the whole book defining the limits of meaningful language — and then said: everything that actually matters (ethics, aesthetics, the meaning of life) lies beyond those limits. Pass over it in silence.'},
  {type:'quote',q:'"Existence precedes essence."',opts:['Heidegger','Camus','de Beauvoir','Sartre'],correct:3,phil:'sartre',feedback:'Sartre\'s most famous formulation: for humans, there is no blueprint. We exist first, then create our essence through choices. The opposite of theism, which says God defines our nature before we exist.'},
  {type:'quote',q:'"One is not born, but rather becomes, a woman."',opts:['Wollstonecraft','de Beauvoir','Butler','Woolf'],correct:1,phil:'beauvoir',feedback:'De Beauvoir, The Second Sex — the founding sentence of modern feminist philosophy. Gender is not biology; it is history, culture, and power. This sentence launched a thousand dissertations.'},
  {type:'quote',q:'"It is not that we have so little time but that we waste so much of it."',opts:['Marcus Aurelius','Seneca','Aristotle','Epicurus'],correct:1,phil:'seneca',feedback:'Seneca, On the Shortness of Life. The diagnosis: not the brevity of life but the waste of it. Busyness, distraction, living for others — these are the real thieves. Philosophy, Seneca says, is the only thing that teaches you to use your time.'},
  {type:'quote',q:'"You have power over your mind, not outside events. Realise this and you will find strength."',opts:['Seneca','Epictetus','Marcus Aurelius','Cicero'],correct:2,phil:'marcus',feedback:'Marcus Aurelius, Meditations — written in a military camp, during a plague, while running an empire. The inner citadel: no external force can touch the rational mind without your consent. The only true freedom.'},

  // ── WHO SAID IT FIRST ───────────────────────────────────────────────────────
  {type:'first',q:'Who argued that <strong>self-awareness is independent of the body</strong> — six centuries before Descartes made the same argument famous?',opts:['Al-Ghazali','Ibn Rushd (Averroes)','Ibn Sina (Avicenna)','Omar Khayyam'],correct:2,phil:'avicenna',feedback:'Ibn Sina\'s Flying Man thought experiment — a person floating in void with no sensory input would still know they exist as a thinking being. Descartes\' cogito in 1637 arrived 600 years after Ibn Sina\'s version in 1027.'},
  {type:'first',q:'Long before Freud, which philosopher described an unconscious drive beneath rational consciousness — calling it the <strong>Will</strong>?',opts:['Hegel','Kierkegaard','Nietzsche','Schopenhauer'],correct:3,phil:'schopenhauer',feedback:'Schopenhauer\'s World as Will and Representation (1818) — the blind, insatiable Will driving all of reality, including human behaviour, beneath the surface of conscious reason. Freud acknowledged the debt, somewhat grudgingly.'},
  {type:'first',q:'Which philosopher articulated the <strong>is-ought gap</strong> — that you cannot derive values from facts — before it became a foundational problem in ethics?',opts:['Kant','Hume','Mill','Bentham'],correct:1,phil:'hume',feedback:'Hume\'s is-ought problem, from the Treatise (1739). No logical inference can take you from "X is the case" to "X ought to be the case." The gap between fact and value cannot be bridged by logic alone. Still unresolved.'},
  {type:'first',q:'Who argued for <strong>women\'s equal rational nature and equal right to education</strong> — more than 150 years before women won the vote?',opts:['John Stuart Mill','Mary Wollstonecraft','Harriet Taylor','George Eliot'],correct:1,phil:'wollstonecraft',feedback:'Wollstonecraft\'s Vindication of the Rights of Woman, 1792. The argument: women appear inferior because their education is designed to make them ornamental, not rational. Equality of education is the foundation of all other equality.'},

  // ── ODD ONE OUT ─────────────────────────────────────────────────────────────
  {type:'oddone',q:'Three of these are concepts from Kant. Which one <strong>doesn\'t belong</strong>?',opts:['Categorical Imperative','Transcendental Idealism','The Will to Power','The Thing-in-itself'],correct:2,phil:'kant',feedback:'"The Will to Power" is Nietzsche\'s. The Categorical Imperative, Transcendental Idealism, and the Thing-in-itself (Ding an sich) are all central Kantian concepts. Nietzsche was deeply influenced by Kant — but explicitly against him on the question of morality.'},
  {type:'oddone',q:'Three of these philosophers were <strong>Stoics</strong>. Which one wasn\'t?',opts:['Seneca','Marcus Aurelius','Epicurus','Epictetus'],correct:2,phil:'seneca',feedback:'Epicurus founded Epicureanism — a rival school to Stoicism. Both valued tranquillity, but by very different means. Stoics: accept fate, cultivate virtue. Epicureans: maximise pleasure (wisely understood), minimise pain. Seneca, Marcus Aurelius, and Epictetus are the three great Roman Stoics.'},
  {type:'oddone',q:'Three of these are works by Nietzsche. Which one <strong>isn\'t</strong>?',opts:['Thus Spoke Zarathustra','Beyond Good and Evil','The World as Will and Representation','On the Genealogy of Morality'],correct:2,phil:'nietzsche',feedback:'"The World as Will and Representation" is Schopenhauer\'s masterwork — the book Nietzsche devoured as a young man before eventually breaking with it. The other three are all Nietzsche. He wrote a great deal in a very short sane life.'},
  {type:'oddone',q:'Three of these ideas belong to Aristotle. Which one <strong>doesn\'t</strong>?',opts:['The Golden Mean','Eudaimonia','The Four Causes','The Allegory of the Cave'],correct:3,phil:'aristotle',feedback:'The Allegory of the Cave is pure Plato — from The Republic. The Golden Mean, Eudaimonia, and the Four Causes are all central Aristotelian concepts. The irony: Aristotle spent 20 years at Plato\'s Academy, then rejected almost everything Plato believed.'},
  {type:'oddone',q:'Three of these philosophers were <strong>Empiricists</strong>. Which one was a Rationalist?',opts:['John Locke','David Hume','Baruch Spinoza','George Berkeley'],correct:2,phil:'locke',feedback:'Spinoza was a Rationalist — in the tradition of Descartes, believing reason alone can reveal fundamental truths about reality. Locke, Hume, and Berkeley are the three great British Empiricists, who insisted all knowledge begins with sensory experience.'},

  // ── CHRONOLOGY ──────────────────────────────────────────────────────────────
  {type:'chrono',q:'Put these philosophers in <strong>chronological order</strong> (earliest first):',items:['Immanuel Kant','Plato','Thomas Aquinas','Friedrich Nietzsche'],correct:[1,2,0,3],phil:'plato',feedback:'Plato (428 BC) → Aquinas (1225 AD) → Kant (1724) → Nietzsche (1844). Nearly 2,300 years separate Plato from Nietzsche — and Nietzsche explicitly saw himself as the anti-Plato, inverting Plato\'s valuation of reason over instinct.'},
  {type:'chrono',q:'Put these philosophers in <strong>chronological order</strong> (earliest first):',items:['Karl Marx','René Descartes','Simone de Beauvoir','David Hume'],correct:[1,3,0,2],phil:'descartes',feedback:'Descartes (1596) → Hume (1711) → Marx (1818) → de Beauvoir (1908). Three centuries of thought: Descartes building from scratch, Hume demolishing causation, Marx turning Hegel upside down, de Beauvoir extending and correcting Sartre.'},
  {type:'chrono',q:'Put these philosophers in <strong>chronological order</strong> (earliest first):',items:['Aristotle','Jean-Paul Sartre','Immanuel Kant','Søren Kierkegaard'],correct:[0,2,3,1],phil:'aristotle',feedback:'Aristotle (384 BC) → Kant (1724) → Kierkegaard (1813) → Sartre (1905). The arc from ancient virtue ethics to German idealism to proto-existentialism to full existentialism — each stage a response to the previous.'},

  // ── AGREE OR DISAGREE ───────────────────────────────────────────────────────
  {type:'agree',q:'Would <strong>Nietzsche</strong> agree with this statement? <em>"Morality is objective — certain actions are wrong regardless of who performs them or when."</em>',correct:false,phil:'nietzsche',feedback:'Nietzsche would reject this strongly. His entire project was to show that morality is historically contingent — invented by specific people at specific times for specific (often self-interested) reasons. "Objective morality" is, for Nietzsche, a philosophical fiction.'},
  {type:'agree',q:'Would <strong>Kant</strong> agree with this statement? <em>"It is sometimes right to lie, if the consequences of telling the truth are bad enough."</em>',correct:false,phil:'kant',feedback:'No — famously and controversially. Kant argued lying is categorically wrong, even to a murderer asking where your friend is hiding. The Categorical Imperative demands you act on principles that could be universalised — and a world where lying is permitted when convenient cannot be universalised.'},
  {type:'agree',q:'Would <strong>Hobbes</strong> agree with this statement? <em>"People are fundamentally good — it is society that corrupts them."</em>',correct:false,phil:'hobbes',feedback:'The exact opposite of Hobbes. This is Rousseau\'s position. Hobbes believed that without government, human life is a war of all against all — "solitary, poor, nasty, brutish, and short." Society doesn\'t corrupt us; it\'s the only thing preventing us from destroying each other.'},
  {type:'agree',q:'Would <strong>Sartre</strong> agree with this statement? <em>"Our genes, upbringing, and circumstances determine who we become."</em>',correct:false,phil:'sartre',feedback:'Sartre\'s entire philosophy is the denial of this. "Existence precedes essence" — we are not determined by nature, history, or circumstance. We are radically free, and that freedom is inescapable. Blaming genes or upbringing is, for Sartre, the very definition of bad faith.'},
  {type:'agree',q:'Would <strong>Hume</strong> agree with this statement? <em>"Science gives us certain knowledge of cause and effect in the natural world."</em>',correct:false,phil:'hume',feedback:'Hume would say no — and this is his most radical claim. We never perceive causation; we only observe constant conjunction. The inference from "A always follows B" to "A causes B" cannot be logically justified. Science rests on habit and custom, not rational certainty.'},
  {type:'agree',q:'Would <strong>Marx</strong> agree with this statement? <em>"Ideas are the primary drivers of historical change."</em>',correct:false,phil:'marx',feedback:'Marx stood Hegel "on his head" precisely on this point. For Hegel, ideas (Spirit) drive history. For Marx, material conditions drive history — and ideas are their product. "It is not the consciousness of men that determines their existence, but their social existence that determines their consciousness."'},

  // ── HARDER MC — CROSS-PHILOSOPHER ──────────────────────────────────────────
  {type:'mc',q:'Which philosopher\'s work most directly <strong>influenced Marx\'s dialectical method</strong>?',opts:['Kant','Hume','Hegel','Rousseau'],correct:2,phil:'marx',feedback:'Marx took Hegel\'s dialectical method — thesis, antithesis, synthesis — and inverted it. Where Hegel\'s dialectic is driven by ideas (Spirit), Marx\'s is driven by material conditions. He said he stood Hegel "on his head, or rather, off his head, on which he was standing."'},
  {type:'mc',q:'The "master-slave dialectic" was developed by Hegel. Which later philosopher used it as a key foundation for feminist theory?',opts:['Wollstonecraft','Wittgenstein','Simone de Beauvoir','Hannah Arendt'],correct:2,phil:'beauvoir',feedback:'De Beauvoir used Hegel\'s master-slave dialectic to explain women\'s situation: women have historically been defined as "the Other" — the object through which man defines himself as subject. The Second Sex builds directly on this structure.'},
  {type:'mc',q:'Which philosopher argued that <strong>language games</strong> dissolve rather than solve philosophical problems?',opts:['Frege','Russell','Wittgenstein','Heidegger'],correct:2,phil:'wittgenstein',feedback:'Late Wittgenstein — the Philosophical Investigations. Philosophical problems arise when language "goes on holiday," taken out of its natural context. The job of philosophy is not to solve these problems but to show the fly the way out of the fly-bottle.'},
  {type:'mc',q:'Foucault\'s concept of the <strong>Panopticon</strong> — borrowed from Bentham — argues that modern power operates primarily through:',opts:['Physical coercion and punishment','The possibility of being watched at any time','Democratic consensus','Economic incentives'],correct:1,phil:'foucault',feedback:'The Panopticon is a prison design where inmates can never know if they\'re being watched — so they behave as if they always are. Foucault uses it as a metaphor for modern disciplinary society: power internalised through constant potential surveillance.'},
  {type:'mc',q:'Which of the following best describes the <strong>Socratic paradox</strong>?',opts:['You cannot step into the same river twice','The wisest person is the one who knows they know nothing','Virtue is its own reward','The unexamined life is not worth living'],correct:1,phil:'socrates',feedback:'The Socratic paradox: wisdom begins with knowing you know nothing. This is not false modesty — it is the epistemological starting point of genuine inquiry. The experts Socrates questioned were certain of their knowledge. That certainty was exactly their problem.'},
  {type:'mc',q:'Aristotle\'s concept of <strong>mimesis</strong> in the Poetics refers to:',opts:['The imitation of nature in art','The copying of Forms from Plato\'s realm','Mathematical representation of reality','The repetition of ritual in society'],correct:0,phil:'aristotle',feedback:'Mimesis — imitation or representation of nature — is Aristotle\'s account of what art does. Crucially, he disagreed with Plato that this makes art dangerous (twice removed from reality). For Aristotle, mimesis is how art generates catharsis — emotional purification through tragedy.'},
  {type:'mc',q:'Which philosopher coined the term <strong>"Übermensch"</strong> and what did they actually mean by it?',opts:['Wagner — a heroic Germanic archetype','Nietzsche — a person who creates their own values after the death of God','Hegel — the pinnacle of Spirit\'s self-realisation','Schopenhauer — one who overcomes the Will'],correct:1,phil:'nietzsche',feedback:'Nietzsche — and it has nothing to do with racial superiority, which he would have found repugnant. The Übermensch is the person who can create values in a world where God is dead, rather than collapsing into nihilism or clinging to old moral frameworks.'},
  {type:'mc',q:'What is the key difference between <strong>Locke and Hobbes</strong> on the state of nature?',opts:['Locke thinks it\'s violent; Hobbes thinks it\'s peaceful','Hobbes thinks it\'s violent; Locke thinks people have natural rights and reason','Both agree it\'s violent but disagree on the solution','Both agree it\'s peaceful but disagree on government\'s role'],correct:1,phil:'locke',feedback:'For Hobbes, the state of nature is war — brutal, dangerous, intolerable. For Locke, people in the state of nature have reason and natural rights (life, liberty, property). Government is needed to protect those rights, not to save us from ourselves.'},
  {type:'mc',q:'Spinoza was excommunicated from his Jewish community at 23. The formal ban — a <em>cherem</em> — was unusually severe. What was its main philosophical cause?',opts:['His support for the Dutch Republic','His claim that God and Nature are identical — denying a transcendent personal God','His friendships with Christian scholars','His criticism of biblical authorship'],correct:1,phil:'spinoza',feedback:'Spinoza\'s Deus sive Natura — God or Nature — was the core provocation. A personal God who created the world, rewards and punishes, and hears prayer is incompatible with Spinoza\'s pantheism. His view left no room for revelation, prophecy, or divine intervention.'},

  // ── MORE TRUE/FALSE ─────────────────────────────────────────────────────────
  {type:'tf',q:'Plato\'s Academy — arguably the world\'s first university — ran for over 900 years.',correct:true,phil:'plato',feedback:'Founded around 387 BC, the Academy operated until 529 AD when Emperor Justinian closed it as part of his suppression of pagan institutions. Nine centuries of continuous philosophical education — a record unlikely to be broken.'},
  {type:'tf',q:'Nietzsche and Wagner were lifelong friends and mutual admirers.',correct:false,phil:'nietzsche',feedback:'They began as close friends — Nietzsche worshipped Wagner. But Nietzsche eventually broke with him bitterly, writing The Case of Wagner as a devastating attack. The break was partly over Wagner\'s increasing nationalism and anti-Semitism, which Nietzsche found repugnant.'},
  {type:'tf',q:'Aristotle tutored Alexander the Great.',correct:true,phil:'aristotle',feedback:'Correct — Philip of Macedon hired Aristotle to tutor his son Alexander from age 13 to 16. What the greatest philosopher said to the greatest general in those years is largely unknown. Alexander reportedly slept with a copy of Homer annotated by Aristotle under his pillow.'},
  {type:'tf',q:'Hegel\'s Phenomenology of Spirit was completed on the eve of the Battle of Jena.',correct:true,phil:'hegel',feedback:'Hegel finished the manuscript in 1806 as Napoleon\'s forces were entering Jena. He famously glimpsed Napoleon riding through the city and called him "the world-soul on horseback" — seeing in him the living embodiment of his idea that history is Spirit becoming conscious of itself.'},
  {type:'tf',q:'Simone de Beauvoir scored higher than Sartre in the agrégation examination.',correct:true,phil:'beauvoir',feedback:'De Beauvoir came second overall — behind Sartre, who took first — but the examining committee reportedly noted she was the better philosopher. She was 21. It remains one of the great what-ifs of intellectual history.'},
  {type:'tf',q:'Wittgenstein gave away his entire inheritance.',correct:true,phil:'wittgenstein',feedback:'Correct — Wittgenstein inherited one of the largest fortunes in Europe when his father died in 1913. He gave it all away to artists and writers (including Rilke and Trakl), worked as a village schoolteacher and monastery gardener, and lived in deliberate austerity. Philosophy, for him, was incompatible with comfort.'},
  {type:'tf',q:'Descartes is sometimes called the "father of modern philosophy" because he was the first to use logic.',correct:false,phil:'descartes',feedback:'The title comes from his method — radical doubt as a philosophical starting point, and reason as the sole arbiter of truth — not from inventing logic (Aristotle did that). Descartes\' gesture of demolishing everything inherited and rebuilding from scratch defines the modern philosophical project.'},
  {type:'tf',q:'Camus considered himself an existentialist.',correct:false,phil:'camus',feedback:'Camus explicitly rejected the label, which is why "absurdism" is the correct term for his philosophy. He found existentialism — especially Sartre\'s — guilty of making an unjustified "leap" from the recognition of absurdity to political commitment. Their public break in 1952 was one of the defining intellectual ruptures of the 20th century.'},
  {type:'tf',q:'Thomas Hobbes wrote Leviathan while in exile in Paris.',correct:true,phil:'hobbes',feedback:'Correct — Hobbes fled to France in 1640 fearing for his safety during the political upheaval preceding the English Civil War. He wrote Leviathan in Paris in 1651, producing the most powerful argument for political authority ever written, partly from direct experience of what happens when it collapses.'},
  {type:'tf',q:'The Tao Te Ching, attributed to Laozi, contains more than 500 chapters.',correct:false,phil:'laozi',feedback:'The Tao Te Ching has 81 short chapters — some only a few lines long. Its brevity is part of its philosophy: the Tao that can be elaborated is not the eternal Tao. The entire text can be read in under an hour. It has been interpreted and reinterpreted for 2,500 years.'},

  // ── MORE MATCH ──────────────────────────────────────────────────────────────
  {type:'match',q:'Match each philosopher to the problem they are most associated with:',pairs:[{left:'Hume',right:'Problem of Induction'},{left:'Descartes',right:'Mind-Body Problem'},{left:'Kant',right:'Limits of Pure Reason'},{left:'Wittgenstein',right:'Limits of Language'}],phil:'hume',feedback:'Four of the most enduring problems in philosophy, each owned by a different thinker: Hume\'s unsolved problem of inductive inference, Descartes\' mind-body dualism that still haunts neuroscience, Kant\'s critique of what reason can know, Wittgenstein\'s analysis of where language breaks down.'},
  {type:'match',q:'Match each philosopher to their most provocative claim:',pairs:[{left:'Nietzsche',right:'God is dead'},{left:'Hobbes',right:'Life is nasty, brutish, and short'},{left:'Hume',right:'Causation is a habit of mind'},{left:'Sartre',right:'Existence precedes essence'}],phil:'nietzsche',feedback:'Four sentences that each demolished something people took for granted: Nietzsche destroying the moral foundation of Western civilisation, Hobbes revealing the violence beneath political order, Hume demolishing scientific certainty, Sartre removing the comfort of human nature.'},
  {type:'match',q:'Match each work to its author:',pairs:[{left:'Meditations',right:'Marcus Aurelius'},{left:'The Social Contract',right:'Rousseau'},{left:'Being and Time',right:'Heidegger'},{left:'The Second Sex',right:'de Beauvoir'}],phil:'marcus',feedback:'Four landmark texts across four eras: Marcus\'s private journal of Stoic practice, Rousseau\'s theory of democratic legitimacy, Heidegger\'s analysis of human existence, de Beauvoir\'s founding of feminist philosophy.'},
  {type:'match',q:'Match each philosopher to what they believed about <strong>human nature</strong>:',pairs:[{left:'Hobbes',right:'Naturally self-interested and violent'},{left:'Rousseau',right:'Naturally good, corrupted by society'},{left:'Aristotle',right:'Naturally social and political'},{left:'Sartre',right:'Has no fixed nature at all'}],phil:'hobbes',feedback:'Four radically different answers to the same question — and the answer you choose shapes everything: your politics, your ethics, your view of institutions. Hobbes needs strong government; Rousseau wants to return to nature; Aristotle builds cities; Sartre says the question is misconceived.'},
];

// ═══════════════════════════════════════════════════════════
// PAGE SYSTEM
// ═══════════════════════════════════════════════════════════
const pages=[];
let currentPageId='cover';
pages.push({id:'cover',label:'—',title:'Intro',type:'cover'});
pages.push({id:'map',label:'◉',title:'The Map',type:'map'});
ERAS.forEach(era=>{
  pages.push({id:'era-'+era.id,label:era.ghost,title:era.label,type:'era',era});
  PHIL.filter(p=>p.era===era.id).forEach(p=>{
    pages.push({id:'phil-'+p.id,label:'·',title:p.name,type:'phil',phil:p});
  });
});
pages.push({id:'quiz',label:'?',title:'Quiz',type:'quiz'});

function showPage(id){
  currentPageId=id;visited.add(id);saveVisited();
  renderSidebar();renderMobileNav();renderMain();updateProgress();updateTimeline();
  window.scrollTo(0,0);
}

function updateTimeline(){
  const page=pages.find(p=>p.id===currentPageId);
  let pos=0;
  if(page?.type==='phil')pos=page.phil.timelinePos;
  else if(page?.type==='era')pos=page.era.timelinePos;
  else if(currentPageId==='map')pos=50;
  document.getElementById('mtFill').style.width=pos+'%';
  document.getElementById('mtMarker').style.left=pos+'%';
}

function renderSidebar(){
  const nav=document.getElementById('sidebarNav');
  nav.innerHTML='';
  pages.forEach(p=>{
    if(p.type==='era'){
      const lbl=document.createElement('div');
      lbl.className='nav-section-label';
      lbl.textContent=p.era.label+' · '+p.era.period;
      nav.appendChild(lbl);
    }
    const btn=document.createElement('button');
    btn.className='nav-btn'+(p.id===currentPageId?' active':'')+(visited.has(p.id)&&p.id!==currentPageId?' visited':'');
    btn.innerHTML=`<span class="nav-num">${p.label}</span><span class="nav-label">${p.title}</span>`;
    btn.onclick=()=>showPage(p.id);
    nav.appendChild(btn);
  });
}

function renderMobileNav(){
  const mn=document.getElementById('mobileNav');
  mn.innerHTML='';
  pages.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='m-btn'+(p.id===currentPageId?' active':'');
    btn.textContent=p.title;
    btn.onclick=()=>showPage(p.id);
    mn.appendChild(btn);
  });
}

function updateProgress(){
  const total=pages.length;
  const done=visited.size;
  const pct=Math.round((done/total)*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progCount').textContent=done+' of '+total+' explored';
}

function getIdx(id){return pages.findIndex(p=>p.id===id);}
function prevNext(){const i=getIdx(currentPageId);return{prev:i>0?pages[i-1]:null,next:i<pages.length-1?pages[i+1]:null};}

function navFooter(showMap=false){
  const{prev,next}=prevNext();
  return `<div class="ch-footer">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${prev?`<button class="ch-nav-btn" onclick="showPage('${prev.id}')">← ${prev.title}</button>`:'<span></span>'}
      ${showMap?`<button class="ch-nav-btn map-btn" onclick="showPage('map')">◉ Map</button>`:''}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${showMap?`<button class="ch-nav-btn quiz-btn" onclick="showPage('quiz')">✎ Quiz</button>`:''}
      ${next?`<button class="ch-nav-btn next" onclick="showPage('${next.id}')">${next.title} →</button>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════
function renderMain(){
  const main=document.getElementById('main');
  const page=pages.find(p=>p.id===currentPageId);
  if(!page)return;
  if(page.type==='cover'){main.innerHTML=renderCover();return;}
  if(page.type==='map'){
    main.innerHTML=renderMapPage();
    requestAnimationFrame(()=>{
      const canvas=document.getElementById('mapCanvas');
      if(canvas)buildMap(canvas,'all');
    });
    return;
  }
  if(page.type==='era'){main.innerHTML=renderEraPage(page.era);return;}
  if(page.type==='phil'){main.innerHTML=renderPhilPage(page.phil);return;}
  if(page.type==='quiz'){main.innerHTML=renderQuizPage();}
}

function renderCover(){
  return`<div class="page active" style="background:var(--ink);min-height:100vh;">
    <div class="cover-wrap">
      <div class="cover-ghost">φ</div>
      <div>
        <div class="cover-tag">A journey through thought</div>
        <div class="cover-title">Philo<em>sophia</em></div>

        <!-- Etymology -->
        <div style="margin-top:28px;margin-bottom:32px;padding:20px 24px;border-left:2px solid var(--gold);background:rgba(200,169,110,0.05);max-width:560px;">
          <div style="font-family:var(--mono);font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;">Etymology</div>
          <div style="font-size:15px;font-weight:300;color:rgba(255,255,255,0.7);line-height:1.7;">
            From the Greek <em style="color:var(--gold);font-style:normal;font-weight:600;">philo</em> — love of — and <em style="color:var(--gold);font-style:normal;font-weight:600;">sophia</em> — wisdom. Literally: <em style="color:rgba(255,255,255,0.5);">the love of wisdom.</em>
          </div>
          <div style="font-size:13px;font-weight:300;color:rgba(255,255,255,0.3);line-height:1.7;margin-top:8px;">
            The word was coined by Pythagoras, who refused to call himself a wise man — only a lover of wisdom. The gap between loving something and possessing it is where philosophy lives.
          </div>
        </div>

        <!-- What is philosophy — two columns -->
        <div style="margin-bottom:36px;">
          <div style="font-family:var(--mono);font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--violet-mid);margin-bottom:16px;">What is philosophy?</div>
          <div style="column-count:2;column-gap:48px;column-rule:1px solid rgba(255,255,255,0.06);">
            <div style="font-size:14.5px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.85;margin-bottom:14px;">
              Philosophy is the attempt to think clearly about the things that matter most — and to refuse easy answers. It asks: <em style="color:rgba(255,255,255,0.75);">What exists? What can we know? How should we live? What is just?</em> Questions so fundamental that every other discipline quietly depends on them.
            </div>
            <div style="font-size:14.5px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.85;margin-bottom:14px;">
              Science tells us <em style="color:rgba(255,255,255,0.75);">how</em> the world works. Philosophy asks <em style="color:rgba(255,255,255,0.75);">why</em> it matters that it works that way at all — and whether the methods we use to understand it can be trusted. Every scientific revolution has been preceded by a philosophical one.
            </div>
            <div style="font-size:14.5px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.85;">
              It is not academic. It is not comfortable. It is the record of humanity refusing to accept the world as given — and the ideas that came from that refusal have shaped every civilisation, revolution, and moment of moral progress in history. <em style="color:rgba(255,255,255,0.75);">You are already doing it. You have been doing it your whole life.</em> Philosophia just gives you the map.
            </div>
          </div>
        </div>

        <div class="cover-stats">
          <div><div class="cs-num">${ERAS.length}</div><div class="cs-label">Eras</div></div>
          <div><div class="cs-num">2,500</div><div class="cs-label">Years</div></div>
          <div><div class="cs-num">∞</div><div class="cs-label">Questions</div></div>
        </div>
        <button class="cover-btn" onclick="showPage('map')">Explore the map →</button>
      </div>
    </div>
  </div>`;
}

function renderMapPage(){
  const{prev,next}=prevNext();
  return`<div class="page active map-page">
    <div class="map-hero">
      <div class="map-hero-tag">The map of thought</div>
      <h2>2,500 years of <strong>influence</strong></h2>
      <p>Every node is a philosopher. Every line is an intellectual debt. Click any node to read their story. Drag to pan, scroll to zoom. Gold dots mark philosophers you've explored.</p>
    </div>
    <div class="map-controls">
      <span class="map-filter-label">Filter:</span>
      <button class="map-filter-btn active" onclick="mapFilter(this,'all')">All eras</button>
      ${ERAS.map(e=>`<button class="map-filter-btn" onclick="mapFilter(this,'${e.id}')">${e.label}</button>`).join('')}
    </div>
    <canvas id="mapCanvas" style="width:100%;height:620px;display:block;"></canvas>
    <div class="map-tip">Click any philosopher to open their chapter · Drag to pan · Scroll to zoom · Larger nodes = more influence received · Gold dots = explored</div>
    ${navFooter()}
  </div>`;
}

window.mapFilter=function(btn,era){
  document.querySelectorAll('.map-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const canvas=document.getElementById('mapCanvas');
  if(canvas)buildMap(canvas,era);
};

function renderEraPage(era){
  const eraPhils=PHIL.filter(p=>p.era===era.id);
  const schools=[...new Set(eraPhils.map(p=>p.school))];
  return`<div class="page active">
    <div class="era-hero" data-ghost="${era.ghost}">
      <div class="era-hero-tag">${era.label} Philosophy</div>
      <h2><strong>${era.label}</strong></h2>
      <div class="era-hero-period">${era.period}</div>
      <div class="era-hero-desc">${era.desc}</div>
    </div>
    <div class="era-schools">
      ${schools.map(school=>{
        const sp=eraPhils.filter(p=>p.school===school);
        return`<div class="school-tile" onclick="showPage('phil-${sp[0].id}')">
          <div class="school-tile-label">${school}</div>

window.copyQuestion=function(philId){
  const p=philMap[philId];if(!p)return;
  const text=`Philosophy question: "${p.question}" — Context: ${p.questionContext} (from Philosophia)`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn-'+philId);
    if(btn){btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy question';btn.classList.remove('copied');},2000);}
  }).catch(()=>{
    prompt('Copy this:',text);
  });
};

window.shareQuestion=function(philId){
  const p=philMap[philId];if(!p)return;
  const text=`"${p.question}"\n\n${p.questionContext}\n\n— A question raised by ${p.name} (via Philosophia)`;
  if(navigator.share){
    navigator.share({title:`A question from ${p.name}`,text});
  } else {
    window.copyQuestion(philId);
  }
};

window.toggleAct=function(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');};

// ═══════════════════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════════════════
let quizState={mode:'select',scope:'all',questions:[],current:0,answers:[],score:0,matchSelected:null,matchAnswers:{},matchShuffle:null};

function startQuiz(scope='all'){
  let pool=[];
  if(scope==='all')pool=[...QS];
  else{
    const era=ERAS.find(e=>e.id===scope);
    if(era){
      const eraPhilIds=new Set(PHIL.filter(p=>p.era===scope).map(p=>p.id));
      pool=QS.filter(q=>eraPhilIds.has(q.phil));
    } else {
      pool=QS.filter(q=>q.phil===scope);
    }
  }
  // Ensure variety: at least one of each type if available
  const shuffle=arr=>[...arr].sort(()=>Math.random()-.5);
  const mc=shuffle(pool.filter(q=>q.type==='mc'));
  const tf=shuffle(pool.filter(q=>q.type==='tf'));
  const match=shuffle(pool.filter(q=>q.type==='match'));
  const portrait=shuffle(pool.filter(q=>q.type==='portrait'));
  const quote=shuffle(pool.filter(q=>q.type==='quote'));
  const first=shuffle(pool.filter(q=>q.type==='first'));
  const oddone=shuffle(pool.filter(q=>q.type==='oddone'));
  const agree=shuffle(pool.filter(q=>q.type==='agree'));
  const chrono=shuffle(pool.filter(q=>q.type==='chrono'));
  const mixed=shuffle([
    ...mc.slice(0,2),...tf.slice(0,2),...match.slice(0,1),
    ...portrait.slice(0,1),...quote.slice(0,1),...first.slice(0,1),
    ...oddone.slice(0,1),...agree.slice(0,1)
  ]).slice(0,10);
  if(mixed.length===0){alert('No questions available for this selection yet!');return;}
  quizState={mode:'playing',scope,questions:mixed,current:0,answers:[],score:0,matchSelected:null,matchAnswers:{},matchShuffle:null};
  renderMain();
}

function startChapterQuiz(philId){
  const pool=QS.filter(q=>q.phil===philId).sort(()=>Math.random()-.5);
  if(!pool.length){alert('Quiz questions for this philosopher coming soon!');return;}
  const take=pool.slice(0,Math.min(3,pool.length));
  quizState={mode:'playing',scope:philId,questions:take,current:0,answers:[],score:0,matchSelected:null,matchAnswers:{},matchShuffle:null};
  showPage('quiz');
}

window.startQuiz=startQuiz;
window.startChapterQuiz=startChapterQuiz;

function renderQuizPage(){
  if(quizState.mode==='playing')return renderQuizPlaying();
  if(quizState.mode==='results')return renderQuizResults();
  return renderQuizSelect();
}

function renderQuizSelect(){
  const exploreCount=[...visited].filter(id=>id.startsWith('phil-')).length;

  return`<div class="page active">

      </div>`}

      ${Object.keys(bestScores).length?`
      <div class="best-scores" style="margin-top:24px;">
        <div class="bs-title">Your best scores</div>
        ${Object.entries(bestScores).map(([scope,data])=>{
          const label=scope==='all'?'Grand Test':(ERAS.find(e=>e.id===scope)?.label||philMap[scope]?.name||scope);
          return`<div class="bs-row"><span class="bs-scope">${label}</span><span class="bs-score">${data.score}/${data.total} · ${data.pct}%</span></div>`;
        }).join('')}

    ${navFooter()}
