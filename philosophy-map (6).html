<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophia — A Journey Through Thought</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#18160f;--ink-mid:#2a2820;--text-soft:#5a5650;--stone:#9a9690;--ink-soft:#b8b4ac;
  --warm-white:#f6f3ee;--paper:#edeae3;--paper-deep:#d5d0c8;--rule:#d5d0c8;
  --teal:#5db5a3;--teal-light:#e8f4f1;--teal-mid:#b8ddd8;
  --gold:#c8a96e;--gold-light:#f7f0e3;--gold-mid:#e2d0a8;
  --red:#b5453a;--red-light:#f7eae9;--red-mid:#e0b0ac;
  --violet:#6b5f94;--violet-light:#f0eef7;--violet-mid:#c4bfe0;--violet-dark:#4a4268;
  --f:'Outfit',sans-serif;--mono:'DM Mono',monospace;--radius:4px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--warm-white);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
.shell{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:248px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}
.sidebar-brand{padding:24px 24px 18px;border-bottom:1px solid rgba(255,255,255,0.06);}
.brand-eyebrow{font-family:var(--mono);font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-bottom:8px;}
.brand-name{font-size:22px;font-weight:200;color:rgba(255,255,255,0.88);}
.brand-name strong{font-weight:700;color:var(--violet-mid);}
.mini-timeline{padding:14px 24px 12px;border-bottom:1px solid rgba(255,255,255,0.06);}
.mt-label{font-family:var(--mono);font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,0.15);margin-bottom:8px;}
.mt-track{position:relative;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:6px;}
.mt-fill{position:absolute;left:0;top:0;height:100%;background:var(--violet);border-radius:2px;transition:width .6s ease;}
.mt-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid var(--ink);transition:left .4s ease;}
.mt-eras{display:flex;justify-content:space-between;font-family:var(--mono);font-size:7px;text-transform:uppercase;color:rgba(255,255,255,0.15);}
.sidebar-nav{flex:1;padding:8px 0 16px;}
.nav-section-label{font-family:var(--mono);font-size:7.5px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,0.14);padding:12px 24px 5px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;padding:7px 24px;text-align:left;transition:background .15s;border-left:2px solid transparent;}
.nav-btn:hover{background:rgba(255,255,255,0.04);}
.nav-btn.active{background:rgba(107,95,148,0.15);border-left-color:var(--violet);}
.nav-btn.visited:not(.active) .nav-label{color:rgba(255,255,255,0.45);}
.nav-btn.visited:not(.active) .nav-num{color:rgba(107,95,148,0.5);}
.nav-num{font-family:var(--mono);font-size:8.5px;color:rgba(255,255,255,0.16);flex-shrink:0;width:18px;}
.nav-btn.active .nav-num{color:var(--violet-mid);}
.nav-label{font-size:11.5px;font-weight:300;color:rgba(255,255,255,0.28);}
.nav-btn.active .nav-label{color:rgba(255,255,255,0.9);font-weight:500;}
.sidebar-footer{padding:14px 24px 18px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.progress-label{font-family:var(--mono);font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-bottom:7px;display:flex;justify-content:space-between;}
.progress-bar{height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--violet);border-radius:2px;transition:width .5s ease;}
.progress-count{font-family:var(--mono);font-size:7.5px;color:rgba(255,255,255,0.14);margin-top:6px;}
.reset-btn{margin-top:10px;font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.14);background:none;border:none;cursor:pointer;padding:0;transition:color .15s;}
.reset-btn:hover{color:var(--red);}

/* ── MOBILE ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:1px solid rgba(255,255,255,0.07);overflow-x:auto;scrollbar-width:none;z-index:200;}
.mobile-nav::-webkit-scrollbar{display:none;}
.mobile-nav-inner{display:flex;padding:0 8px;min-width:max-content;}
.m-btn{background:none;border:none;cursor:pointer;padding:13px 12px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.28);white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;}
.m-btn.active{color:var(--violet-mid);border-bottom-color:var(--violet);}
@media(max-width:880px){.sidebar{display:none;}.mobile-nav{display:flex;}.phil-hero,.era-hero,.the-question,.quote-band,.ch-footer,.map-hero,.map-controls,.map-tip,.quiz-hero,.quiz-body,.quiz-selector{padding-left:24px!important;padding-right:24px!important;}.act-body{padding:24px 20px!important;}
.cover-grid{grid-template-columns:1fr!important;}
.cover-right{display:none!important;}
.cover-left{padding:40px 24px!important;}
}

/* ── MAIN ── */
.main{flex:1;min-width:0;}
.page{display:none!important;}
.page.active{display:block!important;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── COVER ── */
.cover-wrap{min-height:100vh;background:var(--ink);display:flex;flex-direction:column;justify-content:space-between;padding:56px 72px;position:relative;overflow:hidden;}
.cover-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(107,95,148,0.12) 0%,transparent 60%);pointer-events:none;}
.cover-ghost{position:absolute;right:-20px;bottom:-60px;font-size:400px;font-weight:700;color:rgba(107,95,148,0.04);line-height:1;font-family:var(--f);pointer-events:none;user-select:none;}
.cover-tag{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--violet-mid);display:flex;align-items:center;gap:14px;margin-bottom:40px;}
.cover-tag::before{content:'';width:32px;height:1px;background:var(--violet-mid);}
.cover-title{font-size:clamp(56px,8vw,100px);font-weight:200;line-height:.95;color:rgba(255,255,255,0.88);}
.cover-title em{font-style:normal;font-weight:700;color:var(--violet-mid);display:block;}
.cover-sub{font-size:15px;font-weight:300;color:rgba(255,255,255,0.35);margin-top:32px;max-width:480px;line-height:1.8;}
.cover-stats{display:flex;gap:56px;margin-top:64px;padding-top:40px;border-top:1px solid rgba(255,255,255,0.06);}
.cs-num{font-size:44px;font-weight:700;color:var(--violet-mid);line-height:1;}
.cs-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.18);margin-top:6px;}
.cover-btn{display:inline-flex;align-items:center;gap:12px;background:var(--violet);color:rgba(255,255,255,0.92);border:none;cursor:pointer;font-family:var(--f);font-size:13px;font-weight:600;letter-spacing:.06em;padding:14px 32px;border-radius:var(--radius);margin-top:48px;transition:all .2s;}
.cover-btn:hover{background:var(--violet-dark);transform:translateY(-2px);}

/* ── MAP ── */
.map-page{min-height:100vh;display:flex;flex-direction:column;}
.map-hero{background:var(--ink);padding:44px 64px 36px;border-bottom:1px solid rgba(255,255,255,0.06);}
.map-hero-tag{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--violet-mid);display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.map-hero-tag::before{content:'';width:24px;height:1px;background:var(--violet-mid);}
.map-hero h2{font-size:clamp(24px,3vw,38px);font-weight:200;color:rgba(255,255,255,0.88);margin-bottom:6px;}
.map-hero h2 strong{font-weight:700;color:var(--violet-mid);}
.map-hero p{font-size:13px;font-weight:300;color:rgba(255,255,255,0.35);max-width:520px;line-height:1.7;}
.map-controls{padding:12px 64px;background:var(--paper);border-bottom:1px solid var(--rule);display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.map-filter-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);margin-right:4px;}
.map-filter-btn{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:2px;border:1px solid var(--rule);background:var(--warm-white);color:var(--text-soft);cursor:pointer;transition:all .15s;}
.map-filter-btn:hover,.map-filter-btn.active{border-color:var(--violet-mid);color:var(--violet);background:var(--violet-light);}
#mapCanvas{display:block;cursor:grab;flex:1;background:var(--paper);}
#mapCanvas:active{cursor:grabbing;}
.map-tip{padding:9px 64px;background:var(--warm-white);border-top:1px solid var(--rule);font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--stone);}

/* ── ERA ── */
.era-hero{background:var(--ink);padding:56px 72px 48px;position:relative;overflow:hidden;}
.era-hero::after{content:attr(data-ghost);position:absolute;right:48px;top:50%;transform:translateY(-50%);font-size:200px;font-weight:700;color:rgba(107,95,148,0.06);line-height:1;pointer-events:none;font-family:var(--f);}
.era-hero-tag{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--violet-mid);display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.era-hero-tag::before{content:'';width:24px;height:1px;background:var(--violet-mid);}
.era-hero h2{font-size:clamp(32px,4.5vw,52px);font-weight:200;color:rgba(255,255,255,0.88);margin-bottom:6px;}
.era-hero h2 strong{font-weight:700;color:var(--violet-mid);}
.era-hero-period{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-bottom:20px;}
.era-hero-desc{font-size:15px;font-weight:300;color:rgba(255,255,255,0.42);max-width:600px;line-height:1.8;}
.era-schools{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--rule);}
.school-tile{background:var(--warm-white);padding:26px 30px;cursor:pointer;transition:background .15s;border-top:3px solid var(--violet-mid);}
.school-tile:hover{background:var(--violet-light);}
.school-tile-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet);margin-bottom:7px;}
.school-tile-name{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:5px;}
.school-tile-thinkers{font-size:12.5px;font-weight:300;color:var(--text-soft);line-height:1.6;margin-bottom:12px;}
.school-tile-arrow{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);transition:color .15s;}
.school-tile:hover .school-tile-arrow{color:var(--violet);}

/* ── PHILOSOPHER ── */
.phil-hero{padding:56px 72px 48px;position:relative;overflow:hidden;border-bottom:1px solid var(--rule);}
.phil-hero::after{content:attr(data-ghost);position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:220px;font-weight:700;opacity:.03;color:var(--violet);line-height:1;pointer-events:none;font-family:var(--f);}
.ph-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.ph-era-pill{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:2px;}
.era-Ancient .ph-era-pill{background:var(--gold-light);color:var(--gold);}
.era-Medieval .ph-era-pill{background:var(--teal-light);color:var(--teal);}
.era-EarlyModern .ph-era-pill,.era-Early-Modern .ph-era-pill{background:var(--violet-light);color:var(--violet);}
.era-Modern .ph-era-pill{background:var(--red-light);color:var(--red);}
.era-Contemporary .ph-era-pill{background:var(--paper);color:var(--stone);border:1px solid var(--rule);}
.ph-school{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);}
.ph-name{font-size:clamp(38px,5vw,64px);font-weight:700;color:var(--ink);line-height:.95;margin-bottom:8px;letter-spacing:-.01em;}
.ph-dates{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);}
.ph-nav-btns{margin-top:18px;display:flex;gap:8px;}

/* ── ACTS ── */
.act{border-bottom:1px solid var(--rule);}
.act-header{display:grid;grid-template-columns:70px 1fr auto;background:var(--warm-white);cursor:pointer;transition:background .15s;min-height:72px;align-items:stretch;}
.act-header:hover{background:var(--paper);}
.act.open .act-header{background:var(--ink);}
.act-num{background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,0.2);transition:background .2s,color .2s;}
.act.open .act-num{background:var(--violet);color:rgba(255,255,255,0.9);}
.act-head-content{padding:16px 22px;display:flex;flex-direction:column;justify-content:center;gap:3px;}
.act-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);transition:color .2s;}
.act.open .act-label{color:var(--violet-mid);}
.act-title{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2;transition:color .2s;}
.act.open .act-title{color:rgba(255,255,255,0.88);}
.act-teaser{font-size:12px;font-weight:300;color:var(--text-soft);transition:color .2s;}
.act.open .act-teaser{color:rgba(255,255,255,0.3);}
.act-chevron{align-self:center;margin-right:22px;color:var(--stone);transition:all .25s;}
.act.open .act-chevron{transform:rotate(180deg);color:var(--violet-mid);}
.act-body{display:none;padding:32px 44px 32px 70px;}
.act.open .act-body{display:block;}
.act-prose{font-size:14.5px;font-weight:300;color:var(--text-soft);line-height:1.88;margin-bottom:24px;max-width:680px;}
.act-prose strong{color:var(--ink);font-weight:600;}
.pull-quote{border-left:3px solid var(--gold);padding:16px 22px;background:var(--gold-light);margin:20px 0;border-radius:0 var(--radius) var(--radius) 0;max-width:640px;}
.pq-text{font-size:17px;font-weight:300;font-style:italic;color:var(--ink-mid);line-height:1.6;margin-bottom:5px;}
.pq-attr{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);}
.conflict-block{background:var(--ink);padding:24px 28px;border-radius:var(--radius);margin:18px 0;max-width:680px;border-left:3px solid var(--red);}
.cb-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
.cb-body{font-size:13.5px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.78;}
.cb-body strong{color:rgba(255,255,255,0.85);}
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin:18px 0;}
.idea-card{background:var(--warm-white);border:1px solid var(--rule);border-radius:var(--radius);padding:16px 18px;border-top:2px solid var(--violet-mid);}
.ic-title{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.ic-body{font-size:12px;font-weight:300;color:var(--text-soft);line-height:1.65;}
.works-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--rule);margin:18px 0;}
.work-cell{background:var(--paper);padding:16px 18px;}
.wc-title{font-size:12.5px;font-weight:600;color:var(--ink);font-style:italic;margin-bottom:3px;}
.wc-year{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet);margin-bottom:4px;}
.wc-note{font-size:11.5px;font-weight:300;color:var(--text-soft);line-height:1.55;}
.divider{display:flex;align-items:center;gap:14px;margin:24px 0 14px;}
.divider-label{font-family:var(--mono);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--stone);flex-shrink:0;}
.divider-line{flex:1;height:1px;background:var(--rule);}
.conn-chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
.conn-chip{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:2px;cursor:pointer;transition:all .15s;border:1px solid var(--rule);color:var(--text-soft);background:var(--paper);}
.conn-chip:hover{border-color:var(--violet-mid);color:var(--violet);background:var(--violet-light);}

/* ── THE QUESTION ── */
.the-question{background:var(--ink);padding:48px 72px;position:relative;overflow:hidden;}
.the-question::before{content:'?';position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:300px;font-weight:700;color:rgba(107,95,148,0.05);line-height:1;pointer-events:none;}
.tq-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.tq-label::before{content:'';width:24px;height:1px;background:var(--gold);}
.tq-text{font-size:clamp(17px,2.5vw,24px);font-weight:200;color:rgba(255,255,255,0.88);line-height:1.45;max-width:600px;margin-bottom:18px;}
.tq-context{font-size:13px;font-weight:300;color:rgba(255,255,255,0.35);max-width:520px;line-height:1.78;margin-bottom:20px;}
.tq-actions{display:flex;gap:10px;}
.tq-btn{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;padding:9px 16px;border-radius:2px;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .15s;}
.tq-btn:hover{border-color:var(--gold);color:var(--gold);}
.tq-btn.copied{border-color:var(--teal);color:var(--teal);}

/* ── QUOTE BAND ── */
.quote-band{padding:32px 72px;background:var(--paper);border-top:1px solid var(--rule);}
.quick-quiz-band{padding:24px 72px;background:var(--warm-white);border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.qqb-info{}
.qqb-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet);margin-bottom:3px;}
.qqb-desc{font-size:13px;font-weight:300;color:var(--text-soft);}

/* ── CHAPTER FOOTER ── */
.ch-footer{display:flex;justify-content:space-between;align-items:center;padding:24px 72px 40px;border-top:1px solid var(--rule);background:var(--warm-white);flex-wrap:wrap;gap:10px;}
.ch-nav-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid var(--rule);cursor:pointer;font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-soft);padding:10px 16px;border-radius:var(--radius);transition:all .15s;}
.ch-nav-btn:hover{border-color:var(--violet-mid);color:var(--violet);background:var(--violet-light);}
.ch-nav-btn.next{background:var(--ink);border-color:var(--ink);color:rgba(255,255,255,0.8);}
.ch-nav-btn.next:hover{background:var(--violet-dark);border-color:var(--violet-dark);}
.ch-nav-btn.map-btn{border-color:var(--violet-mid);color:var(--violet);}
.ch-nav-btn.quiz-btn{border-color:var(--gold-mid);color:var(--gold);}

/* ── QUIZ ── */
.quiz-hero{background:var(--ink);padding:48px 72px 40px;position:relative;overflow:hidden;}
.quiz-hero::after{content:'?';position:absolute;right:40px;top:50%;transform:translateY(-50%);font-size:280px;font-weight:700;color:rgba(107,95,148,0.06);line-height:1;pointer-events:none;}
.quiz-hero-tag{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--violet-mid);display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.quiz-hero-tag::before{content:'';width:24px;height:1px;background:var(--violet-mid);}

.quiz-hero h2 strong{font-weight:700;color:var(--violet-mid);}
.quiz-hero p{font-size:13px;font-weight:300;color:rgba(255,255,255,0.35);max-width:520px;line-height:1.75;}

.qs-btn:hover,.qs-btn.active{border-color:var(--violet-mid);color:var(--violet);background:var(--violet-light);}
.quiz-body{padding:36px 72px 48px;max-width:820px;}
.quiz-progress-row{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.qp-bar{flex:1;height:3px;background:var(--rule);border-radius:2px;overflow:hidden;}
.qp-fill{height:100%;background:var(--violet);border-radius:2px;transition:width .4s ease;}
.qp-label{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone);flex-shrink:0;}
.qq-type{font-family:var(--mono);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--violet);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.qq-type::before{content:'';width:18px;height:1px;background:var(--violet);}
.qq-text{font-size:19px;font-weight:300;color:var(--ink);line-height:1.45;margin-bottom:24px;}
.qq-text strong{font-weight:700;}
.quiz-options{display:flex;flex-direction:column;gap:9px;margin-bottom:24px;}
.quiz-opt{display:flex;align-items:center;gap:14px;background:var(--warm-white);border:1px solid var(--rule);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:all .2s;}
.quiz-opt:hover{border-color:var(--violet-mid);background:var(--violet-light);}
.quiz-opt.correct,.quiz-opt.reveal-correct{border-color:var(--teal)!important;background:var(--teal-light)!important;pointer-events:none;}
.quiz-opt.incorrect{border-color:var(--red)!important;background:var(--red-light)!important;pointer-events:none;}
.opt-letter{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--stone);width:20px;flex-shrink:0;}
.quiz-opt.correct .opt-letter,.quiz-opt.reveal-correct .opt-letter{color:var(--teal);}
.quiz-opt.incorrect .opt-letter{color:var(--red);}
.opt-text{font-size:14px;font-weight:300;color:var(--ink);line-height:1.4;}
.quiz-tf-row{display:flex;gap:12px;margin-bottom:24px;}
.quiz-tf-btn{flex:1;padding:16px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--warm-white);cursor:pointer;font-size:15px;font-weight:600;color:var(--text-soft);transition:all .2s;}
.quiz-tf-btn:hover{border-color:var(--violet-mid);background:var(--violet-light);color:var(--violet);}
.quiz-tf-btn.correct,.quiz-tf-btn.reveal-correct{border-color:var(--teal)!important;background:var(--teal-light)!important;color:var(--teal)!important;pointer-events:none;}
.quiz-tf-btn.incorrect{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important;pointer-events:none;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.match-col-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin-bottom:8px;}
.match-item{padding:11px 15px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--warm-white);cursor:pointer;font-size:13px;font-weight:300;color:var(--ink);transition:all .15s;margin-bottom:7px;line-height:1.35;}
.match-item:hover{border-color:var(--violet-mid);}
.match-item.selected-left{border-color:var(--violet);background:var(--violet-light);}
.match-item.matched-correct{border-color:var(--teal)!important;background:var(--teal-light)!important;pointer-events:none;}
.match-item.matched-incorrect{border-color:var(--red)!important;background:var(--red-light)!important;pointer-events:none;}
.match-item.used{opacity:.35;pointer-events:none;}
.quiz-feedback{padding:14px 18px;border-radius:var(--radius);margin-bottom:20px;display:none;}
.quiz-feedback.show{display:block;}
.quiz-feedback.correct-fb{background:var(--teal-light);border:1px solid var(--teal-mid);}
.quiz-feedback.incorrect-fb{background:var(--red-light);border:1px solid var(--red-mid);}
.fb-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:5px;}
.correct-fb .fb-label{color:var(--teal);}
.incorrect-fb .fb-label{color:var(--red);}
.fb-text{font-size:13px;font-weight:300;color:var(--ink);line-height:1.6;}
.quiz-next-btn{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:rgba(255,255,255,0.85);border:none;cursor:pointer;font-family:var(--f);font-size:13px;font-weight:600;letter-spacing:.04em;padding:13px 26px;border-radius:var(--radius);transition:all .2s;}
.quiz-next-btn:hover{background:var(--violet-dark);}
.quiz-score-card{background:var(--ink);padding:44px 52px;border-radius:var(--radius);margin-bottom:28px;position:relative;overflow:hidden;}
.quiz-score-card::after{content:attr(data-score);position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:160px;font-weight:700;color:rgba(107,95,148,0.08);line-height:1;pointer-events:none;}
.qsc-label{font-family:var(--mono);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.qsc-score{font-size:68px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:6px;}
.qsc-total{font-size:14px;font-weight:300;color:rgba(255,255,255,0.35);}
.qsc-message{font-size:15px;font-weight:300;color:rgba(255,255,255,0.6);max-width:440px;line-height:1.7;margin-top:18px;}
.quiz-review{display:flex;flex-direction:column;gap:1px;background:var(--rule);margin-bottom:24px;}
.review-item{background:var(--warm-white);padding:14px 18px;display:grid;grid-template-columns:22px 1fr;gap:10px;align-items:start;}
.ri-icon{font-size:13px;padding-top:2px;}
.ri-q{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.ri-a{font-size:11.5px;font-weight:300;color:var(--text-soft);}
.correct-answer{color:var(--teal);font-weight:600;}
.wrong-answer{color:var(--red);font-weight:600;}
.grand-unlock{background:linear-gradient(135deg,var(--ink) 0%,var(--violet-dark) 100%);padding:36px 48px;border-radius:var(--radius);margin-bottom:20px;border:1px solid var(--violet);text-align:center;}
.gu-icon{font-size:36px;margin-bottom:12px;}
.gu-title{font-size:20px;font-weight:700;color:rgba(255,255,255,0.88);margin-bottom:6px;}
.gu-body{font-size:13px;font-weight:300;color:rgba(255,255,255,0.45);line-height:1.7;margin-bottom:20px;max-width:380px;margin-left:auto;margin-right:auto;}
.gu-count{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet-mid);margin-bottom:16px;}
.best-scores{margin-top:20px;}
.bs-title{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);margin-bottom:10px;}
.bs-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--rule);font-size:12.5px;}
.bs-scope{font-weight:300;color:var(--text-soft);}
.bs-score{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--violet);}

  {id:'ancient',label:'Ancient',period:'c.600 BC – 500 AD',ghost:'I',timelinePos:5,
   desc:'Where it all begins. Greek, Roman, and Asian thinkers confront the most fundamental questions with no inherited framework. What exists? How should we live? What can we know? They start from nothing. The questions they ask are so radical philosophy has never fully escaped them.'},
  {id:'medieval',label:'Medieval',period:'500 – 1400 AD',ghost:'II',timelinePos:35,
   desc:'Philosophy goes underground — into monasteries, mosques, synagogues. The great ancient texts are preserved, translated, argued over. The central question: can reason and faith coexist, or does one inevitably destroy the other?'},
  {id:'earlymodern',label:'Early Modern',period:'1400 – 1750',ghost:'III',timelinePos:58,

  {id:'modern',label:'Modern',period:'1750 – 1900',ghost:'IV',timelinePos:78,
   desc:'Kant rewires everything. Then Hegel, Marx, Nietzsche arrive — each more unsettling than the last. By the end of this era, God is dead, history is a class struggle, and the very idea of objective morality is under assault.'},
  {id:'contemporary',label:'Contemporary',period:'1900 – present',ghost:'V',timelinePos:95,
   desc:'Philosophy splinters. The analytics want rigour and logic. The continentals want literature and politics. Language, power, consciousness, gender — the 20th century discovers that even the most intimate aspects of human life are battlegrounds for ideas.'}

const ERA_COLORS={ancient:'#c8a96e',medieval:'#5db5a3',earlymodern:'#6b5f94',modern:'#b5453a',contemporary:'#9a9690'};

const PORTRAITS={"heraclitus": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Heraclitus_bust.jpg/220px-Heraclitus_bust.jpg", "confucius": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Confucius_Statue_at_the_Confucius_Temple.jpg/220px-Confucius_Statue_at_the_Confucius_Temple.jpg", "laozi": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/ZhangLu-LaoziRidingOx.jpg/220px-ZhangLu-LaoziRidingOx.jpg", "socrates": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Socrate_du_Louvre.jpg/220px-Socrate_du_Louvre.jpg", "plato": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Plato_Silanion_Musei_Capitolini_MC1377.jpg/220px-Plato_Silanion_Musei_Capitolini_MC1377.jpg", "aristotle": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Aristotle_Altemps_Inv8575.jpg/220px-Aristotle_Altemps_Inv8575.jpg", "seneca": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Seneca-berlinantikensammlung-1.jpg/220px-Seneca-berlinantikensammlung-1.jpg", "marcus": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/MSR-ra-1-1-1a.jpg/220px-MSR-ra-1-1-1a.jpg", "avicenna": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Avicenna_70.jpg/220px-Avicenna_70.jpg", "aquinas": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Thomas_Aquinas_in_Regensburg.jpg/220px-Thomas_Aquinas_in_Regensburg.jpg", "wollstonecraft": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Mary_Wollstonecraft_by_John_Opie_%28c._1797%29.jpg/220px-Mary_Wollstonecraft_by_John_Opie_%28c._1797%29.jpg", "hobbes": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Thomas_Hobbes_%28portrait%29.jpg/220px-Thomas_Hobbes_%28portrait%29.jpg", "locke": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d1/JohnLocke.png/220px-JohnLocke.png", "spinoza": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Spinoza.jpg/220px-Spinoza.jpg", "descartes": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Frans_Hals_-_Portret_van_Ren%C3%A9_Descartes.jpg/220px-Frans_Hals_-_Portret_van_Ren%C3%A9_Descartes.jpg", "rousseau": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Jean-Jacques_Rousseau_%28painted_portrait%29.jpg/220px-Jean-Jacques_Rousseau_%28painted_portrait%29.jpg", "hume": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Painting_of_David_Hume.jpg/220px-Painting_of_David_Hume.jpg", "kant": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Immanuel_Kant_%28painted_portrait%29.jpg/220px-Immanuel_Kant_%28painted_portrait%29.jpg", "hegel": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Hegelphotography.jpg/220px-Hegelphotography.jpg", "schopenhauer": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Schopenhauer.jpg/220px-Schopenhauer.jpg", "marx": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Karl_Marx_001.jpg/220px-Karl_Marx_001.jpg", "kierkegaard": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Kierkegaard.jpg/220px-Kierkegaard.jpg", "nietzsche": "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Nietzsche187a.jpg/220px-Nietzsche187a.jpg", "wittgenstein": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Wittgenstein1930.jpg/220px-Wittgenstein1930.jpg", "heidegger": "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Heidegger_4_%281960%29.jpg/220px-Heidegger_4_%281960%29.jpg", "sartre": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Jean-Paul_Sartre_FP.jpg/220px-Jean-Paul_Sartre_FP.jpg", "camus": "https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Albert_Camus%2C_gagnant_de_prix_Nobel%2C_portrait_en_buste%2C_pos%C3%A9_au_bureau%2C_faisant_face_%C3%A0_gauche%2C_cigarette_de_tabagisme.jpg/220px-Albert_Camus%2C_gagnant_de_prix_Nobel%2C_portrait_en_buste%2C_pos%C3%A9_au_bureau%2C_faisant_face_%C3%A0_gauche%2C_cigarette_de_tabagisme.jpg", "beauvoir": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Simone_de_Beauvoir2.jpg/220px-Simone_de_Beauvoir2.jpg", "foucault": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Foucault5.jpg/220px-Foucault5.jpg"};

const PHIL=[
  // ── ANCIENT ─────────────────────────────────────────────
  {id:'heraclitus',name:'Heraclitus',dates:'c.535–475 BC',era:'ancient',eraLabel:'Ancient',school:'Pre-Socratic',timelinePos:3,
   hook:'You cannot step into the same river twice.',
   hookContext:'Heraclitus of Ephesus wrote in deliberate riddles — the "Obscure One," they called him. He deposited his work in the temple of Artemis, perhaps believing it too difficult for ordinary minds. What he left behind are fragments — barely a hundred sentences — that contain one of the most radical ideas in philosophy: everything is change. Nothing persists. The universe is not a collection of stable things but an eternal process of transformation.',
   crisisTitle:'The Crisis of Permanence',crisisText:'Before Heraclitus, Greek thinkers searched for the stable substance underlying reality. Heraclitus turned the question inside out: <strong>what if change itself is the fundamental reality?</strong> Not a thing that changes, but change as the very nature of existence. The river is never the same river — the water is different, you are different, the moment is different. And yet we call it "the river." Our language and desire for stability falsify the nature of things.',
   conflict:'The conflict is with the human need for permanence. We build our identities, institutions, and certainties on the assumption that things persist. Heraclitus says this is an illusion. The one constant is flux. The Logos — the rational principle underlying all change — is what philosophy must learn to see.',
   ideas:[{t:'Panta Rhei',d:'"Everything flows." Change is not incidental to reality — it is the nature of reality.'},{t:'Unity of Opposites',d:'Opposites are necessary complements. Hot defines cold; life defines death. Their tension is the engine of existence.'},{t:'The Logos',d:'A rational principle governs the flux. Most people sleepwalk through life, deaf to it. Philosophy is the act of waking up.'},{t:'The River',d:'"You cannot step into the same river twice." His most famous image: identity through change, not despite it.'}],
   payoffTitle:'The Man Who Outlasted His Contempt',payoffText:'Heraclitus despised his fellow citizens, refused political life, and died allegedly covering himself in cow dung to cure dropsy. He was a misanthrope who barely communicated with his contemporaries. Yet his ideas were so potent that Plato, Aristotle, and the Stoics all engaged with them seriously, and Hegel made Heraclitean flux the foundation of his entire dialectic two thousand years later. <strong>The man who believed nothing persists has had the most persistent ideas in philosophy.</strong>',
   works:[{title:'On Nature',year:'c.500 BC',note:'Survives only in fragments — but what fragments'}],
   quote:'"The only thing constant is change."',
   question:'If everything is in constant flux — including you — what is the "you" that persists through change? Is personal identity an illusion?',
   questionContext:'Modern neuroscience suggests your brain physically rewires itself through experience. The cells in your body replace themselves over years. Heraclitus\'s question is not ancient — it\'s neurological.',
   influenced:['plato','aristotle','zeno_s'],influencedBy:[]},

  {id:'confucius',name:'Confucius',dates:'551–479 BC',era:'ancient',eraLabel:'Ancient',school:'Confucian',timelinePos:4,
   hook:'What does it mean to be fully human?',
   hookContext:'Kong Qiu — known to the West as Confucius — was born in the state of Lu in what is now Shandong province, China. His father died when he was three. He taught himself, rose through minor official positions, and spent thirteen years wandering between Chinese states trying to persuade rulers to adopt his vision. He failed politically. But the tradition he founded reshaped Chinese civilisation for two and a half millennia — and shaped more human lives than any other philosopher in history.',
   crisisTitle:'The Crisis of a Disordered World',crisisText:'Confucius lived during the "Spring and Autumn" period — a time of political fragmentation and the collapse of the old Zhou dynasty order. <strong>The world he saw was one where rulers no longer behaved as rulers, ministers no longer behaved as ministers, and social bonds were disintegrating.</strong> His response was not political revolution but moral regeneration: if individuals cultivated virtue, families would be ordered; if families were ordered, states would be governed well.',
   conflict:'The conflict is with any philosophy that separates ethics from politics, or personal development from social responsibility. For Confucius, you cannot be a good person in isolation — humanity (ren) is fundamentally relational. You become fully human through your relationships: as child, parent, sibling, friend, subject, ruler.',
   ideas:[{t:'Ren (Humaneness)',d:'"Do not impose on others what you yourself do not want." The supreme virtue — benevolence, compassion, the Confucian Golden Rule.'},{t:'Li (Ritual Propriety)',d:'The proper observance of social rituals. Not empty ceremony — but the external expression of inner virtue. Ritual is how virtue becomes social.'},{t:'Junzi',d:'The goal of self-cultivation: the junzi — the exemplary person. Not a saint, but a person of genuine virtue and proper conduct. Anyone can become one.'},{t:'Rectification of Names',d:'"If names are not correct, speech will not accord with truth." Words must match reality: rulers must actually rule.'}],
   payoffTitle:'The Most Influential Philosopher You\'ve Never Read',payoffText:'Confucius died believing he had failed. He was wrong in the most spectacular way possible. Confucianism became the official philosophy of the Chinese state during the Han dynasty and remained so — with interruptions — for two thousand years. <strong>More human beings have organised their moral and political lives around Confucius\'s ideas than around those of any other philosopher who ever lived.</strong>',
   works:[{title:'The Analects',year:'c.500–400 BC',note:'Compiled by his disciples — conversations, maxims, portraits of his character'}],
   quote:'"It does not matter how slowly you go as long as you do not stop."',
   question:'Confucius grounds ethics in social relationships and roles. But what happens when your role conflicts with your conscience? What do you owe to family loyalty versus the demands of wider justice?',
   questionContext:'Chinese political history has wrestled with this question for two thousand years. It has never been satisfactorily resolved.',
   influenced:[],influencedBy:[]},

  {id:'laozi',name:'Laozi',dates:'c.6th century BC',era:'ancient',eraLabel:'Ancient',school:'Daoist',timelinePos:4,
   hook:'What if the wisest action is non-action?',
   hookContext:'We do not know if Laozi existed. He may be a legend, a composite, a literary fiction. The text attributed to him — the Tao Te Ching, eighty-one short chapters of extraordinary density and beauty — may have been written by one person or many. None of that matters. What it contains is one of the most radical challenges to Western philosophy ever articulated: that reality has a nature that cannot be named, and that the most effective action is yielding rather than forcing.',
   crisisTitle:'The Crisis of Forcing',crisisText:'While Confucius tried to reform society through moral cultivation, the Daoist tradition asked a more fundamental question: <strong>what if the very act of imposing order is the source of disorder?</strong> Every attempt to control, name, categorise — these are acts of violence against the nature of things. The Tao cannot be grasped, only flowed with. The more you try to fix reality, the more it slips away.',
   conflict:'The conflict is with every philosophy of mastery, control, and deliberate improvement — including Confucianism. Daoism says: stop striving. Stop imposing categories. Practice wu wei — effortless action — and you will achieve more than any amount of forceful striving. Water is soft; it carves canyons.',
   ideas:[{t:'The Tao',d:'The Way — the ultimate reality that underlies everything. It cannot be named or defined. "The Tao that can be spoken is not the eternal Tao."'},{t:'Wu Wei',d:'"Non-action" — not passivity, but effortless action aligned with the nature of things. The sage achieves without striving.'},{t:'Pu (Simplicity)',d:'The "uncarved block" — the natural state before conditioning imposes its shapes. Return to simplicity; reduce desire.'},{t:'Te (Virtue/Power)',d:'The natural power that flows from being aligned with the Tao. The tree\'s strength is its rootedness; the sage\'s power is alignment with what is.'}],
   payoffTitle:'The Paradox of Influence',payoffText:'The Tao Te Ching is the most translated book in history after the Bible. A text that says the Tao cannot be spoken has been spoken about more than almost any other. <strong>Daoism became one of China\'s three great traditions alongside Confucianism and Buddhism, shaped Chinese art, medicine, martial arts, and governance, and in the 20th century found remarkable resonance with Western ecology and systems thinking.</strong>',
   works:[{title:'Tao Te Ching',year:'c.6th–4th century BC',note:'81 short chapters — the most translated Chinese text in history'}],
   quote:'"The Tao that can be told is not the eternal Tao."',
   question:'Wu wei suggests the most effective way to achieve things is often to stop trying so hard. Is this wisdom or passivity? And can you intentionally practise non-intention?',
   questionContext:'Modern psychology has a concept called "flow" — effortless peak performance. Athletes, musicians, writers all report it. Is this Daoist wu wei by another name?',
   influenced:[],influencedBy:[]},

  {id:'socrates',name:'Socrates',dates:'c.470–399 BC',era:'ancient',eraLabel:'Ancient',school:'Socratic',timelinePos:6,
   hook:'Why do the wisest people know they know nothing?',
   hookContext:'Athens, 399 BC. A 70-year-old man stands before a jury of 500 citizens and refuses to stop asking questions. He could flee — his friends have arranged it. He refuses. He has spent his life arguing that the soul matters more than survival. To flee would be to prove he didn\'t believe a word of it. He drinks the hemlock. It is the most powerful philosophical argument he ever made.',
   crisisTitle:'Knowledge as Corruption',crisisText:'Athens in the 5th century BC was intoxicated with certainty. The politicians knew how to govern. The poets knew how to reveal truth. Socrates went to each of them and asked one question: <strong>do you actually know what you think you know?</strong> Every conversation ended in exposure. The experts didn\'t know — they merely believed. And they hated him for it.',
   conflict:'The conflict wasn\'t philosophical — it was existential. If the statesmen didn\'t know what justice was, how could they govern? Socrates wasn\'t asking abstract questions. He was threatening the social order. He was charged with corrupting the youth and impiety. The real charge: making people think.',
   ideas:[{t:'The Socratic Method',d:'Systematic questioning — not to win arguments but to expose hidden assumptions and pursue genuine understanding. Still used in law schools today.'},{t:'Virtue is Knowledge',d:'Evil is always a form of ignorance. No one does wrong willingly. To know the good is to do the good.'},{t:'The Examined Life',d:'"The unexamined life is not worth living." Philosophy as a daily practice, not an academic discipline.'},{t:'Socratic Irony',d:'Claiming to know nothing was not false modesty — it was the starting position of genuine inquiry.'}],
   payoffTitle:'Death as Argument',payoffText:'The execution of Socrates was the most consequential moment in the history of philosophy. It produced Plato. It produced the tradition of philosophy as a way of life — the idea that philosophy is not an academic discipline but a commitment that might cost you everything. <strong>Socrates wrote nothing. Everything we have is second-hand. And yet he remains the figure against whom every subsequent philosopher has had to define themselves.</strong>',
   works:[{title:'Apology',year:'c.399 BC',note:'Plato\'s account of his defence — the most dramatic philosophical document ever written'},{title:'Phaedo',year:'c.380 BC',note:'His final conversation before the hemlock — on the immortality of the soul'}],
   quote:'"The only true wisdom is in knowing you know nothing."',
   question:'If wisdom begins with acknowledging ignorance, why do the people who run the world so rarely operate this way? Is certainty a prerequisite for power?',
   questionContext:'Consider the leaders, experts, and institutions you encounter. What happens when they admit they don\'t know? What happens when they don\'t?',
   influenced:['plato'],influencedBy:['heraclitus']},

  {id:'plato',name:'Plato',dates:'c.428–348 BC',era:'ancient',eraLabel:'Ancient',school:'Platonism',timelinePos:8,
   hook:'What if everything you can see and touch is just a shadow?',
   hookContext:'Plato watched his teacher Socrates put to death by a democratic city that claimed to value justice. The city failed because it didn\'t know what justice actually was — it confused its opinions for the real thing. This personal catastrophe drove Plato\'s entire life work. There must be a difference between appearance and reality, between opinion and genuine knowledge. And that difference must be grounded in something permanent.',
   crisisTitle:'Reality is Not What it Seems',crisisText:'Imagine prisoners chained in a cave since birth, facing a wall. Behind them, a fire. Objects cast shadows on the wall. The prisoners name the shadows, study them, become expert in shadows. Then one prisoner escapes into sunlight. What he sees is almost unbearable. <strong>He is morally obliged to go back into the cave.</strong> They do not believe him. They think he has gone mad.',
   conflict:'The conflict is between the world as experienced and the world as it really is. Everything in experience — beauty, justice, equality — is imperfect and temporary. But we recognise the imperfection, which means we are measuring against something. Plato\'s answer: the Forms — perfect, eternal archetypes. True knowledge is of the Forms, not appearances.',
   ideas:[{t:'Theory of Forms',d:'Physical things are imperfect copies of eternal Forms. The Form of Beauty, Justice, Goodness — these are more real than anything you can touch.'},{t:'Allegory of the Cave',d:'Most people mistake shadows for reality. Philosophy is the painful process of turning toward the light — and the moral obligation to return.'},{t:'The Tripartite Soul',d:'The soul has three parts: reason, spirit, appetite. Justice is reason in command. Injustice is appetite or spirit running riot.'},{t:'Philosopher Kings',d:'Only those who have seen the Form of the Good are fit to govern — not for power, but because they alone understand what justice requires.'}],
   payoffTitle:'Footnotes to Plato',payoffText:'Whitehead said all subsequent Western philosophy is "a series of footnotes to Plato." He also founded the Academy — arguably the world\'s first university — which ran for nine hundred years until the Emperor Justinian closed it in 529 AD. <strong>The questions Plato raised — about reality and appearance, knowledge and opinion, justice in the state — have driven philosophy for two and a half millennia.</strong>',
   works:[{title:'The Republic',year:'c.375 BC',note:'Justice, the Forms, the ideal state — his most ambitious work'},{title:'Symposium',year:'c.385 BC',note:'Seven speeches on love — includes the famous ladder of beauty'},{title:'Phaedo',year:'c.380 BC',note:'The death of Socrates and the immortality of the soul'}],
   quote:'"Ignorance, the root and stem of every evil."',
   question:'Plato argues most people live in a cave mistaking appearances for reality. But who decides who has seen the light? What happens when the person claiming special access to truth is wrong?',
   questionContext:'Every ideology, religion, and political system claims special access to truth. The cave allegory cuts in every direction — including back at Plato himself.',
   influenced:['aristotle','augustine','plotinus'],influencedBy:['socrates','heraclitus']},

  {id:'aristotle',name:'Aristotle',dates:'384–322 BC',era:'ancient',eraLabel:'Ancient',school:'Peripatetic',timelinePos:10,
   hook:'What if your teacher is wrong about everything that matters?',
   hookContext:'Aristotle spent 20 years at Plato\'s Academy. He was the best student Plato ever had. He disagreed with almost everything Plato believed. When Plato died, Aristotle left. What he built in the next twenty years would shape Western civilisation for two thousand years.',
   crisisTitle:'Ideas Don\'t Float',crisisText:'Plato\'s Forms are beautiful — but Aristotle finds them absurd. If the Form of Cat exists as a separate eternal entity, what exactly is it doing? <strong>Aristotle\'s critique: you haven\'t explained reality by doubling it.</strong> The real world — messy, biological, political, embodied — cannot be understood by retreating to abstractions. You have to get your hands dirty. He dissected marine animals, studied 158 constitutions, created logic, biology, physics, ethics, politics — from scratch.',
   conflict:'Plato looks upward — toward the eternal, the abstract. Aristotle looks outward — at the world in all its variety. This is the recurring tension between theory and data, idealism and empiricism. It never gets resolved.',
   ideas:[{t:'The Golden Mean',d:'Virtue is the mean between extremes. Courage lies between cowardice and recklessness. Ethics requires judgement, not rules.'},{t:'Four Causes',d:'To understand anything: what it\'s made of, what shape it takes, what made it, and what it\'s for. The final cause — purpose — is most important.'},{t:'Eudaimonia',d:'The goal of life is not pleasure or wealth but eudaimonia — flourishing. The full exercise of what makes us distinctively human.'},{t:'Formal Logic',d:'Aristotle invented the syllogism and formal logic. His logical works dominated for two thousand years.'}],
   payoffTitle:'The Man Who Knew Everything',payoffText:'Aristotle\'s student Alexander the Great conquered the known world at 32. No single person has ever mastered more fields of knowledge. His errors were also spectacular — he got much of physics wrong, defended slavery. <strong>But his errors were the errors of someone who took the whole of human knowledge as his domain. That ambition remains staggering — and probably unrepeatable.</strong>',
   works:[{title:'Nicomachean Ethics',year:'c.350 BC',note:'His masterwork on the good life — still the best introduction to virtue ethics'},{title:'Politics',year:'c.350 BC',note:'"The human being is a political animal"'},{title:'Metaphysics',year:'c.350 BC',note:'On being, substance, and first principles'}],
   quote:'"We are what we repeatedly do. Excellence is not an act, but a habit."',
   question:'Aristotle says virtue is a habit formed by repeated action — you become courageous by doing courageous things. Is there a self beneath the habits? Or is character just conditioning?',
   questionContext:'Modern neuroscience suggests he was more right than he knew — neural pathways are literally shaped by what we repeatedly do. What does that mean for moral responsibility?',
   influenced:['aquinas','averroes'],influencedBy:['plato','heraclitus']},

  {id:'seneca',name:'Seneca',dates:'c.4 BC–65 AD',era:'ancient',eraLabel:'Ancient',school:'Stoicism',timelinePos:14,
   hook:'It is not that we have so little time — it is that we waste so much of it.',
   hookContext:'Lucius Annaeus Seneca was a Roman statesman, playwright, and Stoic philosopher who served as advisor to Emperor Nero — a relationship that ended with his forced suicide. His philosophical writings are among the most readable of antiquity: elegant, witty, and preoccupied with how to live well in the face of mortality, power, and fortune\'s reversals. His letters to his friend Lucilius are often described as the most beautiful philosophical correspondence ever written.',
   crisisTitle:'The Theft of Time',crisisText:'Seneca\'s central preoccupation is time — specifically, how spectacularly most people waste it. We save money, guard our possessions, yet squander time freely. <strong>"We are not given a short life; we make it short."</strong> The person who is always busy, always preparing for life rather than living it, always deferring real existence to some future moment — this person has wasted the only thing that cannot be recovered.',
   conflict:'The conflict is with the culture of busyness — the assumption that a full calendar is a full life. Seneca argues the opposite: the busiest people are often the most empty. True living requires withdrawal from the noise, attention to the present, and philosophy as a daily practice.',
   ideas:[{t:'Brevity of Life',d:'"It is not that we have so little time, but that we waste so much of it." The question is not how long we live, but how we live.'},{t:'Voluntary Hardship',d:'Periodically practise poverty, cold, discomfort — to inoculate yourself against fear of misfortune. What you have practised enduring, you will not fear.'},{t:'Present Attention',d:'Most anxiety comes from projecting into the future or dwelling on the past. The present moment is all we actually have.'},{t:'True Friendship',d:'A friend is one with whom you can discuss everything as frankly as with yourself — a relationship of complete trust and candour.'}],
   payoffTitle:'The Advisor Who Could Not Save Himself',payoffText:'The supreme irony of Seneca\'s life is that he — who wrote so wisely about Stoic detachment from power and wealth — accumulated enormous wealth and spent decades in the court of a tyrant. In 65 AD, Nero ordered him to kill himself. He did so with characteristic composure, reassuring his distressed friends and dying calmly. <strong>His final performance was his most Stoic. His letters to Lucilius remain among the wisest and most readable philosophical texts ever written.</strong>',
   works:[{title:'Letters to Lucilius',year:'c.65 AD',note:'124 letters on how to live — his greatest work'},{title:'On the Shortness of Life',year:'c.49 AD',note:'A sharp meditation on time and how we waste it'},{title:'On Anger',year:'c.45 AD',note:'Three books on managing the most destructive passion'}],
   quote:'"Nusquam est qui ubique est." — He who is everywhere is nowhere.',
   question:'Seneca was one of the wealthiest men in Rome while writing about Stoic detachment from material things. Does the contradiction between a philosopher\'s life and ideas undermine their philosophy?',
   questionContext:'This question applies broadly. Rousseau abandoned his children while writing about education. Jefferson owned slaves while writing about liberty. Does character matter for philosophy?',
   influenced:[],influencedBy:['zeno_s']},

  {id:'marcus',name:'Marcus Aurelius',dates:'121–180 AD',era:'ancient',eraLabel:'Ancient',school:'Stoicism',timelinePos:16,
   hook:'You have power over your mind, not outside events.',
   hookContext:'Roman Emperor from 161–180 AD and a devoted Stoic philosopher. Marcus Aurelius is one of history\'s most remarkable figures — a man with absolute power who spent his reign wrestling with how to live virtuously. His Meditations were private journal entries never intended for publication, written in Greek in military camps during the Danubian wars. They are among the most intimate and moving documents of ancient philosophy.',
   crisisTitle:'The Weight of Empire',crisisText:'Marcus Aurelius ruled an empire of 70 million people while simultaneously trying to live as a Stoic philosopher. The tension is almost unbearable to contemplate: the man who believed power is worthless was the most powerful man in the world. <strong>The Meditations are his attempt to remind himself, daily, of what actually matters.</strong> Plague, war, political intrigue — through all of it, he kept writing his private notes to himself.',
   conflict:'The conflict is between the demands of power and the demands of virtue. Marcus had to wage wars he found repugnant, deal with corrupt officials, navigate court intrigue — all while trying to be a philosopher. He never fully resolved the tension. The Meditations are the record of someone trying.',
   ideas:[{t:'Memento Mori',d:'The constant awareness of death sharpens the importance of living virtuously now. Emperors and slaves alike return to dust.'},{t:'The Obstacle is the Way',d:'Impediments to action become means of action. What obstructs us trains us; what blocks the road becomes the road.'},{t:'The Inner Citadel',d:'No matter what external forces assail us, the rational mind cannot be violated without our consent. The inner citadel is impregnable.'},{t:'Impermanence',d:'Everything is fleeting. The goal is not to cling but to act well and let go.'}],
   payoffTitle:'The Philosopher Emperor',payoffText:'Gibbon called Marcus\'s reign the period in human history when "the condition of the human race was most happy and prosperous." He was wrong about that — the Antonine Plague killed 5 million people during his reign. But the sentiment captures something: he was a good man trying to be good in impossible circumstances. <strong>The Meditations remain one of the great self-help books — not in the shallow modern sense, but in the original sense of helping yourself to live well.</strong>',
   works:[{title:'Meditations',year:'c.170–180 AD',note:'His private philosophical journal — never meant for publication'}],
   quote:'"You have power over your mind, not outside events. Realise this and you will find strength."',
   question:'Marcus Aurelius had absolute power yet wrote privately about the worthlessness of power and the importance of virtue. Was he a hypocrite — or does the gap between ideal and reality make his struggle more admirable?',
   questionContext:'We usually judge politicians harshly when their actions don\'t match their words. But perhaps the aspiration itself has value — even when imperfectly realised.',
   influenced:[],influencedBy:['seneca']},

  // ── MEDIEVAL ────────────────────────────────────────────
  {id:'avicenna',name:'Ibn Sina (Avicenna)',dates:'980–1037 AD',era:'medieval',eraLabel:'Medieval',school:'Islamic Philosophy',timelinePos:32,
   hook:'What would you know if you\'d never experienced anything?',
   hookContext:'Ibn Sina was born in what is now Uzbekistan and became the most influential philosopher-physician of the Islamic Golden Age. By ten he had memorised the Quran. By sixteen he was practising medicine. By eighteen he had read everything available. He wrote over 450 works and developed one of the most remarkable thought experiments in the history of philosophy — six hundred years before Descartes arrived at the same conclusion.',
   crisisTitle:'The Flying Man',crisisText:'Imagine you are a person who has just come into existence, floating in empty space — no sensory input, no body awareness, nothing. Would you know you exist? <strong>Ibn Sina\'s argument: yes.</strong> Even with total sensory deprivation, you would be aware of yourself as a thinking being. This "Flying Man" argument anticipates Descartes\' cogito by six centuries. The self is known directly and immediately, not through the body.',
   conflict:'The conflict is with pure materialism — the idea that mind is reducible to physical processes. Ibn Sina argues the self is something over and above bodily experience. He also had to navigate the conflict between Aristotelian philosophy and Islamic theology, developing an Islamic Aristotelianism that preserved both revelation and reason.',
   ideas:[{t:'The Flying Man',d:'A person floating in space with no sensory experience would still know they exist as a thinking being — proving self-awareness is independent of bodily sensation.'},{t:'Necessary Being',d:'Contingent things must ultimately be grounded in a Necessary Being — something that cannot not exist. This is his proof for God\'s existence.'},{t:'The Rational Soul',d:'The soul animates the body but is not reducible to it. At its highest, intellect can connect with the Active Intellect illuminating all human thought.'},{t:'Canon of Medicine',d:'His medical encyclopedia was the standard text in European and Islamic universities for five centuries.'}],
   payoffTitle:'The Bridge Between Worlds',payoffText:'Avicenna\'s works were translated into Latin in the 12th century and became foundational texts in European universities. His Canon of Medicine was used until the 17th century. <strong>Without the Islamic philosophers who preserved, translated, and extended Greek philosophy, the European Renaissance and the birth of modern science would likely have been impossible.</strong>',
   works:[{title:'The Book of Healing',year:'c.1027',note:'An encyclopedic treatment of logic, natural sciences, mathematics, and metaphysics'},{title:'The Canon of Medicine',year:'c.1025',note:'The standard medical text in universities for five centuries'}],
   quote:'"The world is divided into men who have wit and no religion, and men who have religion and no wit."',
   question:'Ibn Sina argues you can know you exist even without any sensory experience. Descartes makes the same argument six centuries later. Does this prove the soul is independent of the body — or just that self-consciousness is a strange loop?',
   questionContext:'Modern philosophy of mind is still wrestling with this. Is consciousness something over and above physical brain processes? The Flying Man thought experiment is still live.',
   influenced:['aquinas'],influencedBy:['aristotle','plato']},

  {id:'aquinas',name:'Thomas Aquinas',dates:'1225–1274',era:'medieval',eraLabel:'Medieval',school:'Scholasticism',timelinePos:38,
   hook:'Can you prove God exists with pure reason?',
   hookContext:'Thomas Aquinas was a Dominican friar who wrote at extraordinary speed — possibly dictating to four secretaries simultaneously — producing millions of words before dying at 48. Fellow students called him "the Dumb Ox." His teacher Albert the Great replied: "This dumb ox shall fill the whole world with his bellowing." He was not wrong.',
   crisisTitle:'The Crisis of Two Authorities',crisisText:'The 13th century faced an intellectual crisis: the complete works of Aristotle had arrived in Europe via Arabic translations, and Aristotle contradicted Christian doctrine on fundamental points. <strong>Aquinas\'s gamble: don\'t reject Aristotle — baptise him.</strong> Show that Aristotelian philosophy and Christian revelation, properly understood, do not contradict but complement. It was the most ambitious intellectual synthesis of the medieval period.',
   conflict:'The conflict was both intellectual and institutional. Radical Aristotelians wanted Aristotle\'s conclusions regardless of where they led. Conservative theologians wanted to ban him. Aquinas navigated between them — insisting that reason and faith operate in different but compatible domains.',
   ideas:[{t:'Five Ways',d:'Five arguments for God\'s existence from natural reason: from motion, causation, contingency, degrees of perfection, and design.'},{t:'Natural Law',d:'Moral law is grounded in human nature and accessible through reason — not just revelation. The basis of Catholic social teaching and Western jurisprudence.'},{t:'Analogy of Being',d:'We cannot speak of God in the same way we speak of creatures, nor in completely different ways, but analogically — pointing toward but never capturing divine reality.'},{t:'Faith and Reason',d:'Faith and reason cannot ultimately contradict — both are paths to truth. Where they appear to conflict, either the philosophy or theology has gone wrong.'}],
   payoffTitle:'The Architecture of a Tradition',payoffText:'Aquinas died leaving the Summa Theologica unfinished. Asked why he had stopped, he said: "All that I have written seems to me like straw compared to what I have seen." <strong>Thomism became the official philosophy of the Catholic Church. His natural law ethics, his arguments for God\'s existence — these are not museum pieces but living intellectual traditions with billions of adherents.</strong>',
   works:[{title:'Summa Theologica',year:'c.1265–74',note:'His unfinished magnum opus — the greatest work of systematic theology'},{title:'Summa Contra Gentiles',year:'c.1264',note:'A philosophical defence of Christianity addressed to non-believers'}],
   quote:'"To one who has faith, no explanation is necessary. To one without faith, no explanation is possible."',
   question:'Aquinas argues reason and faith are complementary, not contradictory. But what do you do when careful reasoning leads to conclusions that contradict religious belief? Which do you trust?',
   questionContext:'Every religious scientist, every believing philosopher faces this tension. How do you resolve it? And is the answer different depending on which specific belief is challenged?',
   influenced:['descartes','leibniz'],influencedBy:['aristotle','augustine','avicenna']},

  // ── EARLY MODERN ────────────────────────────────────────
  {id:'wollstonecraft',name:'Mary Wollstonecraft',dates:'1759–1797',era:'earlymodern',eraLabel:'Early Modern',school:'Liberalism',timelinePos:50,
   hook:'Why are women educated to be ornaments rather than rational beings?',
   hookContext:'Mary Wollstonecraft was born into poverty, largely self-educated, and died at 38 from complications after childbirth — giving birth to the future Mary Shelley. In 1792 she published A Vindication of the Rights of Woman, a work so far ahead of its time that it would take a century and a half for its central arguments to be fully accepted. She was the first major philosopher to argue systematically that women are rational beings deserving of equal rights, education, and political representation.',
   crisisTitle:'The Ruin of Women by their Education',crisisText:'Wollstonecraft\'s diagnosis is precise and devastating: women are not inferior to men — they have been made to appear inferior by an education designed to produce compliance rather than reason. Girls are taught to be pleasing, ornamental, and dependent. They are trained to use their appearance and charm rather than their minds. <strong>The result is not femininity — it is the systematic ruination of half the human race.</strong> If you treat any creature as a toy for thirty years, you should not be surprised when it behaves like a toy.',
   conflict:'The conflict is with Rousseau — specifically with his educational treatise Emile, in which he argues that women should be educated to please men. Wollstonecraft\'s response is withering: you cannot demand rational and virtuous conduct from creatures you have systematically prevented from developing rationality and virtue. Either women are rational beings deserving equal education, or they are not — and if not, you cannot blame them for what your education has made them.',
   ideas:[{t:'Rational Equality',d:'Women and men share the same rational nature. The apparent inferiority of women is the product of inferior education, not inferior nature.'},{t:'Critique of Sensibility',d:'The Romantic cult of sensibility and feeling is dangerous for women — it cultivates the very weaknesses that are then used to justify their subordination.'},{t:'Education as Liberation',d:'Equal education is the foundation of all other equality. Without it, women cannot develop the rational self-governance that is the basis of full humanity.'},{t:'Republican Motherhood',d:'Mothers who are rational, educated, virtuous citizens will raise better citizens — making women\'s equality a matter of public as well as private concern.'}],
   payoffTitle:'The First Feminist Philosopher',payoffText:'Wollstonecraft\'s reputation was destroyed after her death when her husband published a memoir revealing her unconventional life — illegitimate child, attempted suicide, unmarried partnership. Victorian readers used this to dismiss her ideas. It took until the 20th century for her work to be fully rehabilitated. <strong>She is now recognised as the founder of feminist philosophy — the thinker who first made the systematic argument that the subordination of women is not natural, necessary, or just, but a political choice that can be undone.</strong>',
   works:[{title:'A Vindication of the Rights of Woman',year:'1792',note:'The founding text of feminist philosophy'},{title:'A Vindication of the Rights of Men',year:'1790',note:'Her response to Burke\'s attack on the French Revolution'}],
   quote:'"I do not wish women to have power over men; but over themselves."',
   question:'Wollstonecraft argues women\'s apparent inferiority is produced by inferior education, not inferior nature. 230 years later, gender gaps in many fields have narrowed dramatically. Does this prove her right — or are there remaining differences that education cannot explain?',
   questionContext:'This question is live in contemporary debates about gender and achievement. The evidence is genuinely complex. What does the Wollstonecraft framework predict — and does the evidence fit?',
   influenced:['mill','beauvoir'],influencedBy:['locke','rousseau']},

  {id:'hobbes',name:'Thomas Hobbes',dates:'1588–1679',era:'earlymodern',eraLabel:'Early Modern',school:'Social Contract',timelinePos:51,
   hook:'Without government, life is solitary, poor, nasty, brutish, and short.',
   hookContext:'Thomas Hobbes lived through the English Civil War, fled to France during it, and returned after Cromwell\'s death to live under the Restoration. His political philosophy was born from terror — specifically, the terror of what happens when political authority collapses. He had seen it. He wrote Leviathan in exile in 1651, producing the most powerful argument for political authority ever written. It is also one of the most chilling.',
   crisisTitle:'The State of Nature',crisisText:'In the state of nature — without government, law, or authority — Hobbes argues human life is a war of all against all. Not because humans are evil, but because rational self-interest in conditions of scarcity and uncertainty produces conflict. <strong>In such conditions, there is "no place for industry... no arts, no letters, no society; and which is worst of all, continual fear and danger of violent death."</strong> The only escape is a social contract that gives absolute power to a sovereign.',
   conflict:'The conflict is with every romantic notion of natural human goodness — and especially with Locke and Rousseau who come after him. Where Hobbes sees natural human life as war, Locke sees natural rights, and Rousseau sees innocent harmony. The stakes of this disagreement are enormous: on the answer depends whether you think strong government is liberation from chaos or oppression of natural freedom.',
   ideas:[{t:'State of Nature',d:'Without authority, rational self-interest produces perpetual conflict — the "war of all against all." Life is solitary, poor, nasty, brutish, and short.'},{t:'The Leviathan',d:'Humans rationally contract to give up some freedom in exchange for security — creating the sovereign power (Leviathan) that alone can prevent the state of nature.'},{t:'Materialism',d:'Everything, including the mind, is matter in motion. There are no souls, no spirits — only bodies. A radically materialist worldview in an age of theology.'},{t:'Absolute Sovereignty',d:'The sovereign must have absolute power to be effective. A divided or limited sovereignty simply recreates the conditions of the state of nature.'}],
   payoffTitle:'The Realist We Never Stopped Needing',payoffText:'Hobbes has been reviled and dismissed — his absolute sovereignty sounds like a justification for tyranny. But his core insight keeps reasserting itself: the alternative to imperfect political authority is not freedom but chaos, and chaos is worse. <strong>Every failed state, every civil war, every collapse of order confirms something Hobbes understood viscerally: political authority, however imperfect, is a precious and fragile achievement.</strong>',
   works:[{title:'Leviathan',year:'1651',note:'The most powerful argument for political authority ever written'}],
   quote:'"The condition of man is a condition of war of everyone against everyone."',
   question:'Hobbes argues we should accept almost any government rather than risk the state of nature. But what about genuinely tyrannical governments — are they better than the alternative? Where is the line?',
   questionContext:'Citizens in failed states often beg for any authority that will restore order. Citizens under stable tyrannies often accept their condition rather than risk civil war. Hobbes predicted both responses.',
   influenced:['locke','rousseau'],influencedBy:['descartes']},

  {id:'locke',name:'John Locke',dates:'1632–1704',era:'earlymodern',eraLabel:'Early Modern',school:'Empiricism',timelinePos:54,
   hook:'No man has power to deprive another of his liberty.',
   hookContext:'The father of liberalism spent years in exile in Holland after being associated with political dissidents, returning triumphantly after the Glorious Revolution of 1688. His political philosophy — natural rights, consent of the governed, the right to revolution — profoundly shaped the American Declaration of Independence and Constitution. Thomas Jefferson called him one of the three greatest men who ever lived.',
   crisisTitle:'The Blank Slate',crisisText:'Locke\'s empiricism begins with an image: the mind at birth is a blank slate, tabula rasa. All knowledge comes from experience — either through the senses or through reflection on our own mental operations. This is the opposite of the rationalist claim that we have innate ideas. <strong>If Locke is right, then human beings are not born with fixed natures — they are shaped by their environments.</strong> The political implications are enormous: a bad government corrupts its citizens; a good one can improve them.',
   conflict:'The conflict is both epistemological and political. Against the rationalists, Locke argues the mind gets all its content from experience. Against the absolutists, he argues political authority is legitimate only with the consent of those governed — and that natural rights to life, liberty, and property exist prior to and independently of any government.',
   ideas:[{t:'Tabula Rasa',d:'The mind at birth is a blank slate. All knowledge comes from experience. We are not born with innate ideas — everything comes from sensation and reflection.'},{t:'Natural Rights',d:'All people have natural rights to life, liberty, and property — prior to government, not granted by it. Government exists to protect these rights, not to grant them.'},{t:'Social Contract',d:'Government is legitimate only with the consent of the governed. When it systematically violates natural rights, citizens have the right — and duty — to revolt.'},{t:'Toleration',d:'The state has no authority over religious belief. His Letter Concerning Toleration was a landmark in the history of religious freedom.'}],
   payoffTitle:'The Revolution\'s Philosopher',payoffText:'Locke died in 1704. In 1776, the American Declaration of Independence used his language almost verbatim — "life, liberty, and the pursuit of happiness" is a small modification of "life, liberty, and property." <strong>No philosopher has more directly shaped the political institutions of the modern democratic world. His ideas live in constitutions, bills of rights, and the basic assumptions of liberal democracy.</strong>',
   works:[{title:'An Essay Concerning Human Understanding',year:'1689',note:'His masterwork on knowledge, ideas, and the limits of understanding'},{title:'Two Treatises of Government',year:'1689',note:'The philosophical basis of liberal democracy'},{title:'A Letter Concerning Toleration',year:'1689',note:'The classic argument for religious tolerance'}],
   quote:'"The mind is furnished with ideas by experience alone."',
   question:'Locke says government is legitimate only with the consent of the governed. But most of us never explicitly consent to the government we live under. Do you consent? What would genuine political consent even look like?',
   questionContext:'This problem — called "tacit consent" — has troubled liberal political philosophy since Locke raised it. Voting occasionally is not the same as consenting to everything a government does. What would a real consent-based political system require?',
   influenced:['hume','mill','rousseau','wollstonecraft'],influencedBy:[]},

  {id:'spinoza',name:'Baruch Spinoza',dates:'1632–1677',era:'earlymodern',eraLabel:'Early Modern',school:'Rationalism',timelinePos:55,
   hook:'What if God and Nature are the same thing?',
   hookContext:'Excommunicated from Amsterdam\'s Jewish community at 23 — with one of the harshest bans ever recorded — Spinoza spent the rest of his life in quiet poverty, grinding lenses for a living and writing philosophy. His Ethics, written in geometric form with definitions, axioms, and propositions like a work of mathematics, is one of the most ambitious and radical books in the history of philosophy. He was called an atheist in his lifetime; he has been called the most God-intoxicated philosopher since.',
   crisisTitle:'The God Problem',crisisText:'Descartes had left philosophy with an uncomfortable dualism: mind and body are fundamentally different substances. How do they interact? And what is God\'s role in all this? Spinoza\'s answer is so radical it got him banned from his community and his books put on the Catholic Index: <strong>there is only one substance. God and Nature are the same thing.</strong> Everything that exists is a mode or expression of this single infinite substance. There is no transcendent God who created the world — God is the world.',
   conflict:'The conflict is with every dualist philosophy and every transcendent theology. Spinoza\'s monism — one substance, infinite attributes — dissolves the mind-body problem by refusing to admit two substances in the first place. It also dissolves the problem of divine intervention: God does not intervene in nature because God is nature. This "God or Nature" position made him simultaneously the most atheistic and most pantheistic philosopher of his era.',
   ideas:[{t:'Deus sive Natura',d:'"God or Nature" — two names for the same single infinite substance. There is only one thing; everything is a mode or expression of it.'},{t:'Substance Monism',d:'Against Descartes, there is not mind and body as two substances, but one substance with infinite attributes, two of which we can grasp: thought and extension.'},{t:'Conatus',d:'Every thing strives to persist in its own being — this drive is the essence of each thing. Ethics is about enhancing this power of self-preservation.'},{t:'Sub Specie Aeternitatis',d:'To see things "under the aspect of eternity" — from the perspective of the whole — is the highest form of human understanding and the source of blessedness.'}],
   payoffTitle:'The Heretic Who Became a Saint',payoffText:'Spinoza was reviled in his lifetime. After his death, he became something close to a secular saint. Goethe, Coleridge, Einstein — all claimed him as a major influence. Einstein, when asked if he believed in God, said: "I believe in Spinoza\'s God." <strong>The lens-grinder who was expelled from every community he belonged to became one of the most beloved figures in the history of philosophy — the image of the philosopher living for truth alone.</strong>',
